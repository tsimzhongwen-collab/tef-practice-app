<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="color-scheme" content="light dark">
<title>TCF风格｜TEF S3 语法机经真题 + 词汇补充</title>
<style>
:root{--bg:#f2f4f7;--panel:#fff;--line:#d0d5dd;--text:#101828;--muted:#667085;--blue:#175cd3;--blue2:#eff8ff;--green:#067647;--red:#b42318;--redbg:#fff1f0;}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans SC","PingFang SC",sans-serif;font-size:16px;}
.top{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:9}
.brand{font-weight:700} .timer{font-variant-numeric:tabular-nums;color:#344054}
.layout{max-width:1080px;margin:20px auto;padding:0 18px;display:grid;grid-template-columns:1fr 260px;gap:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 4px 14px rgba(16,24,40,.06)}
.head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}
.section{font-size:14px;color:var(--blue);font-weight:800;letter-spacing:.02em} .qno{font-weight:700;margin-top:4px}
.progress{height:8px;background:#eaecf0;border-radius:999px;overflow:hidden;margin-top:10px} .bar{height:100%;background:var(--blue);width:0;transition:.25s}
.content{padding:28px 34px 30px} .cn{color:#8a8f98;font-size:15px;line-height:1.6;margin-bottom:12px}
.question{font-size:22px;line-height:1.75;margin:0 0 24px;white-space:pre-line}
.options{display:grid;gap:12px;margin-top:8px} .opt{display:flex;gap:14px;align-items:flex-start;border:1.5px solid var(--line);border-radius:10px;background:#fff;padding:14px 16px;cursor:pointer;line-height:1.45;font-size:18px;transition:.15s;text-align:left}
.opt:hover{border-color:var(--blue);background:var(--blue2)} .letter{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 auto;background:#f9fafb}
.opt.correct{border-color:#12b76a;background:#f6fef9} .opt.wrong{border-color:#f04438;background:#fffbfa}
.feedback{display:none;margin-top:22px;border-radius:12px;padding:18px 20px;border:1px solid #fecaca;background:var(--redbg);line-height:1.7}
.feedback.ok{border-color:#abefc6;background:#f6fef9} .feedback h3{margin:0 0 10px;color:var(--red)} .feedback.ok h3{color:var(--green)}
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:12px;flex-wrap:wrap} button{border:0;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer} .primary{background:var(--blue);color:#fff} .secondary{background:#e4e7ec;color:#101828}
.side{padding:16px;align-self:start;position:sticky;top:78px} .small{font-size:13px;color:var(--muted);line-height:1.55} .stat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0} .box{background:#f9fafb;border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center} .num{font-size:24px;font-weight:800;color:var(--blue)}
.jump{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px;max-height:360px;overflow:auto} .j{padding:8px 0;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;font-size:12px} .j.done{background:#ecfdf3;border-color:#abefc6} .j.bad{background:#fef3f2;border-color:#fecdca}
.summary{display:none;padding:28px 34px} .wrongitem{border:1px solid var(--line);border-radius:10px;padding:14px;margin:10px 0;line-height:1.65;background:#fff} .tag{display:inline-block;background:#eef4ff;color:#175cd3;border-radius:999px;padding:2px 8px;font-size:12px;margin-right:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#eef4ff;color:#175cd3;font-size:12px;font-weight:700;margin-left:6px}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b0f16;
    --panel:#111827;
    --line:#2b3442;
    --text:#e5e7eb;
    --muted:#9ca3af;
    --blue:#7db7ff;
    --blue2:#132235;
    --green:#48d597;
    --red:#ff8a80;
    --redbg:#2a1416;
  }
  body{background:var(--bg);color:var(--text);}
  .top{background:#0f172a;border-bottom-color:var(--line);}
  .timer{color:#cbd5e1;}
  .card{background:var(--panel);border-color:var(--line);box-shadow:0 4px 18px rgba(0,0,0,.35);}
  .progress{background:#1f2937;}
  .cn{color:#a5adba;}
  .opt{background:#0f172a;border-color:var(--line);color:var(--text);}
  .opt:hover{background:#132235;border-color:var(--blue);}
  .letter{background:#111827;border-color:#3b4556;color:#d1d5db;}
  .opt.correct{background:#09291b;border-color:#20c77a;}
  .opt.wrong{background:#2a1416;border-color:#f87171;}
  .feedback{background:#2a1416;border-color:#7f1d1d;color:#f3f4f6;}
  .feedback.ok{background:#09291b;border-color:#166534;}
  .secondary{background:#374151;color:#f3f4f6;}
  .box{background:#0f172a;border-color:var(--line);}
  .j{background:#0f172a;border-color:var(--line);color:#e5e7eb;}
  .j.done{background:#09291b;border-color:#166534;}
  .j.bad{background:#2a1416;border-color:#7f1d1d;}
  .wrongitem{background:#0f172a;border-color:var(--line);}
  .tag,.badge{background:#132235;color:#9ccaff;}
  input,select,textarea{background:#0f172a;color:#e5e7eb;border-color:var(--line);}
}

@media(max-width:850px){.layout{grid-template-columns:1fr}.side{position:static}.question{font-size:19px}.content{padding:22px}}
</style></head><body>
<div class="top"><div class="brand">TCF风格｜TEF S3 语法机经真题 + 词汇补充</div><div class="timer" id="timer">00:00</div></div>

</div>
<script>
const DATA=[{"num": 1, "cn": "先生，您在1月20日和Mahoul先生有约。", "fr": "M., vous ______ rendez-vous le 20/01 avec M. Mahoul.", "options": [{"letter": "A", "text": "êtes"}, {"letter": "B", "text": "allez"}, {"letter": "C", "text": "avez"}, {"letter": "D", "text": "aimez"}], "answerLetter": "C", "answerText": "avez", "alsoCorrect": [], "correctSentence": "M., vous avez rendez-vous le 20/01 avec M. Mahoul.", "explanation": "固定表达 avoir rendez-vous = 有约；主语 vous，动词 avoir 变 avez。", "section": "S3 语法机经真题", "source": "S3 Q1"}, {"num": 2, "cn": "这个街区很热闹；有很多可以娱乐的地方。", "fr": "Ce quartier est très ______ ; il y a beaucoup d'endroits pour s'amuser.", "options": [{"letter": "A", "text": "animé"}, {"letter": "B", "text": "historique"}, {"letter": "C", "text": "paisible"}, {"letter": "D", "text": "calme"}], "answerLetter": "A", "answerText": "animé", "alsoCorrect": [], "correctSentence": "Ce quartier est très animé ; il y a beaucoup d'endroits pour s'amuser.", "explanation": "animé 表示“热闹的”，后文有 beaucoup d’endroits pour s’amuser，语境对应。", "section": "S3 语法机经真题", "source": "S3 Q2"}, {"num": 3, "cn": "——我们怎么去西班牙？——我坐火车。", "fr": "— ______ va-t-on en Espagne ?\n— Je prends le train.", "options": [{"letter": "A", "text": "Quand"}, {"letter": "B", "text": "Pourquoi"}, {"letter": "C", "text": "Comment"}, {"letter": "D", "text": "Par où"}], "answerLetter": "C", "answerText": "Comment", "alsoCorrect": [], "correctSentence": "— Comment va-t-on en Espagne ?\n— Je prends le train.", "explanation": "问交通方式用 Comment；回答 Je prends le train。", "section": "S3 语法机经真题", "source": "S3 Q3"}, {"num": 4, "cn": "建议学生在蒙特利尔魁北克大学办理注册/报名手续。", "fr": "On recommande aux étudiants de ______ une démarche à l'Université du Québec à Montréal.", "options": [{"letter": "A", "text": "envoyer"}, {"letter": "B", "text": "amener"}, {"letter": "C", "text": "inscrire"}, {"letter": "D", "text": "installer"}], "answerLetter": "C", "answerText": "inscrire", "alsoCorrect": [], "correctSentence": "On recommande aux étudiants de inscrire une démarche à l'Université du Québec à Montréal.", "explanation": "s’inscrire / inscrire une démarche 这里是“办理注册/报名手续”，其余 envoyer/amener/installer 不合语境。", "section": "S3 语法机经真题", "source": "S3 Q4"}, {"num": 5, "cn": "我让您先选菜，稍后回来为您点单。", "fr": "Je vous laisse choisir votre plat et je reviens pour prendre votre ______.", "options": [{"letter": "A", "text": "repas"}, {"letter": "B", "text": "menu"}, {"letter": "C", "text": "sélection"}, {"letter": "D", "text": "commande"}], "answerLetter": "D", "answerText": "commande", "alsoCorrect": [], "correctSentence": "Je vous laisse choisir votre plat et je reviens pour prendre votre commande.", "explanation": "prendre votre commande = 为您点单，餐厅场景固定搭配。", "section": "S3 语法机经真题", "source": "S3 Q5"}, {"num": 6, "cn": "消防员用了三个多小时才扑灭火灾。", "fr": "Les pompiers ont mis plus de trois heures pour ______ l'incendie.", "options": [{"letter": "A", "text": "brûler"}, {"letter": "B", "text": "refroidir"}, {"letter": "C", "text": "terminer"}, {"letter": "D", "text": "éteindre"}], "answerLetter": "D", "answerText": "éteindre", "alsoCorrect": [], "correctSentence": "Les pompiers ont mis plus de trois heures pour éteindre l'incendie.", "explanation": "éteindre l’incendie = 扑灭火灾，固定搭配。", "section": "S3 语法机经真题", "source": "S3 Q6"}, {"num": 7, "cn": "海外学习经历是学生学业路径中不可否认的优势。", "fr": "Un séjour d'études à l'étranger constitue un ______ indéniable dans le parcours académique d'un étudiant.", "options": [{"letter": "A", "text": "atout"}, {"letter": "B", "text": "parallèle"}, {"letter": "C", "text": "recours"}, {"letter": "D", "text": "renfort"}], "answerLetter": "A", "answerText": "atout", "alsoCorrect": [], "correctSentence": "Un séjour d'études à l'étranger constitue un atout indéniable dans le parcours académique d'un étudiant.", "explanation": "constituer un atout = 构成一个优势；atout 是“优势、加分项”。", "section": "S3 语法机经真题", "source": "S3 Q7"}, {"num": 8, "cn": "现在所有药剂师都有义务回收过期或未使用的药品。", "fr": "Tout pharmacien a aujourd'hui l'obligation de récupérer les médicaments ______ ou non utilisés.", "options": [{"letter": "A", "text": "périmés"}, {"letter": "B", "text": "recyclés"}, {"letter": "C", "text": "supprimés"}, {"letter": "D", "text": "annulés"}], "answerLetter": "A", "answerText": "périmés", "alsoCorrect": [], "correctSentence": "Tout pharmacien a aujourd'hui l'obligation de récupérer les médicaments périmés ou non utilisés.", "explanation": "médicaments périmés = 过期药品，固定搭配。", "section": "S3 语法机经真题", "source": "S3 Q8"}, {"num": 9, "cn": "通知：由于更新，明天该应用将不可用。", "fr": "Pour information, en raison d'une mise à jour, l'application ne sera pas ______ demain.", "options": [{"letter": "A", "text": "disponible"}, {"letter": "B", "text": "utilisée"}, {"letter": "C", "text": "autorisée"}, {"letter": "D", "text": "permise"}], "answerLetter": "A", "answerText": "disponible", "alsoCorrect": [], "correctSentence": "Pour information, en raison d'une mise à jour, l'application ne sera pas disponible demain.", "explanation": "application disponible = 应用可用；mise à jour 导致 ne sera pas disponible。", "section": "S3 语法机经真题", "source": "S3 Q9"}, {"num": 10, "cn": "他在地上捡到一张100欧元纸币，真是很幸运！", "fr": "Il a eu beaucoup de ______ de trouver ce billet de 100 euros par terre !", "options": [{"letter": "A", "text": "chance"}, {"letter": "B", "text": "fortune"}, {"letter": "C", "text": "hasard"}, {"letter": "D", "text": "bonheur"}], "answerLetter": "A", "answerText": "chance", "alsoCorrect": [], "correctSentence": "Il a eu beaucoup de chance de trouver ce billet de 100 euros par terre !", "explanation": "avoir beaucoup de chance de + 动词原形 = 很幸运能……。", "section": "S3 语法机经真题", "source": "S3 Q10"}, {"num": 11, "cn": "由于一次严重的网络攻击，我们的信息技术团队正在拼命工作，以逐步恢复所有数字系统。", "fr": "Suite à une cyber-attaque sérieuse, nos équipes informatiques travaillent ______ au rétablissement progressif de l'ensemble des systèmes digitaux.", "options": [{"letter": "A", "text": "de pied ferme"}, {"letter": "B", "text": "avec volte-face"}, {"letter": "C", "text": "à contre-cœur"}, {"letter": "D", "text": "d'arrache-pied"}], "answerLetter": "D", "answerText": "d'arrache-pied", "alsoCorrect": [], "correctSentence": "Suite à une cyber-attaque sérieuse, nos équipes informatiques travaillent d'arrache-pied au rétablissement progressif de l'ensemble des systèmes digitaux.", "explanation": "travailler d’arrache-pied = 拼命工作、努力工作。", "section": "S3 语法机经真题", "source": "S3 Q11"}, {"num": 12, "cn": "蒙特利尔大学图书馆关闭，直至另行通知。", "fr": "Les bibliothèques de l'Université de Montréal sont fermées jusqu'à ______.", "options": [{"letter": "A", "text": "nouvel ordre"}, {"letter": "B", "text": "nouvelle date"}, {"letter": "C", "text": "nouvelle injonction"}, {"letter": "D", "text": "nouveau contact"}], "answerLetter": "A", "answerText": "nouvel ordre", "alsoCorrect": [], "correctSentence": "Les bibliothèques de l'Université de Montréal sont fermées jusqu'à nouvel ordre.", "explanation": "jusqu’à nouvel ordre = 直至另行通知，通知文体固定表达。", "section": "S3 语法机经真题", "source": "S3 Q12"}, {"num": 13, "cn": "作为民族自豪感的来源，《Une vie dans les flammes》正在角逐奥斯卡最佳外语片。我们相信它！", "fr": "Source de fierté nationale, Une vie dans les flammes est en ______ pour décrocher l'Oscar du meilleur film étranger. On y croit !", "options": [{"letter": "A", "text": "liste"}, {"letter": "B", "text": "piste"}, {"letter": "C", "text": "ligne"}, {"letter": "D", "text": "lice"}], "answerLetter": "D", "answerText": "lice", "alsoCorrect": [], "correctSentence": "Source de fierté nationale, Une vie dans les flammes est en lice pour décrocher l'Oscar du meilleur film étranger. On y croit !", "explanation": "être en lice pour = 参与角逐、竞争奖项。", "section": "S3 语法机经真题", "source": "S3 Q13"}, {"num": 14, "cn": "疫情期间，魁北克市的户外公园仍然开放，但聚集活动应被禁止。", "fr": "En période d'épidémie, les parcs publics extérieurs de la Ville de Québec restent ouverts mais les rassemblements sont à ______.", "options": [{"letter": "A", "text": "éliminer"}, {"letter": "B", "text": "abolir"}, {"letter": "C", "text": "effacer"}, {"letter": "D", "text": "proscrire"}], "answerLetter": "D", "answerText": "proscrire", "alsoCorrect": [], "correctSentence": "En période d'épidémie, les parcs publics extérieurs de la Ville de Québec restent ouverts mais les rassemblements sont à proscrire.", "explanation": "être à proscrire = 应禁止/应杜绝；疫情语境中 rassemblements à proscrire。", "section": "S3 语法机经真题", "source": "S3 Q14"}, {"num": 15, "cn": "点击这里，每周通过邮件接收我们的信息。", "fr": "Cliquez ici ______ recevoir nos informations chaque semaine par mail !", "options": [{"letter": "A", "text": "pour"}, {"letter": "B", "text": "de"}, {"letter": "C", "text": "à"}, {"letter": "D", "text": "par"}], "answerLetter": "A", "answerText": "pour", "alsoCorrect": [], "correctSentence": "Cliquez ici pour recevoir nos informations chaque semaine par mail !", "explanation": "pour + 动词原形 表目的：点击这里是为了 recevoir。", "section": "S3 语法机经真题", "source": "S3 Q15"}, {"num": 16, "cn": "在学校，孩子们很喜欢体育和音乐。", "fr": "À l'école, les enfants ______ beaucoup le sport et la musique.", "options": [{"letter": "A", "text": "aimes"}, {"letter": "B", "text": "aimez"}, {"letter": "C", "text": "aimons"}, {"letter": "D", "text": "aiment"}], "answerLetter": "D", "answerText": "aiment", "alsoCorrect": [], "correctSentence": "À l'école, les enfants aiment beaucoup le sport et la musique.", "explanation": "les enfants 是第三人称复数，aimer 现在时为 aiment。", "section": "S3 语法机经真题", "source": "S3 Q16"}, {"num": 17, "cn": "今年夏天，我要去加那利群岛。", "fr": "Cet été, je vais ______ îles Canaries.", "options": [{"letter": "A", "text": "à"}, {"letter": "B", "text": "aux"}, {"letter": "C", "text": "en"}, {"letter": "D", "text": "à l'"}], "answerLetter": "B", "answerText": "aux", "alsoCorrect": [], "correctSentence": "Cet été, je vais aux îles Canaries.", "explanation": "aller aux îles Canaries；复数群岛前用 aux。", "section": "S3 语法机经真题", "source": "S3 Q17"}, {"num": 18, "cn": "您可以打印该网站标签。", "fr": "Vous pouvez ______ l'étiquette pour le site pour vous.", "options": [{"letter": "A", "text": "imprimer"}, {"letter": "B", "text": "regarder"}, {"letter": "C", "text": "supprimer"}, {"letter": "D", "text": "enregistrer"}], "answerLetter": "A", "answerText": "imprimer", "alsoCorrect": [], "correctSentence": "Vous pouvez imprimer l'étiquette pour le site pour vous.", "explanation": "imprimer l’étiquette = 打印标签。", "section": "S3 语法机经真题", "source": "S3 Q18"}, {"num": 19, "cn": "Yacoub喜欢我的车，但我更喜欢我自己的车。", "fr": "Yacoub aime bien ma voiture, mais moi je préfère ______.", "options": [{"letter": "A", "text": "la mienne"}, {"letter": "B", "text": "la sienne"}, {"letter": "C", "text": "la leur"}, {"letter": "D", "text": "la tienne"}], "answerLetter": "A", "answerText": "la mienne", "alsoCorrect": [], "correctSentence": "Yacoub aime bien ma voiture, mais moi je préfère la mienne.", "explanation": "ma voiture 对应 la mienne = 我的那辆/我的车。", "section": "S3 语法机经真题", "source": "S3 Q19"}, {"num": 20, "cn": "饭准备好了，一会儿就好。", "fr": "Le repas est prêt, ______ un instant !", "options": [{"letter": "A", "text": "dans"}, {"letter": "B", "text": "pour"}, {"letter": "C", "text": "depuis"}, {"letter": "D", "text": "il y a"}], "answerLetter": "A", "answerText": "dans", "alsoCorrect": [], "correctSentence": "Le repas est prêt, dans un instant !", "explanation": "dans un instant = 一会儿之后。", "section": "S3 语法机经真题", "source": "S3 Q20"}, {"num": 21, "cn": "公平贸易的创立是为了让农民能够获得合理价格的报酬。", "fr": "Le commerce équitable a été créé pour que les agriculteurs ______ être payés à prix juste.", "options": [{"letter": "A", "text": "pourront"}, {"letter": "B", "text": "puissent"}, {"letter": "C", "text": "pouvaient"}, {"letter": "D", "text": "peuvent"}], "answerLetter": "B", "answerText": "puissent", "alsoCorrect": [], "correctSentence": "Le commerce équitable a été créé pour que les agriculteurs puissent être payés à prix juste.", "explanation": "pour que + 虚拟式；pouvoir 的虚拟式 ils puissent。", "section": "S3 语法机经真题", "source": "S3 Q21"}, {"num": 22, "cn": "成绩一经确认，我们就可以公布结果。", "fr": "Dès que les notes ______ confirmées, nous pourrons afficher les résultats.", "options": [{"letter": "A", "text": "étaient"}, {"letter": "B", "text": "sont"}, {"letter": "C", "text": "seraient"}, {"letter": "D", "text": "seront"}], "answerLetter": "D", "answerText": "seront", "alsoCorrect": [], "correctSentence": "Dès que les notes seront confirmées, nous pourrons afficher les résultats.", "explanation": "这是将来被动态：être 的将来时 + 过去分词。les notes = elles，所以 seront confirmées。", "section": "S3 语法机经真题", "source": "S3 Q22"}, {"num": 23, "cn": "开车出发前，我们将已经花掉更多的钱。", "fr": "Avant de partir en voiture, nous ______ beaucoup plus d'argent.", "options": [{"letter": "A", "text": "avions dépensé"}, {"letter": "B", "text": "avons dépensé"}, {"letter": "C", "text": "aurons dépensé"}, {"letter": "D", "text": "aurions dépensé"}], "answerLetter": "C", "answerText": "aurons dépensé", "alsoCorrect": [], "correctSentence": "Avant de partir en voiture, nous aurons dépensé beaucoup plus d'argent.", "explanation": "aurons dépensé = 先将来时，表示到未来某点之前“将已经花掉”。", "section": "S3 语法机经真题", "source": "S3 Q23"}, {"num": 24, "cn": "你在那边看见的那位女士是一名优秀记者吗？", "fr": "La femme ______ tu vois là-bas est une grande journaliste ?", "options": [{"letter": "A", "text": "où"}, {"letter": "B", "text": "dans"}, {"letter": "C", "text": "que"}, {"letter": "D", "text": "dont"}], "answerLetter": "C", "answerText": "que", "alsoCorrect": [], "correctSentence": "La femme que tu vois là-bas est une grande journaliste ?", "explanation": "voir quelqu’un 是直接宾语；关系代词用 que。", "section": "S3 语法机经真题", "source": "S3 Q24"}, {"num": 25, "cn": "这是一个我从未想过的可能性。", "fr": "C'est une possibilité ______ je n'avais jamais pensé.", "options": [{"letter": "A", "text": "que"}, {"letter": "B", "text": "à laquelle"}, {"letter": "C", "text": "dont"}, {"letter": "D", "text": "à quoi"}], "answerLetter": "B", "answerText": "à laquelle", "alsoCorrect": [], "correctSentence": "C'est une possibilité à laquelle je n'avais jamais pensé.", "explanation": "penser à une possibilité，所以关系代词是 à laquelle。", "section": "S3 语法机经真题", "source": "S3 Q25"}, {"num": 26, "cn": "我们一收到您订购的设备，就会通知您。", "fr": "Dès que nous ______ les appareils que vous avez commandés, nous vous en informerons.", "options": [{"letter": "A", "text": "avions reçu"}, {"letter": "B", "text": "avons reçu"}, {"letter": "C", "text": "aurons reçu"}, {"letter": "D", "text": "aurions reçu"}], "answerLetter": "C", "answerText": "aurons reçu", "alsoCorrect": [], "correctSentence": "Dès que nous aurons reçu les appareils que vous avez commandés, nous vous en informerons.", "explanation": "dès que + 未来语境；收到设备先完成，再通知，用先将来时 aurons reçu。", "section": "S3 语法机经真题", "source": "S3 Q26"}, {"num": 27, "cn": "我很高兴你成功了！", "fr": "Je suis heureux que tu ______ réussi !", "options": [{"letter": "A", "text": "auras"}, {"letter": "B", "text": "as"}, {"letter": "C", "text": "aurais"}, {"letter": "D", "text": "aies"}], "answerLetter": "D", "answerText": "aies", "alsoCorrect": [], "correctSentence": "Je suis heureux que tu aies réussi !", "explanation": "être heureux que + 虚拟式；avoir 的虚拟式 tu aies。", "section": "S3 语法机经真题", "source": "S3 Q27"}, {"num": 28, "cn": "Thomas不会来参加我的派对，除非我改日期。", "fr": "Thomas ne viendra pas à ma fête, ______ je ne déplace la date.", "options": [{"letter": "A", "text": "sauf si"}, {"letter": "B", "text": "quand bien même"}, {"letter": "C", "text": "à moins que"}, {"letter": "D", "text": "à moins de"}], "answerLetter": "C", "answerText": "à moins que", "alsoCorrect": [], "correctSentence": "Thomas ne viendra pas à ma fête, à moins que je ne déplace la date.", "explanation": "à moins que + 虚拟式，表示“除非”。句中 ne 是赘词 ne。", "section": "S3 语法机经真题", "source": "S3 Q28"}, {"num": 29, "cn": "拥有丰富自然资源的国家通常是发展中国家；它们的处境并非尽管有这些资源，而恰恰是因为这些资源。", "fr": "Lettre de motivation\nLes pays dotés de ressources naturelles abondantes sont en général des pays en voie de développement. S'ils sont dans cette situation, ce n'est pas ______ leurs richesses naturelles, mais bien à cause de celles-ci.", "options": [{"letter": "A", "text": "leurs"}, {"letter": "B", "text": "en dépit de"}, {"letter": "C", "text": "à l'égard de"}, {"letter": "D", "text": "grâce à"}, {"letter": "E", "text": "en faveur de"}], "answerLetter": "B", "answerText": "en dépit de", "alsoCorrect": [], "correctSentence": "Lettre de motivation\nLes pays dotés de ressources naturelles abondantes sont en général des pays en voie de développement. S'ils sont dans cette situation, ce n'est pas en dépit de leurs richesses naturelles, mais bien à cause de celles-ci.", "explanation": "not en dépit de..., mais à cause de... = 不是尽管……，而是因为……。", "section": "S3 语法机经真题", "source": "S3 Q29"}, {"num": 30, "cn": "在石油这类情况下，其带来的增长并没有按经济规模相应创造就业。", "fr": "Lettre de motivation\nLes pays dotés de ressources naturelles abondantes sont en général des pays en voie de développement. S'ils sont dans cette situation, ce n'est pas en raison de leurs richesses naturelles, mais bien à cause de celles-ci. La croissance qu'il génère ne crée pas d'emplois en proportion ______ la taille de son économie.", "options": [{"letter": "A", "text": "à l'instar du"}, {"letter": "B", "text": "à cause du"}, {"letter": "C", "text": "en raison du"}, {"letter": "D", "text": "dans le cas du"}], "answerLetter": "D", "answerText": "dans le cas du", "alsoCorrect": [], "correctSentence": "Lettre de motivation\nLes pays dotés de ressources naturelles abondantes sont en général des pays en voie de développement. S'ils sont dans cette situation, ce n'est pas en raison de leurs richesses naturelles, mais bien à cause de celles-ci. La croissance qu'il génère ne crée pas d'emplois en proportion dans le cas du la taille de son économie.", "explanation": "dans le cas du pétrole/secteur 此处表达“在……这种情况下”。", "section": "S3 语法机经真题", "source": "S3 Q30"}, {"num": 31, "cn": "像所有互联网企业一样，我们会为了优化服务而收集您的某些数据。", "fr": "Politique de confidentialité de notre navigateur\nComme toutes les entreprises du net, nous recueillons certaines de vos données ______ d'optimisation de nos services. Nous ne les conservons que le temps nécessaire à la réalisation des actions pour lesquelles nous les avons collectées.", "options": [{"letter": "A", "text": "du risque"}, {"letter": "B", "text": "à des fins"}, {"letter": "C", "text": "en raison"}, {"letter": "D", "text": "en guise"}], "answerLetter": "B", "answerText": "à des fins", "alsoCorrect": [], "correctSentence": "Politique de confidentialité de notre navigateur\nComme toutes les entreprises du net, nous recueillons certaines de vos données à des fins d'optimisation de nos services. Nous ne les conservons que le temps nécessaire à la réalisation des actions pour lesquelles nous les avons collectées.", "explanation": "à des fins de + 名词 = 出于……目的；à des fins d’optimisation。", "section": "S3 语法机经真题", "source": "S3 Q31"}, {"num": 32, "cn": "我们需要的唯一数据，是那些最终会为您服务的数据。", "fr": "Politique de confidentialité de notre navigateur\nLes seules données dont nous avons besoin sont celles qui finiront par ______ servir.", "options": [{"letter": "A", "text": "vous"}, {"letter": "B", "text": "s'en"}, {"letter": "C", "text": "les"}, {"letter": "D", "text": "se"}], "answerLetter": "A", "answerText": "vous", "alsoCorrect": [], "correctSentence": "Politique de confidentialité de notre navigateur\nLes seules données dont nous avons besoin sont celles qui finiront par vous servir.", "explanation": "servir quelqu’un = 对某人有用/为某人服务；vous servir。", "section": "S3 语法机经真题", "source": "S3 Q32"}, {"num": 33, "cn": "关于虚假信息的传播，仅仅让公民接触不同信息源并不足以让他们形成自己的判断。", "fr": "Intox\n______ la circulation de fausses informations, il ne suffit guère de laisser les citoyens s'abreuver à différentes sources pour qu'ils se forgent leur propre idée.", "options": [{"letter": "A", "text": "Concernant"}, {"letter": "B", "text": "Relativement à"}, {"letter": "C", "text": "Suite à"}, {"letter": "D", "text": "Au vu de"}], "answerLetter": "A", "answerText": "Concernant", "alsoCorrect": [], "correctSentence": "Intox\nConcernant la circulation de fausses informations, il ne suffit guère de laisser les citoyens s'abreuver à différentes sources pour qu'ils se forgent leur propre idée.", "explanation": "Concernant + 名词 = 关于……，句首引出话题。", "section": "S3 语法机经真题", "source": "S3 Q33"}, {"num": 34, "cn": "许多研究表明，当人们接触虚假数据时，提供真实信息不仅能纠正事实性知识，但不能重塑原有信念。", "fr": "Intox\nDe nombreuses études montrent que lorsqu'ils sont exposés à de fausses données, leur fournir les vraies permet ______ de corriger les connaissances factuelles, mais pas de refondre les croyances initiales.", "options": [{"letter": "A", "text": "non seulement"}, {"letter": "B", "text": "également"}, {"letter": "C", "text": "par ailleurs"}, {"letter": "D", "text": "certes"}], "answerLetter": "A", "answerText": "non seulement", "alsoCorrect": [], "correctSentence": "Intox\nDe nombreuses études montrent que lorsqu'ils sont exposés à de fausses données, leur fournir les vraies permet non seulement de corriger les connaissances factuelles, mais pas de refondre les croyances initiales.", "explanation": "non seulement ... mais ... = 不仅……而且/但……。", "section": "S3 语法机经真题", "source": "S3 Q34"}, {"num": 35, "cn": "尽管他有困难，但他不会放弃", "fr": "Bien qu’il ______ des difficultés, il ne baissera pas les bras.", "options": [{"letter": "A", "text": "aurait"}, {"letter": "B", "text": "ait"}, {"letter": "C", "text": "a"}, {"letter": "D", "text": "aura"}], "answerLetter": "B", "answerText": "ait", "alsoCorrect": [], "correctSentence": "Bien qu’il ait des difficultés, il ne baissera pas les bras.", "explanation": "bien que + 虚拟式；avoir 的虚拟式 il ait。", "section": "S3 语法机经真题", "source": "S3 Q35"}, {"num": 36, "cn": "这个小公司。创建于2018年，已经在市场上非常活跃", "fr": "Cette petite société, ______ en 2018, est déjà très présente sur le marché.", "options": [{"letter": "A", "text": "réalisée"}, {"letter": "B", "text": "fabriquée"}, {"letter": "C", "text": "créée"}, {"letter": "D", "text": "élevée"}], "answerLetter": "C", "answerText": "créée", "alsoCorrect": [], "correctSentence": "Cette petite société, créée en 2018, est déjà très présente sur le marché.", "explanation": "société créée en 2018 = 于2018年创建的公司。", "section": "S3 语法机经真题", "source": "S3 Q36"}, {"num": 37, "cn": "查看我们的宣传册", "fr": "Consultez notre ______ aux questions sur l’espace numérique de travail, pour toutes interrogations relatives aux chutes de neige.", "options": [{"letter": "A", "text": "brochure"}, {"letter": "B", "text": "foire"}, {"letter": "C", "text": "catalogue"}, {"letter": "D", "text": "marché"}], "answerLetter": "A", "answerText": "brochure", "alsoCorrect": [], "correctSentence": "Consultez notre brochure aux questions sur l’espace numérique de travail, pour toutes interrogations relatives aux chutes de neige.", "explanation": "foire aux questions = FAQ 常见问题；但本题答案表给 brochure，若原题为“宣传册”则 brochure。", "section": "S3 语法机经真题", "source": "S3 Q37"}, {"num": 38, "cn": "献血", "fr": "Le don du sang est autorisé, à condition de remplir une déclaration ______ l’honneur.", "options": [{"letter": "A", "text": "sur"}, {"letter": "B", "text": "par"}, {"letter": "C", "text": "de"}, {"letter": "D", "text": "à"}], "answerLetter": "A", "answerText": "sur", "alsoCorrect": [], "correctSentence": "Le don du sang est autorisé, à condition de remplir une déclaration sur l’honneur.", "explanation": "déclaration sur l’honneur = 诚信声明/荣誉声明，固定表达。", "section": "S3 语法机经真题", "source": "S3 Q38"}, {"num": 39, "cn": "她戴手套保护手", "fr": "Elle porte une paire de ______ pour se protéger les mains.", "options": [{"letter": "A", "text": "bottes"}, {"letter": "B", "text": "gants"}, {"letter": "C", "text": "chaussures"}, {"letter": "D", "text": "lunettes"}], "answerLetter": "B", "answerText": "gants", "alsoCorrect": [], "correctSentence": "Elle porte une paire de gants pour se protéger les mains.", "explanation": "protéger les mains 用 gants = 手套。", "section": "S3 语法机经真题", "source": "S3 Q39"}, {"num": 40, "cn": "从8岁起，我每周上两次钢琴课", "fr": "Je ______ des cours de piano deux fois par semaine depuis mes 8 ans.", "options": [{"letter": "A", "text": "pratique"}, {"letter": "B", "text": "trouve"}, {"letter": "C", "text": "commence"}, {"letter": "D", "text": "prends"}], "answerLetter": "D", "answerText": "prends", "alsoCorrect": [], "correctSentence": "Je prends des cours de piano deux fois par semaine depuis mes 8 ans.", "explanation": "prendre des cours = 上课/修课。", "section": "S3 语法机经真题", "source": "S3 Q40"}, {"num": 41, "cn": "柏林是一座拥有许多有趣博物馆的城市", "fr": "Berlin est une ville ______ l’on trouve beaucoup de musées intéressants.", "options": [{"letter": "A", "text": "où"}, {"letter": "B", "text": "dont"}, {"letter": "C", "text": "qui"}, {"letter": "D", "text": "que"}], "answerLetter": "A", "answerText": "où", "alsoCorrect": [], "correctSentence": "Berlin est une ville où l’on trouve beaucoup de musées intéressants.", "explanation": "ville où l’on trouve... 地点先行词，关系代词用 où。", "section": "S3 语法机经真题", "source": "S3 Q41"}, {"num": 42, "cn": "集团走上了可持续发展的道路", "fr": "Le plan de relance économique produit des résultats solides et place le groupe sur une trajectoire de croissance ______.", "options": [{"letter": "A", "text": "abondante"}, {"letter": "B", "text": "durable"}, {"letter": "C", "text": "tenable"}, {"letter": "D", "text": "lucrative"}], "answerLetter": "B", "answerText": "durable", "alsoCorrect": [], "correctSentence": "Le plan de relance économique produit des résultats solides et place le groupe sur une trajectoire de croissance durable.", "explanation": "croissance durable = 可持续增长。", "section": "S3 语法机经真题", "source": "S3 Q42"}, {"num": 43, "cn": "博根是瑞士肉类行业的领导者，到今年年底将雇佣650名员工", "fr": "Bogan, le numéro un suisse dans ______ de la viande embauchera 650 personnes d’ici la fin de l’année.", "options": [{"letter": "A", "text": "le rayon"}, {"letter": "B", "text": "l’emploi"}, {"letter": "C", "text": "le secteur"}, {"letter": "D", "text": "le magasin"}], "answerLetter": "C", "answerText": "le secteur", "alsoCorrect": [], "correctSentence": "Bogan, le numéro un suisse dans le secteur de la viande embauchera 650 personnes d’ici la fin de l’année.", "explanation": "le secteur de la viande = 肉类行业。", "section": "S3 语法机经真题", "source": "S3 Q43"}, {"num": 44, "cn": "你应该亲自告诉他你要离开，他肯定很吃惊", "fr": "Tu aurais dû l’avertir en personne de ton départ : imagine qu’il ______ mal !", "options": [{"letter": "A", "text": "réagira"}, {"letter": "B", "text": "réagisse"}, {"letter": "C", "text": "réagit"}, {"letter": "D", "text": "réagirait"}], "answerLetter": "D", "answerText": "réagirait", "alsoCorrect": [], "correctSentence": "Tu aurais dû l’avertir en personne de ton départ : imagine qu’il réagirait mal !", "explanation": "imagine 这里是设想假设结果，用条件式 réagirait，不是虚拟式。", "section": "S3 语法机经真题", "source": "S3 Q44"}, {"num": 45, "cn": "当我们睡觉的时候，小偷打破窗户，偷走了电脑", "fr": "Pendant qu’on ______, le cambrioleur a cassé une fenêtre et a volé l’ordinateur.", "options": [{"letter": "A", "text": "va dormir"}, {"letter": "B", "text": "a dormi"}, {"letter": "C", "text": "dort"}, {"letter": "D", "text": "dormait"}], "answerLetter": "D", "answerText": "dormait", "alsoCorrect": [], "correctSentence": "Pendant qu’on dormait, le cambrioleur a cassé une fenêtre et a volé l’ordinateur.", "explanation": "pendant que + 过去背景动作，用未完成过去时 dormait。", "section": "S3 语法机经真题", "source": "S3 Q45"}, {"num": 46, "cn": "到达北京那天下雪了", "fr": "Il neigeait le jour ______ Samia est arrivée à Pékin.", "options": [{"letter": "A", "text": "que"}, {"letter": "B", "text": "qui"}, {"letter": "C", "text": "où"}, {"letter": "D", "text": "dont"}], "answerLetter": "C", "answerText": "où", "alsoCorrect": [], "correctSentence": "Il neigeait le jour où Samia est arrivée à Pékin.", "explanation": "le jour où... = 在……那一天，时间先行词用 où。", "section": "S3 语法机经真题", "source": "S3 Q46"}, {"num": 47, "cn": "假期我给奶奶寄了明信片", "fr": "J’ai ______ une carte postale à papy et mamie pendant les vacances.", "options": [{"letter": "A", "text": "offert"}, {"letter": "B", "text": "transféré"}, {"letter": "C", "text": "prêté"}, {"letter": "D", "text": "envoyé"}], "answerLetter": "D", "answerText": "envoyé", "alsoCorrect": [], "correctSentence": "J’ai envoyé une carte postale à papy et mamie pendant les vacances.", "explanation": "envoyer une carte postale = 寄明信片。", "section": "S3 语法机经真题", "source": "S3 Q47"}, {"num": 48, "cn": "我的笔掉到椅子下面了。你能捡起来吗", "fr": "Mon stylo est tombé sous ta chaise ! Pourrais-tu le ______ ?", "options": [{"letter": "A", "text": "redresser"}, {"letter": "B", "text": "ramasser"}, {"letter": "C", "text": "remonter"}, {"letter": "D", "text": "relever"}], "answerLetter": "B", "answerText": "ramasser", "alsoCorrect": [], "correctSentence": "Mon stylo est tombé sous ta chaise ! Pourrais-tu le ramasser ?", "explanation": "ramasser = 捡起；stylo tombé sous ta chaise。", "section": "S3 语法机经真题", "source": "S3 Q48"}, {"num": 49, "cn": "图书馆关闭", "fr": "Les bibliothèques de l’université de Montréal sont fermées jusqu’à ______.", "options": [{"letter": "A", "text": "nouvelle date"}, {"letter": "B", "text": "nouveau contact"}, {"letter": "C", "text": "nouvelle injonction"}, {"letter": "D", "text": "nouvel ordre"}], "answerLetter": "D", "answerText": "nouvel ordre", "alsoCorrect": [], "correctSentence": "Les bibliothèques de l’université de Montréal sont fermées jusqu’à nouvel ordre.", "explanation": "jusqu’à nouvel ordre = 直至另行通知。", "section": "S3 语法机经真题", "source": "S3 Q49"}, {"num": 50, "cn": "如果你是双语的，你将被聘用担任这个职位", "fr": "Vous serez engagé à ce poste ______ vous êtes bilingue.", "options": [{"letter": "A", "text": "quand"}, {"letter": "B", "text": "pour que"}, {"letter": "C", "text": "vu"}, {"letter": "D", "text": "si"}], "answerLetter": "D", "answerText": "si", "alsoCorrect": [], "correctSentence": "Vous serez engagé à ce poste si vous êtes bilingue.", "explanation": "si vous êtes bilingue = 如果你是双语者；真实条件。", "section": "S3 语法机经真题", "source": "S3 Q50"}, {"num": 51, "cn": "来和我们一起散步吧，你一整天都没动", "fr": "Viens te promener avec nous, tu n’as pas ______ de toute la journée !", "options": [{"letter": "A", "text": "déplacé"}, {"letter": "B", "text": "bougé"}, {"letter": "C", "text": "mouvement"}, {"letter": "D", "text": "—"}], "answerLetter": "B", "answerText": "bougé", "alsoCorrect": [], "correctSentence": "Viens te promener avec nous, tu n’as pas bougé de toute la journée !", "explanation": "ne pas bouger de toute la journée = 一整天没动。", "section": "S3 语法机经真题", "source": "S3 Q51"}, {"num": 52, "cn": "我让你选择你的菜，然后回来拿你的菜单/点单", "fr": "Je vous laisse choisir votre plat et je reviens pour prendre votre ______.", "options": [{"letter": "A", "text": "addition"}, {"letter": "B", "text": "menu"}, {"letter": "C", "text": "repas"}, {"letter": "D", "text": "commande"}], "answerLetter": "D", "answerText": "commande", "alsoCorrect": [], "correctSentence": "Je vous laisse choisir votre plat et je reviens pour prendre votre commande.", "explanation": "prendre votre commande = 点单。", "section": "S3 语法机经真题", "source": "S3 Q52"}, {"num": 53, "cn": "他总是用他对欧洲经济的评论来衡量", "fr": "Il est toujours mesuré ______ ses propos sur l’économie européenne.", "options": [{"letter": "A", "text": "en"}, {"letter": "B", "text": "de"}, {"letter": "C", "text": "dans"}, {"letter": "D", "text": "par"}], "answerLetter": "C", "answerText": "dans", "alsoCorrect": [], "correctSentence": "Il est toujours mesuré dans ses propos sur l’économie européenne.", "explanation": "être mesuré dans ses propos = 说话谨慎/措辞克制。", "section": "S3 语法机经真题", "source": "S3 Q53"}, {"num": 54, "cn": "将您的详细信息留在接待处。我们将尽快与您联系", "fr": "Laissez vos coordonnées à l’accueil. Nous vous ______ le plus vite possible.", "options": [{"letter": "A", "text": "contacterions"}, {"letter": "B", "text": "contactions"}, {"letter": "C", "text": "avons contacté"}, {"letter": "D", "text": "contacterons"}], "answerLetter": "D", "answerText": "contacterons", "alsoCorrect": [], "correctSentence": "Laissez vos coordonnées à l’accueil. Nous vous contacterons le plus vite possible.", "explanation": "主句讲未来，contacter 的普通将来时 nous contacterons。", "section": "S3 语法机经真题", "source": "S3 Q54"}, {"num": 55, "cn": "由于个人或职业原因，您可能无法留在家中", "fr": "Il est possible que vous ne ______ pas rester chez vous pour des raisons personnelles ou professionnelles.", "options": [{"letter": "A", "text": "pouvez"}, {"letter": "B", "text": "pourriez"}, {"letter": "C", "text": "pouviez"}, {"letter": "D", "text": "puissiez"}], "answerLetter": "D", "answerText": "puissiez", "alsoCorrect": [], "correctSentence": "Il est possible que vous ne puissiez pas rester chez vous pour des raisons personnelles ou professionnelles.", "explanation": "il est possible que + 虚拟式；pouvoir 的虚拟式 vous puissiez。", "section": "S3 语法机经真题", "source": "S3 Q55"}, {"num": 56, "cn": "我今晚没时间做饭，我们要去餐厅吗", "fr": "Je n’ai pas le temps de faire la cuisine ce soir, on ______ au restaurant ?", "options": [{"letter": "A", "text": "allez"}, {"letter": "B", "text": "va"}, {"letter": "C", "text": "allons"}, {"letter": "D", "text": "vais"}], "answerLetter": "B", "answerText": "va", "alsoCorrect": [], "correctSentence": "Je n’ai pas le temps de faire la cuisine ce soir, on va au restaurant ?", "explanation": "on 按第三人称单数，aller 变 va。", "section": "S3 语法机经真题", "source": "S3 Q56"}, {"num": 57, "cn": "这是你购买它的机会", "fr": "Voici l’occasion de vous ______ : il ressortira demain en format poche avec une préface inédite.", "options": [{"letter": "A", "text": "racheté"}, {"letter": "B", "text": "rachetiez"}, {"letter": "C", "text": "rachèterez"}, {"letter": "D", "text": "racheter"}], "answerLetter": "D", "answerText": "racheter", "alsoCorrect": [], "correctSentence": "Voici l’occasion de vous racheter : il ressortira demain en format poche avec une préface inédite.", "explanation": "l’occasion de + 动词原形；vous racheter。", "section": "S3 语法机经真题", "source": "S3 Q57"}, {"num": 58, "cn": "昨天。我参加了考试，但我错过了", "fr": "Hier, j’ai ______ mon permis de conduire mais je l’ai raté.", "options": [{"letter": "A", "text": "eu"}, {"letter": "B", "text": "passé"}, {"letter": "C", "text": "fait"}, {"letter": "D", "text": "pris"}], "answerLetter": "B", "answerText": "passé", "alsoCorrect": [], "correctSentence": "Hier, j’ai passé mon permis de conduire mais je l’ai raté.", "explanation": "passer son permis = 参加驾照 défenseurs"}], "answerLetter": "B", "answerText": "militants", "alsoCorrect": [], "correctSentence": "Plusieurs centaines d’militants écologistes se sont rassemblés devant le Parlement.", "explanation": "militants écologistes = 环保活动人士。", "section": "S3 语法机经真题", "source": "S3 Q62"}, {"num": 63, "cn": "我们等待经理接见我们", "fr": "Nous attendons que le directeur nous ______.", "options": [{"letter": "A", "text": "recevra"}, {"letter": "B", "text": "reçoit"}, {"letter": "C", "text": "reçoive"}, {"letter": "D", "text": "recevons"}], "answerLetter": "C", "answerText": "reçoive", "alsoCorrect": [], "correctSentence": "Nous attendons que le directeur nous reçoive.", "explanation": "attendre que + 虚拟式；que 后小句主语是 le directeur=il，所以 reçoive。nous 是宾语。", "section": "S3 语法机经真题", "source": "S3 Q63"}, {"num": 64, "cn": "上级部长有权发布官方考试成绩报告", "fr": "La ministre de l’enseignement supérieur a pour compétence de délivrer les ______ de notes relatifs aux examens officiels.", "options": [{"letter": "A", "text": "relevés"}, {"letter": "B", "text": "rapports"}, {"letter": "C", "text": "inventaires"}, {"letter": "D", "text": "extraits"}], "answerLetter": "A", "answerText": "relevés", "alsoCorrect": [], "correctSentence": "La ministre de l’enseignement supérieur a pour compétence de délivrer les relevés de notes relatifs aux examens officiels.", "explanation": "relevé de notes = 成绩单/成绩报告。", "section": "S3 语法机经真题", "source": "S3 Q64"}, {"num": 65, "cn": "我很开心，我女儿下周要来看我", "fr": "Ma fille ______ me voir la semaine prochaine.", "options": [{"letter": "A", "text": "va aller"}, {"letter": "B", "text": "viendra"}, {"letter": "C", "text": "vient"}, {"letter": "D", "text": "ira"}], "answerLetter": "B", "answerText": "viendra", "alsoCorrect": ["A"], "correctSentence": "Ma fille viendra me voir la semaine prochaine.", "explanation": "venir me voir = 来看我，la semaine prochaine 用将来 viendra。A 语法可，但 B 更自然。", "section": "S3 语法机经真题", "source": "S3 Q65"}, {"num": 66, "cn": "我的生日，我很开心", "fr": "C’est ______ anniversaire, je suis content.", "options": [{"letter": "A", "text": "mon"}, {"letter": "B", "text": "ma"}, {"letter": "C", "text": "mes"}, {"letter": "D", "text": "son"}], "answerLetter": "A", "answerText": "mon", "alsoCorrect": [], "correctSentence": "C’est mon anniversaire, je suis content.", "explanation": "anniversaire 是阳性名词，mon anniversaire。", "section": "S3 语法机经真题", "source": "S3 Q66"}, {"num": 67, "cn": "我女儿考试成功了，我很高兴", "fr": "Ma fille a réussi son examen, je suis contente.", "options": [{"letter": "A", "text": "réussir"}, {"letter": "B", "text": "réussi"}, {"letter": "C", "text": "réussite"}, {"letter": "D", "text": "réussira"}], "answerLetter": "B", "answerText": "réussi", "alsoCorrect": [], "correctSentence": "Ma fille a réussi son examen, je suis contente.", "explanation": "a réussi 是复合过去时，réussir 的过去分词 réussi。", "section": "S3 语法机经真题", "source": "S3 Q67"}, {"num": 68, "cn": "我的 sœur 要结婚了，______ 很 sympa", "fr": "Ma sœur va se marier, mon ______ est très sympa.", "options": [{"letter": "A", "text": "beau-frère"}, {"letter": "B", "text": "belle-sœur"}, {"letter": "C", "text": "beau-père"}, {"letter": "D", "text": "belle-mère"}], "answerLetter": "A", "answerText": "beau-frère", "alsoCorrect": [], "correctSentence": "Ma sœur va se marier, mon beau-frère est très sympa.", "explanation": "ma sœur se marie → son mari est mon beau-frère。", "section": "S3 语法机经真题", "source": "S3 Q68"}, {"num": 69, "cn": "我要睡觉了，我很困", "fr": "Je vais me coucher, j’ai ______.", "options": [{"letter": "A", "text": "sommeil"}, {"letter": "B", "text": "faim"}, {"letter": "C", "text": "soif"}, {"letter": "D", "text": "peur"}], "answerLetter": "A", "answerText": "sommeil", "alsoCorrect": [], "correctSentence": "Je vais me coucher, j’ai sommeil.", "explanation": "avoir sommeil = 困；avoir faim 饿，avoir soif 渴。", "section": "S3 语法机经真题", "source": "S3 Q69"}, {"num": 70, "cn": "今天，总统要出发去里斯本", "fr": "Aujourd’hui, le Président part ______ Lisbonne.", "options": [{"letter": "A", "text": "à"}, {"letter": "B", "text": "au"}, {"letter": "C", "text": "en"}, {"letter": "D", "text": "pour"}], "answerLetter": "D", "answerText": "pour", "alsoCorrect": [], "correctSentence": "Aujourd’hui, le Président part pour Lisbonne.", "explanation": "partir pour + 地点 = 启程前往某地。", "section": "S3 语法机经真题", "source": "S3 Q70"}, {"num": 71, "cn": "借入借出：三个单词区分", "fr": "Elle me ______ quelque chose.", "options": [{"letter": "A", "text": "prête"}, {"letter": "B", "text": "emprunte"}, {"letter": "C", "text": "loue"}, {"letter": "D", "text": "rend"}], "answerLetter": "B", "answerText": "emprunte", "alsoCorrect": [], "correctSentence": "Elle me emprunte quelque chose.", "explanation": "emprunter quelque chose à quelqu’un = 向某人借；Elle me emprunte... = 她向我借。", "section": "S3 语法机经真题", "source": "S3 Q71"}, {"num": 72, "cn": "我儿子今天过生日，18岁", "fr": "Mon fils fête son anniversaire aujourd’hui : il ______ 18 ans.", "options": [{"letter": "A", "text": "a"}, {"letter": "B", "text": "est"}, {"letter": "C", "text": "prend"}, {"letter": "D", "text": "donne"}], "answerLetter": "A", "answerText": "a", "alsoCorrect": [], "correctSentence": "Mon fils fête son anniversaire aujourd’hui : il a 18 ans.", "explanation": "avoir 18 ans = 18岁。年龄用 avoir。", "section": "S3 语法机经真题", "source": "S3 Q72"}, {"num": 73, "cn": "我得打个电话", "fr": "Je dois ______ un appel téléphonique.", "options": [{"letter": "A", "text": "faire"}, {"letter": "B", "text": "mettre"}, {"letter": "C", "text": "passer"}, {"letter": "D", "text": "rendre"}], "answerLetter": "C", "answerText": "passer", "alsoCorrect": [], "correctSentence": "Je dois passer un appel téléphonique.", "explanation": "passer un appel téléphonique = 打电话。", "section": "S3 语法机经真题", "source": "S3 Q73"}, {"num": 74, "cn": "她很好地谈判了经济解雇：她获得了一年的奖金", "fr": "Elle a bien négocié ______ économique : elle a obtenu une prime d’un an de salaire.", "options": [{"letter": "A", "text": "sa retraite"}, {"letter": "B", "text": "sa démission"}, {"letter": "C", "text": "son recrutement"}, {"letter": "D", "text": "son licenciement"}], "answerLetter": "D", "answerText": "son licenciement", "alsoCorrect": [], "correctSentence": "Elle a bien négocié son licenciement économique : elle a obtenu une prime d’un an de salaire.", "explanation": "licenciement économique = 经济性裁员。", "section": "S3 语法机经真题", "source": "S3 Q74"}, {"num": 75, "cn": "由于父母的遗产，他能够过上舒适的生活", "fr": "Grâce à l’héritage de ses parents, il a pu mener une vie ______.", "options": [{"letter": "A", "text": "pratique"}, {"letter": "B", "text": "généreuse"}, {"letter": "C", "text": "confortable"}, {"letter": "D", "text": "considérable"}], "answerLetter": "C", "answerText": "confortable", "alsoCorrect": [], "correctSentence": "Grâce à l’héritage de ses parents, il a pu mener une vie confortable.", "explanation": "mener une vie confortable = 过舒适的生活。", "section": "S3 语法机经真题", "source": "S3 Q75"}, {"num": 76, "cn": "一个女的生了她的第一个孩子", "fr": "Elle a eu ______ premier enfant.", "options": [{"letter": "A", "text": "son"}, {"letter": "B", "text": "sa"}, {"letter": "C", "text": "ses"}, {"letter": "D", "text": "leurs"}], "answerLetter": "A", "answerText": "son", "alsoCorrect": [], "correctSentence": "Elle a eu son premier enfant.", "explanation": "enfant 是阳性单数，son premier enfant。", "section": "S3 语法机经真题", "source": "S3 Q76"}, {"num": 77, "cn": "hôpital 前冠词", "fr": "Je vais ______ hôpital.", "options": [{"letter": "A", "text": "à la"}, {"letter": "B", "text": "au"}, {"letter": "C", "text": "à"}, {"letter": "D", "text": "à l’"}], "answerLetter": "D", "answerText": "à l’", "alsoCorrect": [], "correctSentence": "Je vais à l’ hôpital.", "explanation": "hôpital 以元音音素开头，用 à l’hôpital。", "section": "S3 语法机经真题", "source": "S3 Q77"}, {"num": 78, "cn": "图书馆有 travaux，应理解为施工", "fr": "La bibliothèque est ______ pour travaux.", "options": [{"letter": "A", "text": "fermée"}, {"letter": "B", "text": "ouverte"}, {"letter": "C", "text": "occupée"}, {"letter": "D", "text": "libre"}], "answerLetter": "A", "answerText": "fermée", "alsoCorrect": [], "correctSentence": "La bibliothèque est fermée pour travaux.", "explanation": "fermée pour travaux = 因施工关闭。", "section": "S3 语法机经真题", "source": "S3 Q78"}, {"num": 79, "cn": "双联题：allocation / subvention / 补助金", "fr": "Le mot qui convient est ______.", "options": [{"letter": "A", "text": "allocation"}, {"letter": "B", "text": "subvention"}, {"letter": "C", "text": "aide"}, {"letter": "D", "text": "versement"}], "answerLetter": "A", "answerText": "allocation", "alsoCorrect": [], "correctSentence": "Le mot qui convient est allocation.", "explanation": "allocation 多指发给个人的津贴/补助；subvention 多给项目或机构。", "section": "S3 语法机经真题", "source": "S3 Q79"}, {"num": 80, "cn": "最后一个双联题：一个人对某件事的看法", "fr": "Choisir : ______, à ce sujet.", "options": [{"letter": "A", "text": "donc"}, {"letter": "B", "text": "ce sujet"}, {"letter": "C", "text": "bien que"}, {"letter": "D", "text": "pourtant"}], "answerLetter": "A", "answerText": "donc / à ce sujet", "alsoCorrect": [], "correctSentence": "Choisir : donc / à ce sujet, à ce sujet.", "explanation": "à ce sujet = 关于这个问题；原题信息不完整，按答案表保留。", "section": "S3 语法机经真题", "source": "S3 Q80"}, {"num": 81, "cn": "我很开心你向我问问题", "fr": "Je suis content que tu me ______ des questions.", "options": [{"letter": "A", "text": "poses"}, {"letter": "B", "text": "demandes"}, {"letter": "C", "text": "donnes"}, {"letter": "D", "text": "dises"}], "answerLetter": "A", "answerText": "poses", "alsoCorrect": [], "correctSentence": "Je suis content que tu me poses des questions.", "explanation": "poser des questions à quelqu’un = 向某人提问；être content que 也触发虚拟式，但 poses 形式相同。", "section": "S3 语法机经真题", "source": "S3 Q81"}, {"num": 82, "cn": "语法 avoir ______ temps", "fr": "Avoir ______ temps.", "options": [{"letter": "A", "text": "du"}, {"letter": "B", "text": "de"}, {"letter": "C", "text": "le"}, {"letter": "D", "text": "—"}], "answerLetter": "C", "answerText": "le", "alsoCorrect": [], "correctSentence": "Avoir le temps.", "explanation": "avoir le temps de faire = 有时间做某事。", "section": "S3 语法机经真题", "source": "S3 Q82"}, {"num": 83, "cn": "Envoyer 搭配", "fr": "Envoyer ______ chez quelqu’un et il est embauché.", "options": [{"letter": "A", "text": "motivation"}, {"letter": "B", "text": "expérience"}, {"letter": "C", "text": "lettre"}, {"letter": "D", "text": "dossier"}], "answerLetter": "A", "answerText": "motivation", "alsoCorrect": [], "correctSentence": "Envoyer motivation chez quelqu’un et il est embauché.", "explanation": "lettre de motivation = 动机信；若空格在 de 后面，motivation 正确。", "section": "S3 语法机经真题", "source": "S3 Q83"}, {"num": 84, "cn": "虚拟式", "fr": "Il faut que + ______.", "options": [{"letter": "A", "text": "indicatif"}, {"letter": "B", "text": "subjonctif"}, {"letter": "C", "text": "conditionnel"}, {"letter": "D", "text": "infinitif"}], "answerLetter": "B", "answerText": "subjonctif", "alsoCorrect": [], "correctSentence": "Il faut que + subjonctif.", "explanation": "il faut que + 虚拟式。", "section": "S3 语法机经真题", "source": "S3 Q84"}, {"num": 85, "cn": "espérer que", "fr": "Espérer que + ______.", "options": [{"letter": "A", "text": "indicatif"}, {"letter": "B", "text": "subjonctif"}, {"letter": "C", "text": "conditionnel"}, {"letter": "D", "text": "infinitif"}], "answerLetter": "A", "answerText": "indicatif", "alsoCorrect": [], "correctSentence": "Espérer que + indicatif.", "explanation": "espérer que 肯定句后一般接直陈式，不接虚拟式。", "section": "S3 语法机经真题", "source": "S3 Q85"}, {"num": 86, "cn": "两个 app 出故障可用/不可用", "fr": "Cette application ne peut pas être utilisée : il faut ______.", "options": [{"letter": "A", "text": "valider"}, {"letter": "B", "text": "annuler"}, {"letter": "C", "text": "supprimer"}, {"letter": "D", "text": "installer"}], "answerLetter": "A", "answerText": "valider", "alsoCorrect": [], "correctSentence": "Cette application ne peut pas être utilisée : il faut valider.", "explanation": "valider = 验证/确认，使可用；应用不能使用时可能需要验证。", "section": "S3 语法机经真题", "source": "S3 Q86"}, {"num": 87, "cn": "固定搭配", "fr": "Ils travaillent ______ pour terminer le projet.", "options": [{"letter": "A", "text": "d’arrache-pied"}, {"letter": "B", "text": "à contre-cœur"}, {"letter": "C", "text": "de pied ferme"}, {"letter": "D", "text": "avec volte-face"}], "answerLetter": "A", "answerText": "d’arrache-pied", "alsoCorrect": [], "correctSentence": "Ils travaillent d’arrache-pied pour terminer le projet.", "explanation": "travailler d’arrache-pied = 拼命工作。", "section": "S3 语法机经真题", "source": "S3 Q87"}, {"num": 88, "cn": "驾照相关搭配", "fr": "J’ai ______ mon permis de conduire.", "options": [{"letter": "A", "text": "pris"}, {"letter": "B", "text": "fait"}, {"letter": "C", "text": "passé"}, {"letter": "D", "text": "avoir"}], "answerLetter": "C", "answerText": "passé", "alsoCorrect": [], "correctSentence": "J’ai passé mon permis de conduire.", "explanation": "passer son permis de conduire = 考驾照。", "section": "S3 语法机经真题", "source": "S3 Q88"}, {"num": 89, "cn": "vacances 搭配", "fr": "Vous travaillez ou êtes ______ vacances ici ?", "options": [{"letter": "A", "text": "en"}, {"letter": "B", "text": "à"}, {"letter": "C", "text": "dans"}, {"letter": "D", "text": "pour"}], "answerLetter": "A", "answerText": "en", "alsoCorrect": [], "correctSentence": "Vous travaillez ou êtes en vacances ici ?", "explanation": "être en vacances = 在度假/放假。", "section": "S3 语法机经真题", "source": "S3 Q89"}, {"num": 90, "cn": "学生可以外出，但要通知宿管", "fr": "Les étudiants peuvent sortir le soir ______ prévenir les propriétaires du logement.", "options": [{"letter": "A", "text": "à condition de"}, {"letter": "B", "text": "malgré"}, {"letter": "C", "text": "pour que"}, {"letter": "D", "text": "afin que"}], "answerLetter": "A", "answerText": "à condition de", "alsoCorrect": [], "correctSentence": "Les étudiants peuvent sortir le soir à condition de prévenir les propriétaires du logement.", "explanation": "à condition de + 动词原形 = 条件是……；主语相同可用 de。", "section": "S3 语法机经真题", "source": "S3 Q90"}, {"num": 91, "cn": "燕子在日落时分在水面嬉戏、追逐昆虫、一起冲向空中，仿佛为了试试翅膀。", "fr": "Les hirondelles se jouaient sur l'eau au tomber du soleil, poursuivaient les insectes, s'élançaient ensemble dans les airs, comme ______ éprouver leurs ailes.", "options": [{"letter": "A", "text": "de"}, {"letter": "B", "text": "pour"}, {"letter": "C", "text": "par"}, {"letter": "D", "text": "en"}], "answerLetter": "B", "answerText": "pour", "alsoCorrect": [], "correctSentence": "Les hirondelles se jouaient sur l'eau au tomber du soleil, poursuivaient les insectes, s'élançaient ensemble dans les airs, comme pour éprouver leurs ailes.", "explanation": "comme pour + 动词原形 = 仿佛为了……/像是要……；这里表示燕子像是在试验翅膀。", "section": "S3 语法机经真题", "source": "S3 Q91"}, {"num": 92, "cn": "为了了解自己的预算状况，有必要算账。", "fr": "Pour connaître l’état de son budget, il est nécessaire de faire ses ______.", "options": [{"letter": "A", "text": "affaires"}, {"letter": "B", "text": "finances"}, {"letter": "C", "text": "comptes"}, {"letter": "D", "text": "bénéfices"}], "answerLetter": "C", "answerText": "comptes", "alsoCorrect": [], "correctSentence": "Pour connaître l’état de son budget, il est nécessaire de faire ses comptes.", "explanation": "faire ses comptes = 算账、清点收支；budget 语境对应 comptes。", "section": "S3 语法机经真题", "source": "S3 Q92"}, {"num": 93, "cn": "注意，火车一分钟后就要开了。", "fr": "Attention le train va ______ dans une minute.", "options": [{"letter": "A", "text": "aller"}, {"letter": "B", "text": "avancer"}, {"letter": "C", "text": "partir"}, {"letter": "D", "text": "rouler"}], "answerLetter": "C", "answerText": "partir", "alsoCorrect": [], "correctSentence": "Attention le train va partir dans une minute.", "explanation": "le train va partir = 火车马上要出发；dans une minute 表示“一分钟后”。", "section": "S3 语法机经真题", "source": "S3 Q93"}, {"num": 94, "cn": "订阅这份周刊只需51欧元。", "fr": "L’______ à cette revue hebdomadaire ne coûte que 51 euros.", "options": [{"letter": "A", "text": "adhésion"}, {"letter": "B", "text": "inscription"}, {"letter": "C", "text": "abonnement"}, {"letter": "D", "text": "enregistrement"}], "answerLetter": "C", "answerText": "abonnement", "alsoCorrect": [], "correctSentence": "L’abonnement à cette revue hebdomadaire ne coûte que 51 euros.", "explanation": "abonnement à une revue = 订阅杂志/期刊；revue hebdomadaire 是周刊。", "section": "S3 语法机经真题", "source": "S3 Q94"}, {"num": 95, "cn": "高速公路上的严重事故造成了严重堵车。", "fr": "Un grave accident survenu sur l’autoroute a provoqué d’importants ______.", "options": [{"letter": "A", "text": "trafics"}, {"letter": "B", "text": "carrefours"}, {"letter": "C", "text": "croisements"}, {"letter": "D", "text": "embouteillages"}], "answerLetter": "D", "answerText": "embouteillages", "alsoCorrect": [], "correctSentence": "Un grave accident survenu sur l’autoroute a provoqué d’importants embouteillages.", "explanation": "provoquer des embouteillages = 造成交通堵塞；accident sur l’autoroute 语境对应。", "section": "S3 语法机经真题", "source": "S3 Q95"}, {"num": 96, "cn": "这场展览非常成功，组织者决定延长两个月。", "fr": "Cette exposition ______ un tel succès que les organisateurs ont décidé de la prolonger de deux mois.", "options": [{"letter": "A", "text": "connaît"}, {"letter": "B", "text": "plaît"}, {"letter": "C", "text": "sait"}, {"letter": "D", "text": "tient"}], "answerLetter": "A", "answerText": "connaît", "alsoCorrect": [], "correctSentence": "Cette exposition connaît un tel succès que les organisateurs ont décidé de la prolonger de deux mois.", "explanation": "connaître un succès = 获得成功/取得成功；un tel succès que... = 如此成功以至于……。", "section": "S3 语法机经真题", "source": "S3 Q96"}, {"num": 97, "cn": "好好研究这个食谱！这是一道容易做的菜。", "fr": "Étudie bien la recette ! C’est un plat facile ______ faire.", "options": [{"letter": "A", "text": "de"}, {"letter": "B", "text": "pour"}, {"letter": "C", "text": "à"}, {"letter": "D", "text": "sur"}], "answerLetter": "C", "answerText": "à", "alsoCorrect": [], "correctSentence": "Étudie bien la recette ! C’est un plat facile à faire.", "explanation": "形容词 facile 后接动词原形常用 à：facile à faire = 容易做。", "section": "S3 语法机经真题", "source": "S3 Q97"}, {"num": 98, "cn": "那名被报失踪的20岁年轻女子昨晚被发现死在一片森林里。", "fr": "La jeune femme de 20 ans portée disparue ______ morte hier soir dans une forêt.", "options": [{"letter": "A", "text": "retrouvait"}, {"letter": "B", "text": "a retrouvé"}, {"letter": "C", "text": "est retrouvée"}, {"letter": "D", "text": "a été retrouvée"}], "answerLetter": "D", "answerText": "a été retrouvée", "alsoCorrect": [], "correctSentence": "La jeune femme de 20 ans portée disparue a été retrouvée morte hier soir dans une forêt.", "explanation": "主语是 la jeune femme，她是“被发现”，所以用被动态：a été retrouvée；过去分词 retrouvée 与 femme 阴性单数配合。", "section": "S3 语法机经真题", "source": "S3 Q98"}, {"num": 99, "cn": "看那边，那就是我跟你说过的那位女药剂师。", "fr": "Regardez là-bas, c’est la pharmacienne ______ je t’ai parlé.", "options": [{"letter": "A", "text": "qui"}, {"letter": "B", "text": "que"}, {"letter": "C", "text": "où"}, {"letter": "D", "text": "dont"}], "answerLetter": "D", "answerText": "dont", "alsoCorrect": [], "correctSentence": "Regardez là-bas, c’est la pharmacienne dont je t’ai parlé.", "explanation": "parler de quelqu’un = 谈到某人；关系代词代替 de + 先行词，用 dont。", "section": "S3 语法机经真题", "source": "S3 Q99"}, {"num": 100, "cn": "25岁时，Sophie旅行得和她年长很多的表兄一样多。", "fr": "À 25 ans, Sophie a ______ voyagé que son cousin qui est beaucoup plus âgé.", "options": [{"letter": "A", "text": "aussi"}, {"letter": "B", "text": "autant"}, {"letter": "C", "text": "si"}, {"letter": "D", "text": "tant"}], "answerLetter": "B", "answerText": "autant", "alsoCorrect": [], "correctSentence": "À 25 ans, Sophie a autant voyagé que son cousin qui est beaucoup plus âgé.", "explanation": "autant + 动词 + que = 和……一样多地做某事；aussi 修饰形容词/副词，不修饰动词数量。", "section": "S3 语法机经真题", "source": "S3 Q100"}, {"num": 101, "cn": "旅客们在3号站台等火车。", "fr": "Les voyageurs attendent le train sur le ______ numéro 3.", "options": [{"letter": "A", "text": "quai"}, {"letter": "B", "text": "guichet"}, {"letter": "C", "text": "billet"}, {"letter": "D", "text": "arrêt"}], "answerLetter": "A", "answerText": "quai", "alsoCorrect": [], "correctSentence": "Les voyageurs attendent le train sur le quai numéro 3.", "explanation": "quai = 火车站台、站台边。guichet 是售票窗口；billet 是票；arrêt 多指公交/地铁站点或停靠。你记成 kai 的那个词，标准拼写是 quai。", "section": "S3 语法机经真题", "source": "S3 Q101"}, {"num": 102, "cn": "开往里昂的火车将在12道/12号线路发车。", "fr": "Le train pour Lyon partira voie ______.", "options": [{"letter": "A", "text": "douze"}, {"letter": "B", "text": "douzième"}, {"letter": "C", "text": "le douze"}, {"letter": "D", "text": "à douze"}], "answerLetter": "A", "answerText": "douze", "alsoCorrect": [], "correctSentence": "Le train pour Lyon partira voie douze.", "explanation": "SNCF 播报里常说 voie 12 = 12道/12号发车线。voie 后面直接接基数词：voie deux, voie cinq, voie douze。quai 更像“站台”，voie 更像“列车所在轨道/发车道”。", "section": "S3 语法机经真题", "source": "S3 Q102"}, {"num": 103, "cn": "去马赛的火车将在5号站台发车。", "fr": "Le train pour Marseille partira du ______ numéro 5.", "options": [{"letter": "A", "text": "quai"}, {"letter": "B", "text": "gare"}, {"letter": "C", "text": "wagon"}, {"letter": "D", "text": "guichet"}], "answerLetter": "A", "answerText": "quai", "alsoCorrect": [], "correctSentence": "Le train pour Marseille partira du quai numéro 5.", "explanation": "partir du quai numéro 5 = 从5号站台发车。gare 是火车站；wagon 是车厢；guichet 是售票窗口。", "section": "S3 语法机经真题", "source": "S3 Q103"}, {"num": 104, "cn": "火车刚刚开走，我们到车站时已经错过了。", "fr": "Le train venait de ______ quand nous sommes arrivés à la gare.", "options": [{"letter": "A", "text": "partir"}, {"letter": "B", "text": "partait"}, {"letter": "C", "text": "partira"}, {"letter": "D", "text": "parti"}], "answerLetter": "A", "answerText": "partir", "alsoCorrect": [], "correctSentence": "Le train venait de partir quand nous sommes arrivés à la gare.", "explanation": "venir de + 动词原形 = 刚刚……。这里 venait de partir = 刚刚开走。这个题型在 Test 1–20 里有 train/gare 相关句。", "section": "S3 语法机经真题", "source": "S3 Q104"}, {"num": 105, "cn": "上火车之前，应该把车票放进打票机检票。", "fr": "______ monter dans le train, on doit faire passer son billet dans la machine à composter.", "options": [{"letter": "A", "text": "Avant"}, {"letter": "B", "text": "Avant de"}, {"letter": "C", "text": "Devant"}, {"letter": "D", "text": "Après"}], "answerLetter": "B", "answerText": "Avant de", "alsoCorrect": [], "correctSentence": "Avant de monter dans le train, on doit faire passer son billet dans la machine à composter.", "explanation": "avant de + 动词原形 = 在做……之前。devant 是“在……前面”的空间位置，不接动词原形。", "section": "S3 语法机经真题", "source": "S3 Q105"}, {"num": 106, "cn": "到站后，乘客们从车厢下车，走向站台。", "fr": "À l’arrivée, les voyageurs descendent du wagon et se dirigent vers le ______.", "options": [{"letter": "A", "text": "quai"}, {"letter": "B", "text": "guichet"}, {"letter": "C", "text": "billet"}, {"letter": "D", "text": "contrôleur"}], "answerLetter": "A", "answerText": "quai", "alsoCorrect": [], "correctSentence": "À l’arrivée, les voyageurs descendent du wagon et se dirigent vers le quai.", "explanation": "下车后走向的是 quai = 站台。contrôleur 是检票员；guichet 是售票窗口。", "section": "S3 语法机经真题", "source": "S3 Q106"}, {"num": 107, "cn": "列车员通知乘客：火车将在2号站台进站。", "fr": "Le contrôleur annonce aux voyageurs que le train va entrer en gare au ______ numéro 2.", "options": [{"letter": "A", "text": "quai"}, {"letter": "B", "text": "billet"}, {"letter": "C", "text": "compte"}, {"letter": "D", "text": "carrefour"}], "answerLetter": "A", "answerText": "quai", "alsoCorrect": [], "correctSentence": "Le contrôleur annonce aux voyageurs que le train va entrer en gare au quai numéro 2.", "explanation": "au quai numéro 2 = 在2号站台。注意 quai 拼写是 q-u-a-i，不是 kai。", "section": "S3 语法机经真题", "source": "S3 Q107"}, {"num": 108, "source": "词汇 Q83", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Des oiseaux migrateurs peuvent être porteurs sains du virus H5N1. Que signifie l’expression PORTEURS SAINS ?", "options": [{"letter": "A", "text": "individus malades contagieux"}, {"letter": "B", "text": "individus bien portants contagieux"}, {"letter": "C", "text": "individus malades non contagieux"}, {"letter": "D", "text": "individus bien portants non contagieux"}], "answerLetter": "B", "answerText": "individus bien portants contagieux", "alsoCorrect": [], "correctSentence": "Des oiseaux migrateurs peuvent être porteurs sains du virus H5N1. Que signifie l’expression PORTEURS SAINS ?", "explanation": "porteur sain = 自身看起来健康、无明显症状，但能携带并传播病原体。"}, {"num": 109, "source": "词汇 Q84", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "La réunion risque de se terminer tard. Veux-tu que je te ______ chez toi après ?", "options": [{"letter": "A", "text": "rapporte"}, {"letter": "B", "text": "reconduise"}, {"letter": "C", "text": "retourne"}, {"letter": "D", "text": "revienne"}], "answerLetter": "B", "answerText": "reconduise", "alsoCorrect": [], "correctSentence": "La réunion risque de se terminer tard. Veux-tu que je te reconduise chez toi après ?", "explanation": "reconduire quelqu’un chez lui = 送某人回家；veux-tu que 后接虚拟式，je → reconduise。"}, {"num": 110, "source": "词汇 Q85", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "— Alors Marc, cet examen de fin d’année ? — Pas très brillant, j’ai été ______.", "options": [{"letter": "A", "text": "recalé"}, {"letter": "B", "text": "rejeté"}, {"letter": "C", "text": "retourné"}, {"letter": "D", "text": "rétrogradé"}], "answerLetter": "A", "answerText": "recalé", "alsoCorrect": [], "correctSentence": "— Alors Marc, cet examen de fin d’année ? — Pas très brillant, j’ai été recalé.", "explanation": "être recalé à un examen = 考试没通过/被刷掉。"}, {"num": 111, "source": "词汇 Q86", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Coup de ______ à ce chercheur français qui révolutionne les mathématiques.", "options": [{"letter": "A", "text": "chapeau"}, {"letter": "B", "text": "marteau"}, {"letter": "C", "text": "sifflet"}, {"letter": "D", "text": "tonnerre"}], "answerLetter": "A", "answerText": "chapeau", "alsoCorrect": [], "correctSentence": "Coup de chapeau à ce chercheur français qui révolutionne les mathématiques.", "explanation": "固定表达：coup de chapeau à quelqu’un = 向某人致敬/为某人喝彩。"}, {"num": 112, "source": "词汇 Q87", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Je veux ______ mes études en France.", "options": [{"letter": "A", "text": "apprendre"}, {"letter": "B", "text": "donner"}, {"letter": "C", "text": "faire"}, {"letter": "D", "text": "passer"}], "answerLetter": "C", "answerText": "faire", "alsoCorrect": [], "correctSentence": "Je veux faire mes études en France.", "explanation": "固定搭配：faire ses études = 求学/读书。"}, {"num": 113, "source": "词汇 Q88", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Cette pièce de théâtre s’adresse autant aux petits qu’aux grands, ______ nous vous conseillons d’y aller en famille.", "options": [{"letter": "A", "text": "cependant"}, {"letter": "B", "text": "c’est pourquoi"}, {"letter": "C", "text": "parce que"}, {"letter": "D", "text": "puisque"}], "answerLetter": "B", "answerText": "c’est pourquoi", "alsoCorrect": [], "correctSentence": "Cette pièce de théâtre s’adresse autant aux petits qu’aux grands, c’est pourquoi nous vous conseillons d’y aller en famille.", "explanation": "前面说明适合大人小孩，后面推出建议，所以用 c’est pourquoi = 因此。"}, {"num": 114, "source": "词汇 Q89", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Paul doit suivre un régime strict pour maigrir parce qu’il mange ______ de matières grasses.", "options": [{"letter": "A", "text": "assez"}, {"letter": "B", "text": "plus"}, {"letter": "C", "text": "trop"}, {"letter": "D", "text": "un peu"}], "answerLetter": "C", "answerText": "trop", "alsoCorrect": [], "correctSentence": "Paul doit suivre un régime strict pour maigrir parce qu’il mange trop de matières grasses.", "explanation": "trop de + 名词 = 太多……；吃太多脂肪，所以需要减肥。"}, {"num": 115, "source": "词汇 Q90", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Le juge pensait détenir la vérité. Que signifie le terme DÉTENIR ?", "options": [{"letter": "A", "text": "corroborer"}, {"letter": "B", "text": "posséder"}, {"letter": "C", "text": "publier"}, {"letter": "D", "text": "transmettre"}], "answerLetter": "B", "answerText": "posséder", "alsoCorrect": [], "correctSentence": "Le juge pensait détenir la vérité. Que signifie le terme DÉTENIR ?", "explanation": "détenir = 持有/拥有；détenir la vérité = 掌握真相。"}, {"num": 116, "source": "词汇 Q91", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "______ qu’elle soit adulte, elle n’arrive pas à prendre de décisions.", "options": [{"letter": "A", "text": "À moins"}, {"letter": "B", "text": "Bien"}, {"letter": "C", "text": "Pour"}, {"letter": "D", "text": "Pourvu"}], "answerLetter": "B", "answerText": "Bien", "alsoCorrect": [], "correctSentence": "Bien qu’elle soit adulte, elle n’arrive pas à prendre de décisions.", "explanation": "Bien que + 虚拟式 = 尽管；Bien qu’elle soit adulte = 尽管她已成年。"}, {"num": 117, "source": "词汇 Q92", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Trois jours durant, les candidats au concours ont dû mettre ______ toutes leurs connaissances sous l’œil attentif du jury.", "options": [{"letter": "A", "text": "à disposition"}, {"letter": "B", "text": "à profit"}, {"letter": "C", "text": "en marche"}, {"letter": "D", "text": "en présence"}], "answerLetter": "B", "answerText": "à profit", "alsoCorrect": [], "correctSentence": "Trois jours durant, les candidats au concours ont dû mettre à profit toutes leurs connaissances sous l’œil attentif du jury.", "explanation": "mettre à profit = 利用、充分运用；mettre à profit ses connaissances = 运用知识。"}, {"num": 118, "source": "词汇 Q93", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Le gouvernement vient d’annoncer la suppression de 3000 emplois. Hier, ______, il avait déclaré tout le contraire.", "options": [{"letter": "A", "text": "ainsi"}, {"letter": "B", "text": "donc"}, {"letter": "C", "text": "en effet"}, {"letter": "D", "text": "pourtant"}], "answerLetter": "D", "answerText": "pourtant", "alsoCorrect": [], "correctSentence": "Le gouvernement vient d’annoncer la suppression de 3000 emplois. Hier, pourtant, il avait déclaré tout le contraire.", "explanation": "前后相反：现在宣布裁员，昨天却说相反的话。pourtant = 然而。"}, {"num": 119, "source": "词汇 Q94", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "______ d’envoyer le document le plus rapidement possible.", "options": [{"letter": "A", "text": "Prière"}, {"letter": "B", "text": "Demande"}, {"letter": "C", "text": "Veuillez"}, {"letter": "D", "text": "Vouloir"}], "answerLetter": "A", "answerText": "Prière", "alsoCorrect": [], "correctSentence": "Prière d’envoyer le document le plus rapidement possible.", "explanation": "固定公文表达：Prière de + infinitif = 请……。"}, {"num": 120, "source": "词汇 Q95", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Je vous souhaite un bon voyage en vous ______ les coordonnées téléphoniques.", "options": [{"letter": "A", "text": "informant"}, {"letter": "B", "text": "distinguant"}, {"letter": "C", "text": "indiquant"}, {"letter": "D", "text": "prévenant"}], "answerLetter": "C", "answerText": "indiquant", "alsoCorrect": [], "correctSentence": "Je vous souhaite un bon voyage en vous indiquant les coordonnées téléphoniques.", "explanation": "indiquer les coordonnées = 告知/提供联系方式。"}, {"num": 121, "source": "词汇 Q96", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Vous avez beau lui expliquer, il campe sur ses positions. Que signifie la première partie de cette phrase ?", "options": [{"letter": "A", "text": "vous multipliez les arguments"}, {"letter": "B", "text": "vous parlez de manière polie"}, {"letter": "C", "text": "vous racontez des histoires"}, {"letter": "D", "text": "vous utilisez un langage soutenu"}], "answerLetter": "A", "answerText": "vous multipliez les arguments", "alsoCorrect": [], "correctSentence": "Vous avez beau lui expliquer, il campe sur ses positions. Que signifie la première partie de cette phrase ?", "explanation": "avoir beau + infinitif = 即使/无论怎么……也徒劳；这里指你不断解释、摆出理由。"}, {"num": 122, "source": "词汇 Q97", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "La candidate préférée des Français pour les prochaines élections est la présidente du Parti Vert. Elle est en tête dans les ______.", "options": [{"letter": "A", "text": "actualités"}, {"letter": "B", "text": "chroniques"}, {"letter": "C", "text": "dépêches"}, {"letter": "D", "text": "sondages"}], "answerLetter": "D", "answerText": "sondages", "alsoCorrect": [], "correctSentence": "La candidate préférée des Français pour les prochaines élections est la présidente du Parti Vert. Elle est en tête dans les sondages.", "explanation": "être en tête dans les sondages = 在民调中领先。"}, {"num": 123, "source": "词汇 Q98", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Je me méfie de cet entretien avec le directeur, ______ tout s’annonce favorablement.", "options": [{"letter": "A", "text": "bien que"}, {"letter": "B", "text": "pour que"}, {"letter": "C", "text": "pourvu que"}, {"letter": "D", "text": "tant que"}], "answerLetter": "A", "answerText": "bien que", "alsoCorrect": [], "correctSentence": "Je me méfie de cet entretien avec le directeur, bien que tout s’annonce favorablement.", "explanation": "bien que = 尽管；虽然一切看起来有利，我仍然警惕。"}, {"num": 124, "source": "词汇 Q99", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Nous devons en permanence être en alerte ______ la situation soit rétablie.", "options": [{"letter": "A", "text": "de crainte que"}, {"letter": "B", "text": "jusqu’à ce que"}, {"letter": "C", "text": "pour peu que"}, {"letter": "D", "text": "pourvu que"}], "answerLetter": "B", "answerText": "jusqu’à ce que", "alsoCorrect": [], "correctSentence": "Nous devons en permanence être en alerte jusqu’à ce que la situation soit rétablie.", "explanation": "jusqu’à ce que + 虚拟式 = 直到……为止；soit rétablie 是虚拟式被动态。"}, {"num": 125, "source": "词汇 Q100", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "______ de réclamer la fermeture de l’usine chimique depuis des années, les ouvriers ont finalement obtenu satisfaction.", "options": [{"letter": "A", "text": "À force"}, {"letter": "B", "text": "Au lieu"}, {"letter": "C", "text": "D 析。", "fr": "La municipalité de Clermont-Ferrand a aménagé une dizaine de zones piétonnes ______ la mobilité de nos concitoyens.", "options": [{"letter": "A", "text": "en vertu de"}, {"letter": "B", "text": "à l’instar de"}, {"letter": "C", "text": "en faveur de"}, {"letter": "D", "text": "à la place de"}], "answerLetter": "C", "answerText": "en faveur de", "alsoCorrect": [], "correctSentence": "La municipalité de Clermont-Ferrand a aménagé une dizaine de zones piétonnes en faveur de la mobilité de nos concitoyens.", "explanation": "en faveur de = 有利于/为了支持；步行区有利于市民出行。"}, {"num": 130, "source": "词汇 Q105", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Céline ne viendra pas au camp de vacances, ses parents sont dans ______ de payer le voyage.", "options": [{"letter": "A", "text": "l’impossibilité"}, {"letter": "B", "text": "l’importance"}, {"letter": "C", "text": "l’import"}, {"letter": "D", "text": "l’impatience"}], "answerLetter": "A", "answerText": "l’impossibilité", "alsoCorrect": [], "correctSentence": "Céline ne viendra pas au camp de vacances, ses parents sont dans l’impossibilité de payer le voyage.", "explanation": "être dans l’impossibilité de faire = 无法做某事。"}, {"num": 131, "source": "词汇 Q106", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "La date limite de l’appel d’offre était fixée au 31 mars, ______ votre proposition nous est parvenue le 3 avril.", "options": [{"letter": "A", "text": "ainsi"}, {"letter": "B", "text": "certes"}, {"letter": "C", "text": "or"}, {"letter": "D", "text": "puisque"}], "answerLetter": "C", "answerText": "or", "alsoCorrect": [], "correctSentence": "La date limite de l’appel d’offre était fixée au 31 mars, or votre proposition nous est parvenue le 3 avril.", "explanation": "or = 然而/可是，用来引出与前文冲突的信息：截止31日，但提案3日才到。"}, {"num": 132, "source": "词汇 Q107", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "J’ai eu le coup de foudre pour ce pays. Depuis le temps que j’en rêvais ! ______ que je le découvrais, je compr eur, ______ les pompiers viennent me secourir !", "options": [{"letter": "A", "text": "pendant que"}, {"letter": "B", "text": "en attendant que"}, {"letter": "C", "text": "après que"}, {"letter": "D", "text": "avant que"}], "answerLetter": "D", "answerText": "avant que", "alsoCorrect": [], "correctSentence": "— Alors qu’est-ce qui t’est arrivé hier soir ? Je t’ai attendue. — Eh bien, je suis restée bloquée 2 heures dans l’ascenseur, avant que les pompiers viennent me secourir !", "explanation": "rester bloquée deux heures avant que les pompiers viennent = 被困两小时后消防员才来。avant que 后接虚拟式。"}, {"num": 155, "source": "词汇 Q130", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Madame, j’ai bien reçu votre dossier d’inscription. Malheureusement, il n’y a plus de place disponible pour cette fois. ______, je conserve votre dossier au cas où un candidat se désisterait.", "options": [{"letter": "A", "text": "Autrement dit"}, {"letter": "B", "text": "Cependant"}, {"letter": "C", "text": "D’ailleurs"}, {"letter": "D", "text": "En outre"}], "answerLetter": "B", "answerText": "Cependant", "alsoCorrect": [], "correctSentence": "Madame, j’ai bien reçu votre dossier d’inscription. Malheureusement, il n’y a plus de place disponible pour cette fois. Cependant, je conserve votre dossier au cas où un candidat se désisterait.", "explanation": "前面说没有名额，后面说仍保留材料，是转折关系：cependant。"}, {"num": 156, "source": "词汇 Q131", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Le ministre de l’éducation nationale a affirmé qu’une mesure concernant la suppression des cours le samedi matin entrerait en ______ dès la rentrée prochaine.", "options": [{"letter": "A", "text": "exercice"}, {"letter": "B", "text": "matière"}, {"letter": "C", "text": "relation"}, {"letter": "D", "text": "vigueur"}], "answerLetter": "D", "answerText": "vigueur", "alsoCorrect": [], "correctSentence": "Le ministre de l’éducation nationale a affirmé qu’une mesure concernant la suppression des cours le samedi matin entrerai
