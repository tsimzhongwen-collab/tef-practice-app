marcher"}, {"letter": "C", "text": "promener"}, {"letter": "D", "text": "rendre"}], "answerLetter": "A", "answerText": "aller", "alsoCorrect": [], "correctSentence": "Cet magasin n’est pas loin de chez moi. On peut y aller à pied.", "explanation": "aller à pied = 步行去；y 指去那个商店。"}, {"num": 164, "source": "词汇 Q139", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Il a lancé ______ pour inciter les citadins à faire face aux problèmes environnementaux.", "options": [{"letter": "A", "text": "un défaut"}, {"letter": "B", "text": "une défaite"}, {"letter": "C", "text": "une défense"}, {"letter": "D", "text": "un défi"}], "answerLetter": "D", "answerText": "un défi", "alsoCorrect": [], "correctSentence": "Il a lancé un défi pour inciter les citadins à faire face aux problèmes environnementaux.", "explanation": "lancer un défi = 发起挑战。"}, {"num": 165, "source": "词汇 Q140", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Le parlement a finalement ______ le projet de loi après une longue discussion.", "options": [{"letter": "A", "text": "adulé"}, {"letter": "B", "text": "adopté"}, {"letter": "C", "text": "accusé"}, {"letter": "D", "text": "assiégé"}], "answerLetter": "B", "answerText": "adopté", "alsoCorrect": [], "correctSentence": "Le parlement a finalement adopté le projet de loi après une longue discussion.", "explanation": "adopter un projet de loi = 通过法案。"}, {"num": 166, "source": "词汇 Q141", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Les élèves ont passé leur examen hier après-midi, ______ la température en classe était élevée.", "options": [{"letter": "A", "text": "ou bien"}, {"letter": "B", "text": "sinon"}, {"letter": "C", "text": "autrement"}, {"letter": "D", "text": "alors que"}], "answerLetter": "D", "answerText": "alors que", "alsoCorrect": [], "correctSentence": "Les élèves ont passé leur examen hier après-midi, alors que la température en classe était élevée.", "explanation": "alors que 可表示对比/让步背景：考试进行时，教室温度却很高。"}, {"num": 167, "source": "词汇 Q142", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Les gendarmes ont constaté une ______ des cambriolages dans le 16e arrondissement.", "options": [{"letter": "A", "text": "redondance"}, {"letter": "B", "text": "recrudescence"}, {"letter": "C", "text": "accélération"}, {"letter": "D", "text": "précipitation"}], "answerLetter": "B", "answerText": "recrudescence", "alsoCorrect": [], "correctSentence": "Les gendarmes ont constaté une recrudescence des cambriolages dans le 16e arrondissement.", "explanation": "recrudescence = 重新增多/加剧；une recrudescence des cambriolages = 盗窃案增加。"}, {"num": 168, "source": "词汇 Q143", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "J’ai lu les dossiers que vous m’avez soumis, et j’enverrai demain ______ propositions pour la réunion prochaine.", "options": [{"letter": "A", "text": "à nouveau"}, {"letter": "B", "text": "autrement"}, {"letter": "C", "text": "d’autres"}, {"letter": "D", "text": "à propos"}], "answerLetter": "C", "answerText": "d’autres", "alsoCorrect": [], "correctSentence": "J’ai lu les dossiers que vous m’avez soumis, et j’enverrai demain d’autres propositions pour la réunion prochaine.", "explanation": "d’autres propositions = 其他建议/另外一些提案。"}, {"num": 169, "source": "词汇 Q144", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Il cherche un homme qui ______ le même prénom que lui.", "options": [{"letter": "A", "text": "tienne"}, {"letter": "B", "text": "garde"}, {"letter": "C", "text": "porte"}, {"letter": "D", "text": "mette"}], "answerLetter": "C", "answerText": "porte", "alsoCorrect": [], "correctSentence": "Il cherche un homme qui porte le même prénom que lui.", "explanation": "porter un prénom = 叫某个名字。"}, {"num": 170, "source": "词汇 Q145", "section": "词汇 / 固定表达补充", "cn": "词汇、固定搭配或语义辨析。", "fr": "Les scientifiques vont bientôt mener ______ sur ce phénomène astronomique.", "options": [{"letter": "A", "text": "une formation"}, {"letter": "B", "text": "une étude"}, {"letter": "C", "text": "un corpus"}, {"letter": "D", "text": "un cursus"}], "answerLetter": "B", "answerText": "une étude", "alsoCorrect": [], "correctSentence": "Les scientifiques vont bientôt mener une étude sur ce phénomène astronomique.", "explanation": "mener une étude sur = 对……进行研究。"}];
let idx=0, right=0, wrong=0, answered=false, mode='all', wrongList=[];
const KEY='tef_s3_truequiz_wrongboard_v2';
const $=id=>document.getElementById(id);
function loadWrong(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return []}}
function saveWrong(list){localStorage.setItem(KEY,JSON.stringify(list)); updateWrongButtons();}
function qKey(q){return (q.section||'')+'|'+q.num+'|'+q.fr;}
function addWrong(q, yours){let list=loadWrong(); let key=qKey(q); let item={key, num:q.num, section:q.section, source:q.source, fr:q.fr, cn:q.cn, options:q.options, answerLetter:q.answerLetter, answerText:q.answerText, correctSentence:q.correctSentence, explanation:q.explanation, lastYours:yours, wrongAt:new Date().toLocaleString()}; let i=list.findIndex(x=>x.key===key); if(i>=0)list[i]=item; else list.push(item); saveWrong(list);}
function removeWrong(q){let key=q.key||qKey(q); saveWrong(loadWrong().filter(x=>x.key!==key));}
function updateWrongButtons(){let n=loadWrong().length; $('wrongBoard').textContent='错题板 '+n; $('wrongBoard2').textContent='错题板 '+n;}
function currentList(){return mode==='wrong'?wrongList:DATA;}
function renderJump(){const j=$('jump'); j.innerHTML=DATA.map((q,i)=>`<button class="j ${q._bad?'bad':q._done?'done':''}" onclick="mode='all';idx=${i};render()">${q.num}</button>`).join('');}
function render(){answered=false; let list=currentList(); if(!list.length){showWrongEmpty();return;} let q=list[idx]; $('quiz').style.display='block'; $('summary').style.display='none'; $('section').innerHTML=(q.section||'练习')+(q.source?`<span class="badge">${q.source}</span>`:''); $('qno').textContent=(mode==='wrong'?'错题板 ':'Question ')+(idx+1)+' / '+list.length; $('bar').style.width=((idx)/Math.max(list.length,1)*100)+'%'; $('cn').textContent=q.cn||''; $('question').textContent=q.fr; $('options').innerHTML=q.options.map(o=>`<button class="opt" onclick="choose('${o.letter}', this)"><span class="letter">${o.letter}</span><span>${o.text}</span></button>`).join(''); $('feedback').style.display='none'; $('feedback').className='feedback'; $('next').style.display='none'; $('prev').disabled=idx===0; renderJump(); updateStats(); updateWrongButtons();}
function choose(letter, btn){if(answered)return; answered=true; let list=currentList(), q=list[idx]; document.querySelectorAll('.opt').forEach(b=>b.disabled=true); let ok=letter===q.answerLetter || (q.alsoCorrect||[]).includes(letter); if(ok){btn.classList.add('correct'); right++; if(mode==='wrong'){removeWrong(q);} $('feedback').className='feedback ok'; $('feedback').innerHTML='<h3>正确</h3>'; $('feedback').style.display='block'; setTimeout(nextQ,500);} else {btn.classList.add('wrong'); document.querySelectorAll('.opt').forEach(b=>{if(b.querySelector('.letter').textContent===q.answerLetter)b.classList.add('correct');}); wrong++; if(mode==='all')DATA.find(x=>x.num===q.num && x.fr===q.fr)._bad=true; addWrong(q, letter); $('feedback').className='feedback'; $('feedback').innerHTML=`<h3>错误</h3><b>正确答案：</b>${q.answerLetter}. ${q.answerText}<br><b>完整句：</b>${q.correctSentence||''}<br><b>解析：</b>${q.explanation||''}`; $('feedback').style.display='block'; $('next').style.display='inline-block';} if(mode==='all')DATA.find(x=>x.num===q.num && x.fr===q.fr)._done=true; updateStats(); renderJump();}
function nextQ(){let list=currentList(); if(mode==='wrong'){wrongList=loadWrong(); list=wrongList; if(!list.length){showWrongEmpty();return;} if(idx>=list.length-1)idx=0; else idx++;} else {if(idx<list.length-1)idx++; else {showSummary();return;}} render(); window.scrollTo({top:0,behavior:'smooth'});}
function updateStats(){let total=right+wrong; $('right').textContent=right; $('wrong').textContent=wrong; $('rate').textContent='正确率 '+(total?Math.round(right/total*100):0)+'%';}
function showSummary(){$('quiz').style.display='none'; $('summary').style.display='block'; let wrongItems=loadWrong(); $('summary').innerHTML=`<h2>完成</h2><p>本轮正确：<b>${right}</b>｜错误：<b>${wrong}</b></p><p>错题板当前：<b>${wrongItems.length}</b> 题</p><button class="primary" onclick="startWrongBoard()">进入错题板</button> <button class="secondary" onclick="restart()">重新开始</button>`;}
function showWrongEmpty(){$('quiz').style.display='none'; $('summary').style.display='block'; $('summary').innerHTML=`<h2>错题板</h2><p>目前没有错题。</p><button class="secondary" onclick="mode='all';idx=0;render()">返回题库</button>`; updateWrongButtons();}
function startWrongBoard(){wrongList=loadWrong(); mode='wrong'; idx=0; render();}
function restart(){if(confirm('重置本轮进度？错题板不会清空。')){idx=0;right=0;wrong=0;mode='all';DATA.forEach(q=>{q._done=false;q._bad=false});render();}}
$('next').onclick=nextQ; $('prev').onclick=()=>{if(idx>0){idx--;render();}}; $('restart').onclick=restart; $('wrongBoard').onclick=startWrongBoard; $('wrongBoard2').onclick=startWrongBoard; $('vocabStart').onclick=()=>{mode='all';idx=DATA.findIndex(q=>q.section==='词汇 / 固定表达补充');render();};
setInterval(()=>{let s=Math.floor((Date.now()-startTime)/1000),m=Math.floor(s/60);$('timer').textContent=String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');},1000); const startTime=Date.now();
render();
</script></body></html>
