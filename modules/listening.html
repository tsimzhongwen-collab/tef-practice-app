{no:'14-1',group:'new',type:'choice',title:'Opera Locos：喜歌剧表演',tag:'报道 / 双问 1',q:"Question 1. D'après le reportage, ce spectacle…",audio:`The Opera Locos est un spectacle d'opéra comique où cinq chanteurs lyriques exceptionnels interprètent certains des airs d'opéra les plus connus, parfois mélangés de manière originale avec le rock et la pop. Le spectacle réunit cinq personnages à la forte personnalité : une soprano, une mezzo-soprano, un baryton, un ténor et un contre-ténor. Sur scène, ils reprennent les clichés de l'opéra pour mieux les détourner, brisent les codes habituels du genre et cherchent un contact plus direct avec le public.`,cn:`《The Opera Locos》是一部喜歌剧表演，五位出色的歌剧演员演唱一些最著名的歌剧片段，有时还以原创方式与摇滚和流行音乐结合。这个表演集合了五个个性鲜明的人物：女高音、女中音、男中音、男高音和假声男高音。在舞台上，他们借用歌剧的刻板印象并加以改造，打破这一艺术形式的传统规则，同时寻求与观众更直接的联系。`,opts:[['A',"reprend les clichés et brise les codes de l'opéra",'借用刻板印象并打破歌剧规则'],['B',"présente une version traditionnelle de grands opéras",'呈现传统版本的经典歌剧'],['C',"réunit uniquement des chanteurs amateurs",'只集合业余歌手'],['D',"remplace la musique classique par de la danse contemporaine",'用当代舞替代古典音乐']],ans:'A'},
{no:'14-2',group:'new',type:'choice',title:'Opera Locos：喜歌剧表演',tag:'报道 / 双问 2',q:"Question 2. L'Opera Locos…",audio:`The Opera Locos est un spectacle d'opéra comique où cinq chanteurs lyriques exceptionnels interprètent certains des airs d'opéra les plus connus, parfois mélangés de manière originale avec le rock et la pop. Le spectacle réunit cinq personnages à la forte personnalité : une soprano, une mezzo-soprano, un baryton, un ténor et un contre-ténor. Sur scène, ils reprennent les clichés de l'opéra pour mieux les détourner, brisent les codes habituels du genre et cherchent un contact plus direct avec le public.`,cn:`《The Opera Locos》是一部喜歌剧表演，五位出色的歌剧演员演唱一些最著名的歌剧片段，有时还以原创方式与摇滚和流行音乐结合。这个表演集合了五个个性鲜明的人物：女高音、女中音、男中音、男高音和假声男高音。在舞台上，他们借用歌剧的刻板印象并加以改造，打破这一艺术形式的传统规则，同时寻求与观众更直接的联系。`,opts:[['A',"casse la barrière de statut entre comédiens et spectateurs",'打破演员与观众之间的身份隔阂'],['B',"interdit toute interaction avec le public",'禁止与观众互动'],['C',"s'adresse uniquement aux spécialistes de l'opéra",'只面向歌剧专业人士'],['D',"présente cinq personnages sans personnalité particulière",'呈现五个没有鲜明个性的人物']],ans:'A'},
{no:'15-1',group:'new',type:'choice',title:'Too Good To Go：环保应用',tag:'长听力 / 双问 1',q:"Question 1. L'application permet…",audio:`Too Good To Go est une application qui propose une idée simple : sauver de la nourriture tout en aidant la planète. Grâce à cette application, les consommateurs peuvent acheter, à prix réduit, des aliments que les supermarchés, les boulangeries ou les restaurants n'ont pas vendus et dont ils doivent se débarrasser en fin de journée. Pour les commerces, cela limite le gaspillage. Pour les utilisateurs, c'est une solution économique et écologique. Beaucoup disent qu'ils sont satisfaits, parce qu'ils économisent de l'argent tout en participant à une action éco-responsable.`,cn:`Too Good To Go 是一个提出简单理念的应用：拯救食物，同时帮助地球。通过这个应用，消费者可以用较低价格购买超市、面包店或餐厅当天没有卖掉、最后必须处理掉的食品。对商家来说，这能减少浪费。对用户来说，这是一个经济又环保的办法。许多人说他们很满意，因为他们既省钱，也参与了一项生态责任行动。`,opts:[['A',"d'acheter des aliments dont les supermarchés doivent se débarrasser",'购买超市必须处理掉的食品'],['B',"de commander uniquement des produits biologiques livrés à domicile",'只订购送货上门的有机产品'],['C',"de comparer les prix des restaurants gastronomiques",'比较高级餐厅价格'],['D',"de donner gratuitement ses repas à des associations",'把自己的饭免费捐给协会']],ans:'A'},
{no:'15-2',group:'new',type:'choice',title:'Too Good To Go：环保应用',tag:'长听力 / 双问 2',q:"Question 2. Les utilisateurs de l'application…",audio:`Too Good To Go est une application qui propose une idée simple : sauver de la nourriture tout en aidant la planète. Grâce à cette application, les consommateurs peuvent acheter, à prix réduit, des aliments que les supermarchés, les boulangeries ou les restaurants n'ont pas vendus et dont ils doivent se débarrasser en fin de journée. Pour les commerces, cela limite le gaspillage. Pour les utilisateurs, c'est une solution économique et écologique. Beaucoup disent qu'ils sont satisfaits, parce qu'ils économisent de l'argent tout en participant à une action éco-responsable.`,cn:`Too Good To Go 是一个提出简单理念的应用：拯救食物，同时帮助地球。通过这个应用，消费者可以用较低价格购买超市、面包店或餐厅当天没有卖掉、最后必须处理掉的食品。对商家来说，这能减少浪费。对用户来说，这是一个经济又环保的办法。许多人说他们很满意，因为他们既省钱，也参与了一项生态责任行动。`,opts:[['A',"se réjouissent de contribuer à une action éco-responsable",'高兴能参与一项生态责任行动'],['B',"regrettent que les produits soient trop chers",'遗憾产品太贵'],['C',"souhaitent supprimer les commerces partenaires",'希望取消合作商家'],['D',"refusent d'acheter des produits invendus",'拒绝购买未售出的产品']],ans:'A'},
{no:29,group:'new',type:'choice',title:'图片题：车祸场景',tag:'图片听力 / 单选',q:"Quelle image correspond à la situation ?",audio:`Est-ce que vous m'entendez ? Ne bougez pas, les secours arrivent. Vous avez été renversé par une voiture en traversant près de la piste cyclable. Le conducteur s'est arrêté et un témoin est en train d'appeler les pompiers. Vous avez mal à la jambe, mais vous êtes conscient.`,cn:`您听得见我吗？不要动，救援马上到。您在自行车道附近过马路时被一辆车撞倒了。司机已经停下，一名目击者正在打电话叫消防救援。您的腿疼，但意识清醒。`,opts:[['A',"une personne assise dans une voiture bloquée dans un embouteillage",'一个人坐在堵车的车里'],['B',"une personne allongée devant une voiture après un accident",'一个人在事故后躺在汽车前方'],['C',"un cycliste qui répare son vélo au bord de la route",'一个骑车人在路边修自行车'],['D',"un mécanicien qui répare une voiture, le capot ouvert",'一个修理工打开车盖修汽车']],ans:'B'},
{no:30,group:'new',type:'choice',title:'塞内加尔：非洲外交',tag:'新闻 / 单选',q:"Selon la journaliste, le Sénégal…",audio:`Au cours de cette tournée en Afrique, le Sénégal cherche à renforcer sa présence sur la scène régionale. Selon la journaliste, ce voyage ne répond pas seulement à des objectifs économiques. Il vise aussi à consolider son influence diplomatique auprès de ses voisins et de ses partenaires internationaux.`,cn:`在这次非洲访问中，塞内加尔希望加强自己在地区舞台上的存在。根据记者的说法，这次行程并不只是为了经济目标。它也旨在巩固塞内加尔在邻国和国际伙伴中的外交影响力。`,opts:[['A',"vise à consolider son influence diplomatique",'旨在巩固其外交影响力'],['B',"souhaite réduire ses échanges avec les pays voisins",'希望减少与邻国的交流'],['C',"renonce à toute coopération internationale",'放弃所有国际合作'],['D',"veut limiter le tourisme dans la région",'想限制该地区旅游']],ans:'A'},
{no:31,group:'new',type:'choice',title:'会议迟到电话',tag:'电话留言 / 单选',q:"La personne qui appelle…",audio:`Bonjour, c'est Marc. Je suis vraiment désolé, je vais être en retard à la réunion. Je suis encore bloqué dans les transports et je ne pourrai pas arriver avant une demi-heure. Ne m'attendez pas, commencez sans moi. Je vous rejoindrai dès que possible.`,cn:`你好，我是 Marc。真的很抱歉，我开会要迟到了。我还被困在交通里，半小时内到不了。不要等我，你们先开始。我会尽快加入你们。`,opts:[['A',"invite à commencer sans elle",'请大家不要等她/他，先开始'],['B',"demande de reporter toute la réunion",'要求推迟整个会议'],['C',"annonce que la réunion est annulée",'宣布会议取消'],['D',"propose de changer le lieu de rendez-vous",'建议更换见面地点']],ans:'A'},
{no:34,group:'new',type:'choice',title:'火车广播：确认车厢和座位',tag:'公共广播 / 单选',q:"Cette annonce appelle les voyageurs à…",audio:`Mesdames et Messieurs, nous vous rappelons que ce train est composé de deux parties. Avant le départ, merci de vérifier attentivement le numéro de votre voiture et le numéro de votre place indiqués sur votre billet. En cas d'erreur, veuillez vous adresser au personnel de bord.`,cn:`女士们先生们，我们提醒您，本列车由两个部分组成。出发前，请仔细核对车票上标明的车厢号和座位号。如有错误，请联系列车工作人员。`,opts:[['A',"vérifier qu'ils sont installés à la bonne place",'确认自己坐在正确的位置上'],['B',"valider les tickets avant de monter dans le train",'上车前检票/验证车票'],['C',"descendre au prochain arrêt pour changer de train",'在下一站下车换乘'],['D',"présenter une pièce d'identité au contrôleur",'向检票员出示身份证件']],ans:'A'},
{no:'41-2',group:'new',type:'choice',title:'访谈节目：法国医生在蒙特利尔',tag:'采访 / 第二问',q:"Elle déplore par ailleurs…",audio:`Intervieweur. Aujourd'hui, nous rencontrons une médecin française qui a choisi d'exercer à Montréal. Lydios Saoui, décrivez-nous l'univers médical que vous y avez trouvé.
Lydios Saoui. Il repose sur un autre paradigme, qui est que la parole du patient est l'essence de la médecine. À la faculté de médecine de Montréal, chaque étudiant, et c'est un exemple parlant, est parrainé par un patient souffrant d'une maladie chronique.
Intervieweur. Votre nouveau livre est extrêmement sévère envers ce que vous appelez la caste médicale française.
Lydios Saoui. Il arrive un moment où la situation impose de prendre position. J'ai donc essayé d'expliquer de quelle maltraitance il s'agit en France et ce qu'elle suggère : le sentiment qu'on donne aux médecins qu'ils sont des cadors intouchables, ce qui est moralement inacceptable et qui fait monter la tension.`,cn:`采访者：今天我们采访一位选择在蒙特利尔执业的法国医生。Lydios Saoui，请您描述一下您在那里接触到的医疗环境。
Lydios Saoui：它建立在另一种范式之上，那就是患者的话语是医学的本质。在蒙特利尔的医学院，每一位学生都会由一位患有慢性病的病人担任“导师”。
采访者：您的新书对您所称的“法国医疗特权阶层”非常严厉。
Lydios Saoui：有些时候，形势要求我们必须表明立场。因此我试图解释法国医疗系统中存在的某些虐待现象，以及这种现象所传递的信息：那就是让医生感觉自己是不可触碰的大人物。这在道德上是不可接受的，也会加剧紧张局势。`,opts:[['A',"le manque de reconnaissance des médecins canadiens",'加拿大医生缺乏认可'],['B',"la violence dont les médecins sont parfois victimes",'医生有时遭受的暴力'],['C',"l'excès de pouvoir dont les médecins français disposent",'法国医生拥有过度权力'],['D',"les carences législatives dans le milieu hospitalier",'医院环境中的立法缺陷']],ans:'C'},

{no:17,group:'new',type:'choice',title:'合作超市听力',tag:'报道 / 单选',q:'Cette chronique présente un concept selon lequel…',audio:`New York, il y a quarante ans, le concept de supermarché coopératif se développe peu à peu partout dans le monde. Alors, en quelques mots, le supermarché coopératif, ça signifie quoi ? Un rejet de la grande distribution, bien sûr, mais c'est surtout une manière différente de concevoir la consommation. En clair, un espace de vente directe, de contrôle technique, souvent local et au juste prix. Mais pour faire partie de la clientèle, il faut travailler quelques heures par semaine dans le magasin, dans les rayons, dans les bureaux, à la sécurité encore marginale. Bien sûr, ce modèle fait partie des initiatives sur lesquelles il faudra compter à l'avenir. Preuve que le citoyen a encore son mot à dire.`,cn:`四十年前的纽约，合作超市的概念逐渐在世界各地发展起来。那么，用几句话来说，合作超市是什么意思？当然，这是对大型分销体系的一种拒绝，但最重要的是，这是一种不同的消费观念。简单说，就是一个直接销售、受到技术把关、通常是本地化且价格合理的销售空间。但是，要成为顾客群的一部分，就必须每周在商店工作几个小时，在货架区、办公室，甚至安全岗位上工作。当然，这种模式属于未来必须被考虑的举措之一。它证明公民仍然有发言权。`,opts:[['A','les employés ont un salaire convenable','员工有合适的工资'],['B','les agriculteurs regroupent leurs bénéfices','农民集中他们的收益'],['C',"les consommateurs doivent s'investir",'消费者必须投入参与'],['D','les clients négocient les prix avec les producteurs','顾客和生产者协商价格']],ans:'C'},
{no:21,group:'new',type:'matrix',title:'市区 30 km/h 限速',tag:'观点判断',q:'Pour ou contre la limitation à 30 km/h en ville ?',audio:`Première personne. Je ne comprends pas cette mesure. On ne pollue pas moins à trente kilomètres heure qu'à cinquante, c'est vraiment n'importe quoi.
Deuxième personne. Moi, je n'ai pas de voiture, je fais tout à vélo. Ce sera moins dangereux pour les cyclistes, donc tant mieux !
Troisième personne. Euh, je ne sais pas si ça va changer grand-chose aux problèmes de pollution et d'accident, mais on peut essayer pour voir.`,cn:`第一个人：我不理解这个措施。以每小时三十公里行驶并不会比五十公里污染更少，这真是胡说。
第二个人：我没有车，我什么都骑自行车。这对骑自行车的人来说会更不危险，所以更好！
第三个人：嗯，我不知道这是否会对污染和事故问题产生很大改变，但可以试试看。`,labels:['Première personne','Deuxième personne','Troisième personne'],choices:[['pour','Pour'],['condition','Pour, à certaines conditions / avis nuancé'],['contre','Contre']],ans:['contre','pour','condition']},
{no:41,group:'new',type:'choice',title:'访谈节目：法国医生在蒙特利尔',tag:'采访 / 单选',q:"L'invitée constate qu'au Canada…",audio:`Intervieweur. Aujourd'hui, nous rencontrons une médecin française qui a choisi d'exercer à Montréal. Lydios Saoui, décrivez-nous l'univers médical que vous y avez trouvé.
Lydios Saoui. Il repose sur un autre paradigme, qui est que la parole du patient est l'essence de la médecine. À la faculté de médecine de Montréal, chaque étudiant, et c'est un exemple parlant, est parrainé par un patient souffrant d'une maladie chronique.
Intervieweur. Votre nouveau livre est extrêmement sévère envers ce que vous appelez la caste médicale française.
Lydios Saoui. Il arrive un moment où la situation impose de prendre position. J'ai donc essayé d'expliquer de quelle maltraitance il s'agit en France et ce qu'elle suggère : le sentiment qu'on donne aux médecins qu'ils sont des cadors intouchables, ce qui est moralement inacceptable et qui fait monter la tension.`,cn:`采访者：今天我们采访一位选择在蒙特利尔执业的法国医生。Lydios Saoui，请您描述一下您在那里接触到的医疗环境。
Lydios Saoui：它建立在另一种范式之上，那就是患者的话语是医学的本质。在蒙特利尔的医学院，每一位学生——这是一个很有说服力的例子——都会由一位患有慢性病的病人担任“导师”或“指导人”。
采访者：您的新书对您所称的“法国医疗特权阶层”非常严厉。
Lydios Saoui：有些时候，形势要求我们必须表明立场。因此我试图解释法国医疗系统中存在的某些虐待现象，以及这种现象所传递的信息：那就是让医生感觉自己是不可触碰的大人物。这在道德上是不可接受的，也会加剧紧张局势。`,opts:[['A',"l'approche de la médecine est totalement différente",'医学方法完全不同'],['B','le système hospitalier est plus performant','医院系统更高效'],['C','les étudiants en médecine sont mieux formés','医学生训练得更好'],['D','la qualité des soins est largement supérieure','护理质量明显更高']],ans:'A'},
{no:45,group:'old',type:'choice',title:'警察审问歌手',tag:'信息理解 / 单选',q:'Le chanteur dont il est question…',audio:`Manu de Barge, leader du célèbre groupe Chaos, a été entendu hier par la police dans le cadre d'une affaire de plagiat. Le chanteur s'est toujours défendu de ces accusations, les qualifiant de proprement scandaleuses.`,cn:`著名 Chaos 乐队的领队 Manu de Barge 昨天因一起剽窃案件接受警方询问。这位歌手一直为自己辩护，否认这些指控，并称这些指控完全令人愤慨。`,opts:[['A','nie les faits','否认事实'],['B',"refuse de s'expliquer",'拒绝解释'],['C','plaide coupable','认罪'],['D','porte plainte','提出控告']],ans:'A'},
{no:46,group:'old',type:'choice',title:'飞往德国的航班取消',tag:'公共广播 / 单选',q:'Ce message donne des informations sur…',audio:`Mesdames et messieurs, en raison d'une situation météorologique exceptionnelle, nous vous informons que tous les vols à destination de l'Allemagne sont annulés aujourd'hui et sont reportés à demain aux mêmes horaires. Merci de votre compréhension.`,cn:`女士们先生们，由于特殊天气情况，我们通知您，今天所有飞往德国的航班取消，并推迟到明天相同时间。感谢您的理解。`,opts:[['A',"l'arrivée des vols venant d'Allemagne",'来自德国航班的到达'],['B',"le retard des avions en provenance d'Allemagne",'从德国来的飞机延误'],['C',"l'annulation des voyages vers l'Allemagne",'前往德国的行程取消'],['D',"l'ouverture de nouveaux trajets vers l'Allemagne",'开通前往德国的新线路']],ans:'C'},
{no:47,group:'old',type:'matrix',title:'孩子家庭作业',tag:'观点判断',q:'Pour ou contre les devoirs à la maison pour les petits ?',audio:`Première personne. C'est une phase d'apprentissage comme une autre, l'enfant s'exerce à devenir autonome et acquiert une méthodologie qui lui sera indispensable. Mais il ne faut pas qu'il y passe plus d'un quart d'heure.
Deuxième personne. Toutes les familles n'ont pas le temps ni les connaissances pour aider leurs enfants. Les devoirs sont devenus une telle source d'angoisse que de plus en plus de parents ont recours à des aides extérieures.
Troisième personne. C'est un moyen de voir où en est l'enfant dans son apprentissage, si ses cahiers sont bien tenus par exemple. Il ne faut pas oublier que les parents ont eux aussi un devoir d'éducation.`,cn:`第一个人：这是一个学习阶段，和其他阶段一样，孩子练习变得自主，并获得对他必不可少的方法。但他花在上面的时间不应该超过一刻钟。
第二个人：并非每个家庭都有时间或知识来帮助孩子。家庭作业已经成为一种焦虑来源，越来越多父母求助于外部帮助。
第三个人：这是一种观察孩子学习进度的方法，例如看他的笔记本是否保存得很好。不要忘记，父母也有教育责任。`,labels:['Première personne','Deuxième personne','Troisième personne'],choices:[['pour','Pour'],['condition','Pour, à certaines conditions'],['contre','Contre']],ans:['condition','contre','pour']},
{no:48,group:'old',type:'matrix',title:'免费交通',tag:'观点判断',q:'Pour ou contre la gratuité des transports ?',audio:`Première personne. Le droit à la mobilité, c'est un droit social auquel tout le monde devrait avoir accès, sans oublier qu'il est urgent de réduire le nombre de voitures au profit des transports en commun.
Deuxième personne. La véritable solution pour l'écologie, pour lutter contre la pollution, contre les bouchons, c'est d'améliorer la qualité du transport. Et ce serait un mensonge de dire que ça ne coûte rien et que tout peut être offert.
Troisième personne. Il est évident que cela coûterait trop cher, mais pour certaines catégories sociales, ça pourrait être adopté s'il y avait une prise en charge par la région, comme ça existe déjà pour les abonnements scolaires et étudiants.`,cn:`第一个人：流动权是一项每个人都应该享有的社会权利，更不用说现在迫切需要减少汽车数量，转向公共交通。
第二个人：生态方面、对抗污染和交通堵塞的真正解决办法，是提高交通质量。说这不需要任何成本、什么都可以免费提供，那会是谎言。
第三个人：显然这会花费太多，但对某些社会类别来说，如果地区政府承担费用，它可以被采纳，就像已经存在的学生交通订阅一样。`,labels:['Première personne','Deuxième personne','Troisième personne'],choices:[['pour','Totalement pour'],['condition','Pour, à certaines conditions'],['contre','Totalement contre']],ans:['pour','contre','condition']},
{no:49,group:'old',type:'choice',title:'合作超市',tag:'报道 / 单选',q:'Ce magasin…',audio:`Le supermarché Co Marché est un concept unique en Suisse. Il vient de New York où il obtient un franc succès depuis quarante ans. Son fonctionnement est particulier : les clients en sont propriétaires à partir du moment où ils cotisent au départ et où ils acceptent de donner trois heures de travail toutes les quatre semaines. La carte de membre est un bel avantage pour la santé et pour le portefeuille : elle leur donne accès à des produits de grande qualité à moindre coût. Ce concept existait déjà sous forme d'épicerie coopérative, mais là, c'est un vrai supermarché avec des clients qui sont aussi magasiniers. Leur profil est très varié : retraités, étudiants ou chômeurs. Certains privilégient la qualité des produits, d'autres recherchent la collectivité. En ce sens, c'est un concept coopératif et participatif.`,cn:`Co Marché 超市在瑞士是一个独特的概念。它来自纽约，在那里已经成功四十年。它的运作方式很特别：顾客从缴纳初始费用并同意每四周工作三小时起，就成为超市的所有者。会员卡对健康和钱包都有好处：它让他们以较低成本获得高质量产品。这个概念以前已经以合作杂货店形式存在，但这里是一个真正的超市，顾客同时也是店员。他们的背景很多样：退休人员、学生或失业者。有些人重视产品质量，有些人追求集体感。从这个意义上说，这是一个合作和参与式概念。`,opts:[['A',"forme son personnel avant de l'embaucher",'雇用前培训员工'],['B',"répond à une augmentation du nombre de consommateurs",'回应消费者数量增加'],['C',"demande à ses membres une cotisation annuelle",'要求会员缴纳年费'],['D','propose des produits économiques et solidaires','提供经济且互助的产品']],ans:'D'},
{no:50,group:'old',type:'choice',title:'给社区儿童提供乐器',tag:'报道 / 单选',q:'Le dispositif Démos permet aux enfants…',audio:`Depuis douze ans, la Cité de la musique à Paris permet à des enfants de quartiers prioritaires de s'initier à la musique classique. Le dispositif Démos, les enfants sont sélectionnés par des structures de quartier. Beaucoup d'entre eux n'avaient jamais touché un instrument avant que Démos ne leur en confie un. Ce dispositif vise à démocratiser la pratique de la musique. Il lutte contre les idées préconçues que la musique classique serait réservée à une élite. Une pédagogie adaptée par la pratique et par le jeu incite la moitié des enfants à continuer à jouer après les trois ans au sein de Démos. Et le dispositif est appelé à gagner encore de nouvelles régions, notamment rurales. Il touche les enfants mais également les familles.`,cn:`十二年来，巴黎音乐城让优先社区的儿童接触古典音乐。Démos 项目中，孩子们由社区机构选出。他们中的很多人在 Démos 交给他们乐器之前，从未碰过乐器。这个项目旨在使音乐实践民主化。它反对古典音乐只属于精英的成见。通过实践和游戏调整后的教学法，鼓励一半儿童在 Démos 三年后继续演奏。这个项目还将扩展到更多新地区，尤其是农村。它影响儿童，也影响家庭。`,opts:[['A',"d'apprendre à jouer d'un instrument",'学习演奏一种乐器'],['B',"d'assister à des concerts",'参加音乐会'],['C',"de suivre une formation de musicien",'接受音乐家培训'],['D',"de participer à des tournées",'参加巡演']],ans:'A'},
{no:51,group:'old',type:'choice',title:'合作书店',tag:'报道 / 单选',q:'Le projet « L’Autre Librairie » a été lancé par…',audio:`Nous avons poussé la porte d'une librairie pas tout à fait comme les autres. Comme l'explique Pierre Jean Fichet, un des initiateurs du projet, L'Autre Librairie à Angoulême est une coopérative et les lecteurs en sont aussi les associés. La librairie est née d'une initiative citoyenne. Récemment, une petite librairie a fermé. Ses clients étaient habitués à la qualité du lieu et à sa position dans la ville. Ils ont beaucoup regretté sa disparition et se sont donc mobilisés.`,cn:`我们推开了一家不太一样的书店的门。正如项目发起人之一 Pierre Jean Fichet 所解释的，昂古莱姆的“另一家书店”是一家合作社，读者也是合作伙伴。这家书店诞生于一项公民倡议。最近，一家小书店关门了。它的顾客已经习惯这个地方的质量以及它在城市中的位置。他们非常遗憾它的消失，于是动员起来。`,opts:[['A','un particulier','一个个人'],['B','des retraités','退休人员'],['C','la municipalité','市政府'],['D','des citoyens','公民们']],ans:'A'},
{no:52,group:'old',type:'choice',title:'老年人合住',tag:'采访 / 单选',q:'Dans ce document, la personne…',audio:`Lucilia, vous êtes à Mirabel dans une colocation un peu particulière. Bonjour, racontez-nous comment vous vivez de votre côté. Maintenant, on est rendus seize propriétaires d'une terre de quatre-vingt-quatorze acres. Et comment on vit de notre côté ? Ben, nous, on est toujours actifs. Excusez-moi, on est rendus à cinquante-sept ans, jusqu'à quatre-vingt-neuf ans, bientôt quatre-vingt-dix. Redevenir colocataire à notre âge, c'est comme redevenir des étudiants, entourés et apprendre. Et ça fait treize ans qu'on vit ensemble.`,cn:`露西莉亚，你在 Mirabel，住在一个有点特别的合租里。你好，请告诉我们你们是怎么生活的。现在，我们已经成为一块 94 英亩土地的 16 个所有者。我们这边怎么生活？嗯，我们仍然很活跃。不好意思，我们现在从 57 岁到 89 岁，很快就 90 岁了。在我们这个年纪再次成为室友，就像再次成为学生一样，在一起并学习。我们已经一起生活 13 年了。`,opts:[['A','présente son mode de vie','介绍自己的生活方式'],['B','évoque un souhait','提到一个愿望'],['C','raconte un souvenir','讲述一个回忆'],['D','décrit un projet','描述一个项目']],ans:'A'},
{no:53,group:'old',type:'choice',title:'电影院广播',tag:'公共广播 / 单选',q:'Ce message est diffusé dans…',audio:`Mesdames, Messieurs, bonsoir. Votre film va commencer dans quelques minutes. Installez-vous confortablement et n'oubliez pas d'éteindre vos téléphones portables. Bonne séance !`,cn:`女士们先生们，晚上好。您的电影将在几分钟后开始。请舒适入座，并不要忘记关闭手机。祝观影愉快！`,opts:[['A','une gare','火车站'],['B','un cinéma','电影院'],['C','un théâtre','剧院'],['D','un musée','博物馆']],ans:'B'},
{no:54,group:'old',type:'choice',title:'火车站广播',tag:'公共广播 / 单选',q:'Ce message est diffusé pour…',audio:`Mesdames et Messieurs, le quart à destination de Lausanne prévu à seize heures quatorze va être retardé à cause d'un incident mécanique. Nous allons mettre à votre disposition un nouveau moyen de transport. Veuillez rester attentifs aux annonces. Merci pour votre compréhension.`,cn:`女士们先生们，前往洛桑、原定 16 点 14 分的 Le Quart 将因机械事故而延迟。我们将为您提供一种新的交通工具。请注意公告。感谢您的理解。`,opts:[['A','donner un nouvel horaire','给出新的时间'],['B','modifier une information','修改一条信息'],['C','expliquer une situation','解释一种情况'],['D','annoncer un départ','宣布出发']],ans:'C'}
];

    ['l’armoire','衣柜'],['un pyjama','睡衣'],['les petits moutons','小羊图案'],['le soleil','太阳图案'],['une poussette','婴儿车'],['une peluche','毛绒玩具']
  ]}
];

let idx=0, answers={}, checked={}, started=Date.now(), currentAudio=null, audioQueue=[], queueIndex=0, paused=false, tick=null, showTranslation=false, playSession=0, usingDirectTTS=false;
const $=id=>document.getElementById(id);
setInterval(()=>{const s=Math.floor((Date.now()-started)/1000); $('timer').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');},1000);
function splitForOnlineTTS(text){
  let t=text.replace(/\s+/g,' ').trim();
  const parts=[];
  while(t.length){
    let cut=Math.min(170,t.length);
    if(cut<t.length){
      const slice=t.slice(0,cut);
      const marks=['. ','? ','! ','; ',': ',', '].map(m=>slice.lastIndexOf(m));
      const best=Math.max(...marks);
      if(best>60) cut=best+1;
      else { const sp=slice.lastIndexOf(' '); if(sp>60) cut=sp; }
    }
    parts.push(t.slice(0,cut).trim());
    t=t.slice(cut).trim();
  }
  return parts;
}
function onlineTTSUrl(text){
  return '/api/tts?q='+encodeURIComponent(text);
}
function directTTSUrl(text){
  return 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=fr&q='+encodeURIComponent(text);
}
function stopAudio(){
  playSession++;
  if(currentAudio){ currentAudio.pause(); currentAudio.src=''; currentAudio=null; }
  audioQueue=[]; queueIndex=0; paused=false; clearInterval(tick);
  const f=$('fill'); if(f) f.style.width='0%';
}
function playCurrent(session=playSession){
  if(session!==playSession) return;
  if(queueIndex>=audioQueue.length){ const f=$('fill'); if(f) f.style.width='100%'; return; }
  const text=audioQueue[queueIndex];
  currentAudio=new Audio(usingDirectTTS ? directTTSUrl(text) : onlineTTSUrl(text));
  currentAudio.onended=()=>{ if(session!==playSession) return; queueIndex++; playCurrent(session); };
  currentAudio.onerror=()=>{
    if(session!==playSession) return;
    if(!usingDirectTTS){ usingDirectTTS=true; playCurrent(session); return; }
    queueIndex++; playCurrent(session);
  };
  currentAudio.onplay=()=>{
    if(session!==playSession) return;
    clearInterval(tick);
    const base=queueIndex/audioQueue.length*100;
    tick=setInterval(()=>{
      const f=$('fill');
      if(f && currentAudio && currentAudio.duration){
        f.style.width=Math.min(99,base+(currentAudio.currentTime/currentAudio.duration)*(100/audioQueue.length))+'%';
      }
    },200);
  };
  currentAudio.play().catch(()=>{ if(session===playSession){ queueIndex++; playCurrent(session); } });
}
function playAudio(){
  stopAudio();
  playSession++;
  usingDirectTTS=false;
  audioQueue=splitForOnlineTTS(QUESTIONS[idx].audio);
  queueIndex=0;
  playCurrent(playSession);
}
function pauseAudio(){ if(currentAudio){ currentAudio.pause(); paused=true; } }
function resumeAudio(){ if(currentAudio && paused){ currentAudio.play(); paused=false; } }
function renderNav(){
  const make=(g)=>QUESTIONS.map((q,i)=>q.group===g?`<button class="${i===idx?'active ':''}${checked[q.no]||''}" onclick="go(${i})">${q.no}</button>`:'').join('');
  $('navNew').innerHTML=make('new'); $('navOld').innerHTML=make('old');
  const ok=Object.values(checked).filter(v=>v==='ok').length; $('scorePill').textContent=`${ok} / ${QUESTIONS.length}`;
}
function render(){
  stopAudio(); $('summary').classList.remove('show'); const q=QUESTIONS[idx];
  let ans=answers[q.no]; let body='';
  if(q.type==='choice'){
    body=q.opts.map(o=>{let cls='option '+(ans===o[0]?'selected ':''); if(checked[q.no]){ if(o[0]===q.ans) cls+='correct '; else if(ans===o[0]&&ans!==q.ans) cls+='wrong '; } return `<label class="${cls}" onclick="selectChoice('${q.no}','${o[0]}')"><input type="radio" name="q${q.no}" ${ans===o[0]?'checked':''}><div><b>${o[0]}.</b> ${o[1]}<div class="optionCn ${showTranslation?'show':''}">${o[2]}</div></div></label>`}).join('');
  } else {
    body=`<div class="matrix">${q.labels.map((lab,i)=>{let val=(ans||[])[i]||''; let cls='person '; if(checked[q.no]) cls += val===q.ans[i]?'correct':'wrong'; return `<div class="${cls}"><b>${lab}</b><select onchange="selectMatrix('${q.no}',${i},this.value)"><option value="">-- choisir --</option>${q.choices.map(c=>`<option value="${c[0]}" ${val===c[0]?'selected':''}>${c[1]}</option>`).join('')}</select></div>`}).join('')}</div>`;
  }
  const note=q.note?`<div class="srcNote">${q.note}</div>`:'';
  const fb=checked[q.no]?`<div class="feedback ${checked[q.no]==='ok'?'good':'badText'}">${checked[q.no]==='ok'?'正确。':'错误。正确答案：'+rightAnswer(q)}</div>`:'';
  $('quiz').innerHTML=`<div class="qhead"><div class="qtitle">${q.no}. ${q.title}</div><div class="tag">${q.tag}</div></div><div class="content"><div class="left"><div class="audioBox"><div class="audioTitle"><b>Document sonore</b><span class="muted">在线法语自然语音</span></div><div class="bar"><div class="fill" id="fill"></div></div><div class="controls"><button onclick="playAudio()">▶ 播放</button><button onclick="pauseAudio()">暂停</button><button onclick="resumeAudio()">继续</button><button onclick="stopAudio()">停止</button></div><div class="voiceLine"><span class="hint">在线法语自然语音 · 再次播放会先停止上一段</span></div></div><button class="plainBtn" style="margin-top:16px" onclick="toggleScript()">显示/隐藏听力文本和中文翻译</button>${note}<div class="script ${showTranslation?'show':''}" id="scriptBox"><h4>Texte intégral</h4><div class="fr">${q.audio}</div><h4>中文逐句翻译</h4><div class="cn">${q.cn}</div></div></div><div class="right"><div class="question">${q.q}</div>${body}${fb}</div></div><div class="footer"><div><button class="plainBtn" onclick="prev()">上一题</button><button class="plainBtn" onclick="retry()">重做本题</button></div><div><button class="mainbtn" onclick="check()">确认本题</button><button class="plainBtn" onclick="next()">下一题</button></div></div>`;
  renderNav();
}
function rightAnswer(q){ if(q.type==='choice'){const o=q.opts.find(x=>x[0]===q.ans); return `${q.ans}. ${o?o[1]:''}`;} return q.ans.map((a,i)=>`${q.labels[i]}：${q.choices.find(c=>c[0]===a)?.[1]||a}`).join('；'); }
function toggleScript(){showTranslation=!showTranslation; render();}
function selectChoice(no,val){answers[no]=val; render();}
function selectMatrix(no,i,val){answers[no]=answers[no]||[]; answers[no][i]=val;}
function check(){const q=QUESTIONS[idx]; let ok=false; if(q.type==='choice') ok=answers[q.no]===q.ans; else ok=JSON.stringify(answers[q.no]||[])===JSON.stringify(q.ans); checked[q.no]=ok?'ok':'bad'; render();}
function retry(){delete answers[QUESTIONS[idx].no]; delete checked[QUESTIONS[idx].no]; render();}
function go(i){idx=i;render();}
function next(){if(idx<QUESTIONS.length-1){idx++;render();}else showSummary();}
function prev(){if(idx>0){idx--;render();}}

function speakKeyword(text){
  stopAudio();
  usingDirectTTS=false;
  currentAudio=new Audio(onlineTTSUrl(text));
  currentAudio.onerror=()=>{ 
    currentAudio=new Audio(directTTSUrl(text));
    currentAudio.play().catch(()=>{});
  };
  currentAudio.play().catch(()=>{});
}
function speakGroup(i){
  const group=IMAGE_KEYWORDS[i];
  if(!group) return;
  const text=group.items.map(x=>x[0]).join('. ');
  stopAudio();
  audioQueue=splitForOnlineTTS(text);
  queueIndex=0;
  playSession++;
  playCurrent(playSession);
}
function showKeywords(){
  stopAudio();
  $('summary').classList.remove('show');
  renderNav();
  const cards=IMAGE_KEYWORDS.map((g,i)=>`
    <div class="kwCard">
      <h3>${g.title}</h3>
      <div class="kwList">
        ${g.items.map(k=>`<button class="kwBtn" onclick="speakKeyword('${k[0].replace(/'/g,"\\'")}')"><span>▶</span><span><span class="kwFr">${k[0]}</span><br><span class="kwCn">${k[1]}</span></span></button>`).join('')}
      </div>
      <div class="kwHint"><button class="plainBtn" onclick="speakGroup(${i})">播放本组关键词</button></div>
    </div>
  `).join('');
  $('quiz').innerHTML=`
    <div class="qhead"><div class="qtitle">图片题关键词训练</div><div class="tag">点击可听发音</div></div>
    <div class="left" style="border-right:0">
      <p class="kwIntro">这里提取的是上传的《TEF听力机经(2).pdf》图片题中反复出现、容易决定答案的词。点击单个词可以听法语发音；点击“播放本组关键词”可以连续听一组。中文只用于确认含义，不参与题目作答。</p>
      <div class="kwTools">
        <button class="mainbtn" onclick="speakKeyword('la piscine. un pyjama. un vélo. une maison. déménager. les lunettes. un billet d’avion. un service à thé. un accident. une salle de réunion.')">播放高频总复习</button>
        <button class="plainBtn" onclick="idx=0;render()">回到刷题</button>
      </div>
      <div class="kwGrid">${cards}</div>
    </div>`;
}

function showSummary(){
  stopAudio(); $('quiz').innerHTML=''; $('summary').classList.add('show'); renderNav();
  const ok=QUESTIONS.filter(q=>checked[q.no]==='ok').length;
  const rows=QUESTIONS.map(q=>`<tr><td>${q.no}</td><td>${q.title}</td><td>${q.tag}</td><td>${checked[q.no]==='ok'?'<span class="good">正确</span>':checked[q.no]==='bad'?'<span class="badText">错误</span>':'未确认'}</td><td>${rightAnswer(q)}</td></tr>`).join('');
  $('summary').innerHTML=`<h2>汇总：${ok}/${QUESTIONS.length}</h2><p class="muted">错题优先刷：观点判断题要抓态度词，例如 <span class="kbd">tant mieux</span> 支持，<span class="kbd">n’importe quoi</span> 反对，<span class="kbd">on peut essayer</span> 有条件/保留支持。</p><table><thead><tr><th>题号</th><th>题目</th><th>题型</th><th>结果</th><th>答案</th></tr></thead><tbody>${rows}</tbody></table><p style="margin-top:18px"><button class="mainbtn" onclick="idx=0;render()">回到第一题</button></p>`;
}
render();
</script>
</body>
</html>
