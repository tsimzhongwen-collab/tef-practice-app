.topbar{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:5}.brand{font-weight:700}.timer{font-variant-numeric:tabular-nums;color:#374151}.wrap{max-width:980px;margin:22px auto;padding:0 18px}.meta{display:flex;gap:12px;align-items:center;margin-bottom:14px}.pill{background:#fff;border:1px solid var(--line);padding:8px 12px;border-radius:999px;color:#374151}.progress{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;flex:1}.bar{height:100%;width:0;background:var(--blue);transition:.25s}.screen{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(16,24,40,.06);padding:28px}.title{font-size:22px;font-weight:750;margin:0 0 20px}.instructions{font-size:14px;color:var(--muted);margin:0 0 20px}.text{font-size:20px;line-height:2.05;border:1px solid #e5e7eb;background:#fbfdff;border-radius:12px;padding:26px;position:relative}.blank{display:inline-flex;min-width:122px;min-height:36px;vertical-align:middle;align-items:center;justify-content:center;border:2px solid var(--blue);border-radius:8px;color:var(--blue);font-weight:700;padding:2px 12px;margin:0 4px;background:#fff;cursor:pointer;position:relative;line-height:1.25}.blank.unfilled{color:#9ca3af;border-style:dashed}.dropdown{position:absolute;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 36px rgba(16,24,40,.18);padding:8px;width:360px;z-index:20}.choice{padding:10px 12px;border-radius:9px;cursor:pointer;line-height:1.35}.choice:hover{background:#eef4ff;color:var(--blue)}.choice-fr{font-weight:700}.choice-cn{font-size:13px;color:#6b7280;margin-top:2px}.choice:hover .choice-cn{color:#315c9d}.actions{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:12px}.leftActions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:700;cursor:pointer}.primary{background:var(--blue);color:#fff}.secondary{background:#e5e7eb;color:#111827}.btn:disabled{opacity:.45;cursor:not-allowed}.feedback{display:none;margin-top:18px;border-radius:14px;padding:18px;border:1px solid #ffd0c7;background:#fff6f4}.feedback h3{margin:0 0 10px;color:var(--bad)}.oknote{display:none;margin-top:14px;color:var(--good);font-weight:700}.explain{border-top:1px solid #f0b8ad;margin-top:12px;padding-top:12px;line-height:1.75}.explain b{color:#111827}.summary{display:none}.summary h2{font-size:26px;margin-top:0}.score{font-size:42px;font-weight:800;color:var(--blue);margin:10px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;line-height:1.65}.wrong{border-color:#f5b5aa;background:#fff8f6}.right{border-color:#b7e2ca;background:#f6fffa}.small{font-size:14px;color:#6b7280}.translationPanel{display:none;margin-top:16px;border:1px solid #dbeafe;background:#f8fbff;border-radius:12px;padding:18px;line-height:1.75}.pair{padding:10px 0;border-bottom:1px dashed #d8dee8}.pair:last-child{border-bottom:0}.pair-fr{font-weight:650;color:#111827}.pair-cn{color:#374151;margin-top:4px}.questionNav{position:fixed;right:18px;top:86px;width:190px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(16,24,40,.08);padding:14px;z-index:4}.questionNavTitle{font-weight:800;margin-bottom:8px}.questionNavHint{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.45}.qnavGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.qnavBtn{border:1px solid var(--line);background:#fff;border-radius:9px;height:34px;font-weight:700;cursor:pointer;color:#374151}.qnavBtn:hover{border-color:var(--blue);color:var(--blue);background:#eef4ff}.qnavBtn.current{background:var(--blue);border-color:var(--blue);color:#fff}.qnavBtn.done{border-color:#9bd3b1;background:#f6fffa;color:#067647}.qnavBtn.wrongStatus{border-color:#f2a79d;background:#fff8f6;color:#b42318}.qnavLegend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:#6b7280}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;background:#d1d5db}.dot.cur{background:var(--blue)}.dot.ok{background:#067647}.dot.bad{background:#b42318}@media (prefers-color-scheme: dark){:root{--blue:#7db7ff;--dark:#e5e7eb;--muted:#9ca3af;--line:#2b3442;--bg:#0b0f16;--panel:#111827;--bad:#ff8a80;--good:#48d597;}body{background:var(--bg);color:var(--dark)}.topbar{background:#0f172a;border-bottom-color:var(--line)}.timer,.pill{color:#cbd5e1}.pill,.screen,.questionNav,.card{background:var(--panel);border-color:var(--line)}.screen,.questionNav{box-shadow:0 8px 24px rgba(0,0,0,.35)}.progress{background:#1f2937}.text,.blank,.dropdown,.qnavBtn{background:#0f172a;border-color:#344054;color:var(--dark)}.blank{color:var(--blue);border-color:var(--blue)}.blank.unfilled{color:#8b95a5}.choice:hover,.qnavBtn:hover{background:#132235;color:var(--blue)}.choice-cn,.small,.qnavLegend{color:#9ca3af}.feedback{background:#2a1416;border-color:#7f1d1d;color:#f3f4f6}.explain{border-top-color:#7f1d1d}.explain b,.pair-fr{color:#f3f4f6}.translationPanel{background:#0f172a;border-color:#22314a}.pair{border-bottom-color:#344054}.pair-cn{color:#cbd5e1}.secondary{background:#374151;color:#f3f4f6}.qnavBtn.current{background:var(--blue);border-color:var(--blue);color:#07111f}.qnavBtn.done{background:#09291b;border-color:#166534;color:#86efac}.qnavBtn.wrongStatus{background:#2a1416;border-color:#7f1d1d;color:#fca5a5}.wrong{background:#2a1416;border-color:#7f1d1d}.right{background:#09291b;border-color:#166534}}@media(max-width:1180px){.questionNav{position:static;width:auto;margin:12px 18px 0}.qnavGrid{grid-template-columns:repeat(10,1fr)}}@media(max-width:760px){.text{font-size:17px}.topbar{padding:0 14px}.screen{padding:18px}.dropdown{width:min(360px,calc(100vw - 40px))}}

<script>
const DATA = [{"title":"1. Le Carnaval de Québec","stem":"C'est en décembre 1954 qu'un comité d'hommes d'affaires de la Chambre de commerce de Québec, (1) le projet d'un carnaval annuel. Celui-ci est alors vu comme un événement pouvant (2) l'économie et le tourisme durant l'hiver, une période creuse pour la ville de Québec.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. lance","B. sert","C. met","D. pose"],"answer":"A. lance","explanation":{"full":"涉及原句：\nC'est en décembre 1954 qu'un comité d'hommes d'affaires de la Chambre de commerce de Québec lance le projet d'un carnaval annuel.\n中文：\n1954年12月，魁北克商会的一个商人委员会启动了年度狂欢节项目。\n简析：\n固定搭配 lancer un projet = 发起/启动一个项目。","sentence":"C'est en décembre 1954 qu'un comité d'hommes d'affaires de la Chambre de commerce de Québec lance le projet d'un carnaval annuel.","translation":"1954年12月，魁北克商会的一个商人委员会启动了年度狂欢节项目。","analysis":"固定搭配 lancer un projet = 发起/启动一个项目。"},"optionTranslations":["A. 启动/发起","B. 用于/服务于","C. 放置/使处于","D. 提出/放置"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. éclairer","B. développer","C. chauffer","D. valider"],"answer":"B. développer","explanation":{"full":"涉及原句：\nCelui-ci est alors vu comme un événement pouvant développer l'économie et le tourisme durant l'hiver.\n中文：\n这个活动当时被看作能够在冬季发展经济和旅游业的事件。\n简析：\ndévelopper l’économie et le tourisme 是自然搭配。","sentence":"Celui-ci est alors vu comme un événement pouvant développer l'économie et le tourisme durant l'hiver.","translation":"这个活动当时被看作能够在冬季发展经济和旅游业的事件。","analysis":"développer l’économie et le tourisme 是自然搭配。"},"optionTranslations":["A. 照亮/阐明","B. 发展","C. 加热","D. 确认/使有效"]}],"sentencePairs":[["C'est en décembre 1954 qu'un comité d'hommes d'affaires de la Chambre de commerce de Québec, (1) le projet d'un carnaval annuel.","正是在1954年12月，魁北克商会的一个商人委员会（1）了一个年度狂欢节项目。"],["Celui-ci est alors vu comme un événement pouvant (2) l'économie et le tourisme durant l'hiver, une période creuse pour la ville de Québec.","这个项目当时被看作一个能够在冬季（2）经济和旅游业的活动；冬季对魁北克市来说是淡季。"]]},{"title":"2. Fonction publique québécoise","stem":"Le personnel de la fonction publique québécoise est rémunéré en fonction de l'échelle de traitement (1) sa classe d'emplois. La majorité des échelles de traitement est composée d'échelons. (2), certaines sont constituées de taux minimum et maximum ou d'un taux unique. La progression salariale est possible et s'effectue en fonction de l'ancienneté et d'un rendement jugé satisfaisant.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. efférente à","B. ayant affaire à","C. afférente à","D. affairée à"],"answer":"C. afférente à","explanation":{"full":"涉及原句：\nLe personnel ... est rémunéré en fonction de l'échelle de traitement afférente à sa classe d'emplois.\n中文：\n魁北克公务人员按照其职位类别对应的薪级表获得报酬。\n简析：\nafférent à = 与……相关/对应，修饰薪级表。","sentence":"Le personnel ... est rémunéré en fonction de l'échelle de traitement afférente à sa classe d'emplois.","translation":"魁北克公务人员按照其职位类别对应的薪级表获得报酬。","analysis":"afférent à = 与……相关/对应，修饰薪级表。"},"optionTranslations":["A. 传出至/输出至（医学/神经）","B. 与……打交道","C. 与……相关/对应","D. 忙于……"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. En effet","B. Néanmoins","C. Apparemment","D. conséquemment"],"answer":"A. En effet","explanation":{"full":"涉及原句：\nEn effet, certaines sont constituées de taux minimum et maximum ou d'un taux unique.\n中文：\n事实上，有些薪级表由最低和最高薪率组成，或只有一个单一薪率。\n简析：\n后句继续解释薪级表的组成，用 En effet。","sentence":"En effet, certaines sont constituées de taux minimum et maximum ou d'un taux unique.","translation":"事实上，有些薪级表由最低和最高薪率组成，或只有一个单一薪率。","analysis":"后句继续解释薪级表的组成，用 En effet。"},"optionTranslations":["A. 事实上/确实","B. 然而","C. 表面上/显然","D. 因此/由此"]}],"sentencePairs":[["Le personnel de la fonction publique québécoise est rémunéré en fonction de l'échelle de traitement (1) sa classe d'emplois.","魁北克公务人员根据其职位类别所（1）的薪级表获得报酬。"],["La majorité des échelles de traitement est composée d'échelons.","大多数薪级表由不同级别构成。"],["(2), certaines sont constituées de taux minimum et maximum ou d'un taux unique.","（2），有些薪级表由最低和最高薪率构成，或者只有一个单一薪率。"],["La progression salariale est possible et s'effectue en fonction de l'ancienneté et d'un rendement jugé satisfaisant.","工资晋升是可能的，并根据资历和被认为令人满意的工作表现进行。"]]},{"title":"3. Tournage dans une gare SNCF","stem":"Dans le cas d'un tournage avec des équipes nombreuses, les flux dans une gare sont perturbés, (1) demande une surveillance accrue pour assurer la sécurité de tous. En autorisant un tournage, SNCF se rend responsable des éventuelles conséquences. (2) accident, c'est la responsabilité du référent SNCF qui est engagée.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. ce que","B. ce dont","C. ce où","D. ce qui"],"answer":"D. ce qui","explanation":{"full":"涉及原句：\nLes flux dans une gare sont perturbés, ce qui demande une surveillance accrue.\n中文：\n车站内人流会受到干扰，这就需要加强监控。\n简析：\nce qui 指代前面整件事，并作 demande 的主语。","sentence":"Les flux dans une gare sont perturbés, ce qui demande une surveillance accrue.","translation":"车站内人流会受到干扰，这就需要加强监控。","analysis":"ce qui 指代前面整件事，并作 demande 的主语。"},"optionTranslations":["A. ……的事物；作宾语","B. ……所涉及/所需要的；带de","C. 错误搭配","D. 这件事；作主语"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. Alors qu'","B. En cas d'","C. À titre d'","D. Ainsi qu'"],"answer":"B. En cas d'","explanation":{"full":"涉及原句：\nEn cas d'accident, c'est la responsabilité du référent SNCF qui est engagée.\n中文：\n如果发生事故，SNCF负责人的责任就会被追究。\n简析：\nen cas d’accident = 在发生事故的情况下。","sentence":"En cas d'accident, c'est la responsabilité du référent SNCF qui est engagée.","translation":"如果发生事故，SNCF负责人的责任就会被追究。","analysis":"en cas d’accident = 在发生事故的情况下。"},"optionTranslations":["A. 当……时/然而","B. 如果发生/在……情况下","C. 作为/以……名义","D. 以及/正如"]}],"sentencePairs":[["Dans le cas d'un tournage avec des équipes nombreuses, les flux dans une gare sont perturbés, (1) demande une surveillance accrue pour assurer la sécurité de tous.","在有大量团队参与拍摄的情况下，车站内的人流会受到干扰，（1）需要加强监控以确保所有人的安全。"],["En autorisant un tournage, SNCF se rend responsable des éventuelles conséquences.","一旦批准拍摄，法国国铁就要对可能产生的后果承担责任。"],["(2) accident, c'est la responsabilité du référent SNCF qui est engagée.","（2）事故，承担责任的是法国国铁指定负责人的责任。"]]},{"title":"4. Pessimisme sur l’Occident","stem":"Il est difficile de ne pas céder au pessimisme ambiant qui prédit la chute économique imminente d'un Occident vieillissant et usé, (1) les assauts répétés d'un « Sud global » à l'inverse plein d'allant, conquérant et revanchard. Un défaitisme très sombre, (2) au vu des graves difficultés conjoncturelles que connaissent les adversaires des démocraties américaines et européennes.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. faisant face","B. tombant sous","C. considérant que","D. en particulier"],"answer":"A. faisant face","explanation":{"full":"涉及原句：\n... un Occident vieillissant et usé, faisant face aux assauts répétés d'un « Sud global ».\n中文：\n一个老化疲惫的西方，面对“全球南方”反复的冲击。\n简析：\nfaire face à = 面对；后接 les assauts。","sentence":"... un Occident vieillissant et usé, faisant face aux assauts répétés d'un « Sud global ».","translation":"一个老化疲惫的西方，面对“全球南方”反复的冲击。","analysis":"faire face à = 面对；后接 les assauts。"},"optionTranslations":["A. 面对","B. 落入/归入……之下","C. 考虑到/认为","D. 尤其是"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. tenant à ce qu'","B. ne serait-ce qu'","C. pour peu qu'","D. en admettant qu'"],"answer":"B. ne serait-ce qu'","explanation":{"full":"涉及原句：\nUn défaitisme très sombre, ne serait-ce qu'au vu des graves difficultés conjoncturelles...\n中文：\n这种失败主义很阴暗，哪怕只是从对手所遇到的严重周期性困难来看也是如此。\n简析：\nne serait-ce qu’au vu de = 哪怕只是考虑到……。","sentence":"Un défaitisme très sombre, ne serait-ce qu'au vu des graves difficultés conjoncturelles...","translation":"这种失败主义很阴暗，哪怕只是从对手所遇到的严重周期性困难来看也是如此。","analysis":"ne serait-ce qu’au vu de = 哪怕只是考虑到……。"},"optionTranslations":["A. 坚持要求……","B. 哪怕只是/仅就……而言","C. 只要稍微……","D. 假设/承认……"]}],"sentencePairs":[["Il est difficile de ne pas céder au pessimisme ambiant qui prédit la chute économique imminente d'un Occident vieillissant et usé, (1) les assauts répétés d'un « Sud global » à l'inverse plein d'allant, conquérant et revanchard.","人们很难不屈从于周围的悲观情绪；这种情绪预言一个老化而疲惫的西方即将经济衰落，（1）一个相反地充满活力、带有征服性和复仇意味的“全球南方”的反复冲击。"],["Un défaitisme très sombre, (2) au vu des graves difficultés conjoncturelles que connaissent les adversaires des démocraties américaines et européennes.","这是一种非常阴暗的失败主义，（2）考虑到美国和欧洲民主国家的对手也正经历严重的周期性困难。"]]},{"title":"5. Politique de confidentialité de notre navigateur","stem":"Comme toutes les entreprises du net, nous recueillons certaines de vos données (1) d'optimisation de nos services. Nous ne les conservons que le temps nécessaire à la réalisation des actions pour lesquelles nous les avons collectées. Les seules données dont nous avons besoin sont celles qui finiront par (2) servir.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. au risque","B. à des fins","C. en raison","D. en guise"],"answer":"B. à des fins","explanation":{"full":"涉及原句：\nNous recueillons certaines de vos données à des fins d'optimisation de nos services.\n中文：\n我们收集你们的某些数据，是为了优化我们的服务。\n简析：\nà des fins de + 名词 = 出于……目的。","sentence":"Nous recueillons certaines de vos données à des fins d'optimisation de nos services.","translation":"我们收集你们的某些数据，是为了优化我们的服务。","analysis":"à des fins de + 名词 = 出于……目的。"},"optionTranslations":["A. 冒着……风险","B. 为了……目的","C. 因为/由于","D. 作为……形式"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. vous","B. s'en","C. les","D. se"],"answer":"A. vous","explanation":{"full":"涉及原句：\nLes seules données dont nous avons besoin sont celles qui finiront par vous servir.\n中文：\n我们需要的唯一数据，是那些最终会对你们有用的数据。\n简析：\nservir quelqu’un = 对某人有用/服务某人。","sentence":"Les seules données dont nous avons besoin sont celles qui finiront par vous servir.","translation":"我们需要的唯一数据，是那些最终会对你们有用的数据。","analysis":"servir quelqu’un = 对某人有用/服务某人。"},"optionTranslations":["A. 对您/给您","B. 从中/因此（代词结构）","C. 它们","D. 自身/相互"]}],"sentencePairs":[["Comme toutes les entreprises du net, nous recueillons certaines de vos données (1) d'optimisation de nos services.","像所有互联网企业一样，我们收集您的某些数据，（1）优化我们的服务。"],["Nous ne les conservons que le temps nécessaire à la réalisation des actions pour lesquelles nous les avons collectées.","我们只在完成收集这些数据所对应操作的必要时间内保存它们。"],["Les seules données dont nous avons besoin sont celles qui finiront par (2) servir.","我们唯一需要的数据，是那些最终会（2）有用的数据。"]]},{"title":"6. Lecture et internautes","stem":"Les internautes ne lisent pas moins que ceux qui utilisent rarement internet. (1), seuls 15 % d'entre eux n'ont jamais lu de roman (2) une grande majorité d'entre eux ont l'habitude de lire des livres au moins une fois par mois.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. Étant donné que","B. Au contraire","C. De manière à ce que","D. À condition que"],"answer":"B. Au contraire","explanation":{"full":"涉及原句：\nLes internautes ne lisent pas moins... Au contraire, seuls 15 % d'entre eux n'ont jamais lu de roman.\n中文：\n网民并不比很少上网的人读得少。相反，只有15%的人从未读过小说。\n简析：\n前句否定“更少读”，后句给反向证据，用 Au contraire。","sentence":"Les internautes ne lisent pas moins... Au contraire, seuls 15 % d'entre eux n'ont jamais lu de roman.","translation":"网民并不比很少上网的人读得少。相反，只有15%的人从未读过小说。","analysis":"前句否定“更少读”，后句给反向证据，用 Au contraire。"},"optionTranslations":["A. 鉴于/由于","B. 相反","C. 以便/为了使","D. 条件是"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. afin qu'","B. pour qu'","C. alors qu'","D. tant qu'"],"answer":"C. alors qu'","explanation":{"full":"涉及原句：\n... seuls 15 % ... n'ont jamais lu de roman alors qu'une grande majorité ... lisent des livres.\n中文：\n只有15%从未读过小说，而绝大多数人每月至少读一次书。\n简析：\n15% 与绝大多数形成对比，用 alors que。","sentence":"... seuls 15 % ... n'ont jamais lu de roman alors qu'une grande majorité ... lisent des livres.","translation":"只有15%从未读过小说，而绝大多数人每月至少读一次书。","analysis":"15% 与绝大多数形成对比，用 alors que。"},"optionTranslations":["A. 为了……","B. 为了……","C. 而/然而/当……时","D. 只要/当……期间"]}],"sentencePairs":[["Les internautes ne lisent pas moins que ceux qui utilisent rarement internet.","网民阅读并不比那些很少使用互联网的人少。"],["(1), seuls 15 % d'entre eux n'ont jamais lu de roman (2) une grande majorité d'entre eux ont l'habitude de lire des livres au moins une fois par mois.","（1），他们之中只有15%从未读过小说，（2）绝大多数人习惯每月至少读一次书。"]]},{"title":"7. Accompagnement numérique au Québec","stem":"Le gouvernement du Québec met en place une campagne d'accompagnement numérique pour les entreprises individuelles (1) des formations et des sensibilisations. Elles pourront, par exemple, bénéficier de formations leur permettant d'améliorer leur référencement en ligne, de numériser leur gestion comptable, (2) d'utiliser les réseaux pour recruter.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. via","B. parmi","C. comme","D. quant à"],"answer":"A. via","explanation":{"full":"涉及原句：\n... une campagne ... via des formations et des sensibilisations.\n中文：\n魁北克政府通过培训和宣传，为个体企业开展数字化陪伴行动。\n简析：\nvia + 名词表示“通过某种方式”。","sentence":"... une campagne ... via des formations et des sensibilisations.","translation":"魁北克政府通过培训和宣传，为个体企业开展数字化陪伴行动。","analysis":"via + 名词表示“通过某种方式”。"},"optionTranslations":["A. 通过","B. 在……之中","C. 像/作为","D. 至于/关于"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. et ainsi","B. en outre","C. ou encore","D. par ailleurs"],"answer":"C. ou encore","explanation":{"full":"涉及原句：\n... d'améliorer leur référencement, de numériser leur gestion comptable, ou encore d'utiliser les réseaux pour recruter.\n中文：\n……改善线上排名、数字化会计管理，或者还可以使用社交网络招聘。\n简析：\n列举同类用途的另一个例子，用 ou encore。","sentence":"... d'améliorer leur référencement, de numériser leur gestion comptable, ou encore d'utiliser les réseaux pour recruter.","translation":"……改善线上排名、数字化会计管理，或者还可以使用社交网络招聘。","analysis":"列举同类用途的另一个例子，用 ou encore。"},"optionTranslations":["A. 并因此","B. 此外","C. 或者还可以/又如","D. 此外/另一方面"]}],"sentencePairs":[["Le gouvernement du Québec met en place une campagne d'accompagnement numérique pour les entreprises individuelles (1) des formations et des sensibilisations.","魁北克政府通过培训和宣传活动，为个体企业设立一项数字化陪伴计划。"],["Elles pourront, par exemple, bénéficier de formations leur permettant d'améliorer leur référencement en ligne, de numériser leur gestion comptable, (2) d'utiliser les réseaux pour recruter.","例如，这些企业可以获得培训，使它们能够改善在线搜索排名、将会计管理数字化，（2）使用社交网络进行招聘。"]]},{"title":"8. Océan et pêche industrielle","stem":"L'océan absorbe jusqu'à un tiers de nos émissions de dioxyde de carbone. Mais pour qu'il remplisse son rôle, il doit être en bonne santé, (1) il peut « se retourner » contre l'humanité. Aujourd'hui, la principale cause de destruction de l'océan est la pêche industrielle, un secteur trop largement subventionné (2) son immense impact environnemental.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. sans quoi","B. pour lors","C. aussi bien","D. par conséquent"],"answer":"A. sans quoi","explanation":{"full":"涉及原句：\nIl doit être en bonne santé, sans quoi il peut se retourner contre l'humanité.\n中文：\n它必须保持健康，否则可能会反噬人类。\n简析：\nsans quoi = 否则。","sentence":"Il doit être en bonne santé, sans quoi il peut se retourner contre l'humanité.","translation":"它必须保持健康，否则可能会反噬人类。","analysis":"sans quoi = 否则。"},"optionTranslations":["A. 否则","B. 当时/那时","C. 同样/也","D. 因此"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. du fait de","B. en sus de","C. en dépit de","D. au risque de"],"answer":"C. en dépit de","explanation":{"full":"涉及原句：\n... la pêche industrielle, un secteur trop largement subventionné en dépit de son immense impact environnemental.\n中文：\n工业捕鱼是一个尽管环境影响巨大却仍受到过度补贴的行业。\n简析：\n前后让步关系：有巨大环境影响，仍被补贴。","sentence":"... la pêche industrielle, un secteur trop largement subventionné en dépit de son immense impact environnemental.","translation":"工业捕鱼是一个尽管环境影响巨大却仍受到过度补贴的行业。","analysis":"前后让步关系：有巨大环境影响，仍被补贴。"},"optionTranslations":["A. 由于","B. 除……之外","C. 尽管","D. 冒着……风险"]}],"sentencePairs":[["L'océan absorbe jusqu'à un tiers de nos émissions de dioxyde de carbone.","海洋吸收了我们多达三分之一的二氧化碳排放。"],["Mais pour qu'il remplisse son rôle, il doit être en bonne santé, (1) il peut « se retourner » contre l'humanité.","但是，为了让海洋发挥作用，它必须保持健康，（1）它可能会“反过来”危及人类。"],["Aujourd'hui, la principale cause de destruction de l'océan est la pêche industrielle, un secteur trop largement subventionné (2) son immense impact environnemental.","如今，破坏海洋的主要原因是工业捕鱼；这一行业（2）其巨大的环境影响，却仍获得过度广泛的补贴。"]]},{"title":"9. Don à l'Unapei","stem":"Faire un don à l'Unapei, c'est agir concrètement à la construction d'une société solidaire et inclusive. (1), vous recevrez un reçu fiscal à joindre à votre prochaine déclaration d'impôt, lequel vous fera bénéficier d'une déduction fiscale de 66 %. Un don de 100 € ne vous coûte (2) que 34 € !","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. De la sorte","B. À l'encontre","C. Par conséquent","D. En contrepartie"],"answer":"D. En contrepartie","explanation":{"full":"涉及原句：\nEn contrepartie, vous recevrez un reçu fiscal...\n中文：\n作为回报，你将收到一张可附在下次报税中的税务收据。\n简析：\n捐款后得到税务收据，是回报关系。","sentence":"En contrepartie, vous recevrez un reçu fiscal...","translation":"作为回报，你将收到一张可附在下次报税中的税务收据。","analysis":"捐款后得到税务收据，是回报关系。"},"optionTranslations":["A. 这样/如此","B. 反对/违背","C. 因此","D. 作为回报/相应地"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. en bref","B. dès lors","C. sans doute","D. a contrario"],"answer":"B. dès lors","explanation":{"full":"涉及原句：\nUn don de 100 € ne vous coûte dès lors que 34 € !\n中文：\n因此，一笔100欧元的捐款实际只花你34欧元。\n简析：\n由66%抵税推出实际成本，用 dès lors。","sentence":"Un don de 100 € ne vous coûte dès lors que 34 € !","translation":"因此，一笔100欧元的捐款实际只花你34欧元。","analysis":"由66%抵税推出实际成本，用 dès lors。"},"optionTranslations":["A. 简而言之","B. 因此/从那时起","C. 无疑/可能","D. 反过来/相反地"]}],"sentencePairs":[["Faire un don à l'Unapei, c'est agir concrètement à la construction d'une société solidaire et inclusive.","向Unapei捐款，就是切实参与建设一个团结而包容的社会。"],["(1), vous recevrez un reçu fiscal à joindre à votre prochaine déclaration d'impôt, lequel vous fera bénéficier d'une déduction fiscale de 66 %.","（1），您将收到一张可附在下一次纳税申报中的税务收据，它将使您享受66%的税收抵扣。"],["Un don de 100 € ne vous coûte (2) que 34 € !","一笔100欧元的捐款（2）只会让您实际花费34欧元！"]]},{"title":"10. BlaBlaLines","stem":"(1) avoir démocratisé la pratique du covoiturage longue distance, la plateforme BlaBlaCar innove avec BlaBlaLines, une application dédiée aux trajets courts quotidiens. Ce dispositif assure une grande liberté aux covoitureurs qui ne dépendent pas des contraintes d'agenda d'autrui. Le réseau de lignes se développe par lui-même (2) offres et des demandes.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. Pour","B. Après","C. Mis à part","D. Malgré"],"answer":"B. Après","explanation":{"full":"涉及原句：\nAprès avoir démocratisé la pratique du covoiturage longue distance, BlaBlaCar innove avec BlaBlaLines.\n中文：\n在普及长途拼车做法之后，BlaBlaCar 又推出 BlaBlaLines 创新。\n简析：\nAprès avoir + 过去分词 = 在做完……之后。","sentence":"Après avoir démocratisé la pratique du covoiturage longue distance, BlaBlaCar innove avec BlaBlaLines.","translation":"在普及长途拼车做法之后，BlaBlaCar 又推出 BlaBlaLines 创新。","analysis":"Après avoir + 过去分词 = 在做完……之后。"},"optionTranslations":["A. 为了/对于","B. 在……之后","C. 除……之外","D. 尽管"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. à l'instar des","B. en vue des","C. en fonction des","D. en raison des"],"answer":"C. en fonction des","explanation":{"full":"涉及原句：\nLe réseau de lignes se développe par lui-même en fonction des offres et des demandes.\n中文：\n线路网络会根据供给和需求自行发展。\n简析：\nen fonction de = 根据……而变化。","sentence":"Le réseau de lignes se développe par lui-même en fonction des offres et des demandes.","translation":"线路网络会根据供给和需求自行发展。","analysis":"en fonction de = 根据……而变化。"},"optionTranslations":["A. 像……一样","B. 为了/考虑到","C. 根据……","D. 由于……"]}],"sentencePairs":[["(1) avoir démocratisé la pratique du covoiturage longue distance, la plateforme BlaBlaCar innove avec BlaBlaLines, une application dédiée aux trajets courts quotidiens.","（1）普及长途拼车做法之后，BlaBlaCar平台通过BlaBlaLines进行创新；这是一款专门用于日常短途出行的应用。"],["Ce dispositif assure une grande liberté aux covoitureurs qui ne dépendent pas des contraintes d'agenda d'autrui.","这一机制为拼车者提供了很大自由，因为他们不依赖他人的日程限制。"],["Le réseau de lignes se développe par lui-même (2) offres et des demandes.","线路网络会根据供给和需求自行发展。"]]},{"title":"11. Agents indélicats dans les transports béninois","stem":"Je voudrais, par cette circulaire, mettre en garde les agents indélicats qui s'adonnent à des pratiques illicites. J'invite (1) tous les usagers à dénoncer toute tentative de rançonnement de la part de ces agents des services de transports béninois, (2) soient engagées les mesures répressives les plus appropriées.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. en conséquence","B. en revanche","C. sans doute","D. non seulement"],"answer":"A. en conséquence","explanation":{"full":"涉及原句：\nJ'invite en conséquence tous les usagers à dénoncer toute tentative de rançonnement.\n中文：\n因此，我邀请所有乘客举报任何勒索企图。\n简析：\n前面提出警告，后面顺势要求举报，用 en conséquence。","sentence":"J'invite en conséquence tous les usagers à dénoncer toute tentative de rançonnement.","translation":"因此，我邀请所有乘客举报任何勒索企图。","analysis":"前面提出警告，后面顺势要求举报，用 en conséquence。"},"optionTranslations":["A. 因此/因此相应地","B. 相反/然而","C. 无疑/可能","D. 不仅"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. pour que","B. ainsi que","C. parce que","D. bien que"],"answer":"A. pour que","explanation":{"full":"涉及原句：\n... pour que soient engagées les mesures répressives les plus appropriées.\n中文：\n……以便采取最适当的惩罚措施。\n简析：\npour que + subjonctif；后面 soient engagées 是虚拟式被动。","sentence":"... pour que soient engagées les mesures répressives les plus appropriées.","translation":"……以便采取最适当的惩罚措施。","analysis":"pour que + subjonctif；后面 soient engagées 是虚拟式被动。"},"optionTranslations":["A. 为了使/以便","B. 以及/正如","C. 因为","D. 虽然"]}],"sentencePairs":[["Je voudrais, par cette circulaire, mettre en garde les agents indélicats qui s'adonnent à des pratiques illicites.","我希望通过这份通告，警告那些从事非法行为的不端工作人员。"],["J'invite (1) tous les usagers à dénoncer toute tentative de rançonnement de la part de ces agents des services de transports béninois, (2) soient engagées les mesures répressives les plus appropriées.","我（1）邀请所有用户举报贝宁运输服务这些工作人员的任何勒索企图，（2）启动最适当的惩治措施。"]]},{"title":"12. Clause de confidentialité","stem":"Chaque partie s'interdit de communiquer à tout tiers tout ou partie des informations. Le Prestataire s'engage à ne pas faire apparaître le Client parmi ses (1) dans tout document ou communication accessible au public, sans l'accord écrit préalable de celui-ci. Chaque partie reconnaît que toute divulgation (2) les intérêts de l'autre partie et engagerait sa responsabilité.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. désignations","B. références","C. notes","D. attestations"],"answer":"B. références","explanation":{"full":"涉及原句：\nLe Prestataire s'engage à ne pas faire apparaître le Client parmi ses références.\n中文：\n服务商承诺未经书面同意，不在公开材料中把客户列为自己的客户案例。\n简析：\nréférences 在商业合同语境中指可公开引用的客户/案例。","sentence":"Le Prestataire s'engage à ne pas faire apparaître le Client parmi ses références.","translation":"服务商承诺未经书面同意，不在公开材料中把客户列为自己的客户案例。","analysis":"références 在商业合同语境中指可公开引用的客户/案例。"},"optionTranslations":["A. 指称/任命","B. 参考/客户案例/引用","C. 笔记/分数","D. 证明/证书"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. léserait","B. révélerait","C. décimerait","D. détruirait"],"answer":"A. léserait","explanation":{"full":"涉及原句：\nToute divulgation léserait les intérêts de l'autre partie.\n中文：\n任何披露都会损害另一方的利益。\n简析：\n固定搭配 léser les intérêts = 损害利益。","sentence":"Toute divulgation léserait les intérêts de l'autre partie.","translation":"任何披露都会损害另一方的利益。","analysis":"固定搭配 léser les intérêts = 损害利益。"},"optionTranslations":["A. 会损害","B. 会揭露","C. 会大量毁灭","D. 会摧毁"]}],"sentencePairs":[["Chaque partie s'interdit de communiquer à tout tiers tout ou partie des informations.","双方均禁止向任何第三方传达全部或部分信息。"],["Le Prestataire s'engage à ne pas faire apparaître le Client parmi ses (1) dans tout document ou communication accessible au public, sans l'accord écrit préalable de celui-ci.","服务提供方承诺，在未经客户事先书面同意的情况下，不在任何公众可访问的文件或通信中把客户列入其（1）之中。"],["Chaque partie reconnaît que toute divulgation (2) les intérêts de l'autre partie et engagerait sa responsabilité.","双方均承认，任何披露都会（2）另一方的利益，并将引发其责任。"]]},{"title":"13. Logements pas très sociaux","stem":"Dans le quartier des Abbesses à Paris, la société Cherpantier rachète des immeubles vétustes pour les revendre à la découpe à des prix (1). La plupart des habitants sont partis en se disant victimes de pressions. Ceux qui restent livrent bataille contre ces (2) et leurs pratiques.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. exorbitants","B. cassés","C. abordables","D. réalistes"],"answer":"A. exorbitants","explanation":{"full":"涉及原句：\n... les revendre à la découpe à des prix exorbitants.\n中文：\n……把破旧楼房买下，再拆分以离谱高价出售。\n简析：\n受害、压力、抗争都指向高价，prix exorbitants 是固定搭配。","sentence":"... les revendre à la découpe à des prix exorbitants.","translation":"……把破旧楼房买下，再拆分以离谱高价出售。","analysis":"受害、压力、抗争都指向高价，prix exorbitants 是固定搭配。"},"optionTranslations":["A. 过高的/离谱的","B. 打折的/破损的","C. 负担得起的","D. 现实的"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. riverains","B. citadins","C. promoteurs","D. commerçants"],"answer":"C. promoteurs","explanation":{"full":"涉及原句：\nCeux qui restent livrent bataille contre ces promoteurs et leurs pratiques.\n中文：\n留下来的居民与这些房地产开发商及其做法抗争。\n简析：\n买楼再分割出售的主体是 promoteurs。","sentence":"Ceux qui restent livrent bataille contre ces promoteurs et leurs pratiques.","translation":"留下来的居民与这些房地产开发商及其做法抗争。","analysis":"买楼再分割出售的主体是 promoteurs。"},"optionTranslations":["A. 附近居民","B. 城市居民","C. 房地产开发商","D. 商人/店主"]}],"sentencePairs":[["Dans le quartier des Abbesses à Paris, la société Cherpantier rachète des immeubles vétustes pour les revendre à la découpe à des prix (1).","在巴黎Abbesses街区，Cherpantier公司收购老旧楼房，然后分套转售，售价（1）。"],["La plupart des habitants sont partis en se disant victimes de pressions.","大多数居民已经离开，称自己是压力的受害者。"],["Ceux qui restent livrent bataille contre ces (2) et leurs pratiques.","留下来的人则与这些（2）及其做法展开斗争。"]]},{"title":"14. Lettre de motivation - CV et expérience","stem":"Comme vous pourrez le constater à la lecture de mon CV, (1) des années et grâce à mes précédents emplois, j'ai acquis toutes les compétences attendues pour ce poste. Les différentes missions qui m'ont été confiées m'ont permis d'obtenir une grande expérience dans ce (2).","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. au fil","B. au long","C. au temps","D. au terme"],"answer":"A. au fil","explanation":{"full":"涉及原句：\nAu fil des années, j'ai acquis toutes les compétences attendues pour ce poste.\n中文：\n多年以来，我获得了这个岗位所需的全部能力。\n简析：\n固定搭配 au fil des années = 多年以来/随着岁月。","sentence":"Au fil des années, j'ai acquis toutes les compétences attendues pour ce poste.","translation":"多年以来，我获得了这个岗位所需的全部能力。","analysis":"固定搭配 au fil des années = 多年以来/随着岁月。"},"optionTranslations":["A. 随着……流逝/贯穿","B. 错误表达；应为 tout au long de","C. 在……时代/时间中","D. 在……结束时"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. sujet","B. champ","C. domaine","D. contexte"],"answer":"C. domaine","explanation":{"full":"涉及原句：\n... obtenir une grande expérience dans ce domaine.\n中文：\n……让我在这个领域获得了丰富经验。\n简析：\n工作经验常用 dans ce domaine = 在这个领域。","sentence":"... obtenir une grande expérience dans ce domaine.","translation":"……让我在这个领域获得了丰富经验。","analysis":"工作经验常用 dans ce domaine = 在这个领域。"},"optionTranslations":["A. 主题/题目","B. 领域/场域","C. 领域/行业","D. 背景/语境"]}],"sentencePairs":[["Comme vous pourrez le constater à la lecture de mon CV, (1) des années et grâce à mes précédents emplois, j'ai acquis toutes les compétences attendues pour ce poste.","正如您阅读我的简历时可以看到的，（1）多年，并且凭借我之前的工作经历，我已经获得了该职位所需的全部能力。"],["Les différentes missions qui m'ont été confiées m'ont permis d'obtenir une grande expérience dans ce (2).","交给我的不同任务使我在这个（2）中获得了丰富经验。"]]},{"title":"15. Gravir l’Everest","stem":"Certaines personnes désirent si (1) gravir l'Everest qu'elles s'y préparent pendant des années, y consacrent énormément d'argent, s'épuisent pendant des semaines lors de l'ascension proprement dite et mettent de nombreuses fois leur vie en danger. Est-ce que ça vous ressemble ? Ou préféreriez-vous arriver directement au sommet par hélicoptère et profiter de la vue (2) ?","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. mollement","B. patiemment","C. ardemment","D. doucement"],"answer":"C. ardemment","explanation":{"full":"涉及原句：\nCertaines personnes désirent si ardemment gravir l'Everest qu'elles s'y préparent pendant des années.\n中文：\n有些人如此强烈地渴望攀登珠峰，以至于准备多年。\n简析：\ndésirer ardemment = 强烈渴望；si ... que 表程度。","sentence":"Certaines personnes désirent si ardemment gravir l'Everest qu'elles s'y préparent pendant des années.","translation":"有些人如此强烈地渴望攀登珠峰，以至于准备多年。","analysis":"désirer ardemment = 强烈渴望；si ... que 表程度。"},"optionTranslations":["A. 软弱地/无力地","B. 耐心地","C. 热切地/强烈地","D. 轻柔地/慢慢地"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. imprenable","B. accessible","C. indéfendable","D. généreuse"],"answer":"A. imprenable","explanation":{"full":"涉及原句：\n... profiter de la vue imprenable ?\n中文：\n……享受一览无余的绝佳景色？\n简析：\nvue imprenable = 绝佳景色/无遮挡景观。","sentence":"... profiter de la vue imprenable ?","translation":"……享受一览无余的绝佳景色？","analysis":"vue imprenable = 绝佳景色/无遮挡景观。"},"optionTranslations":["A. 绝佳的/攻不下的","B. 可到达的/可理解的","C. 无法辩护的","D. 慷慨的/丰富的"]}],"sentencePairs":[["Certaines personnes désirent si (1) gravir l'Everest qu'elles s'y préparent pendant des années, y consacrent énormément d'argent, s'épuisent pendant des semaines lors de l'ascension proprement dite et mettent de nombreuses fois leur vie en danger.","有些人如此（1）想攀登珠穆朗玛峰，以至于他们为此准备多年，投入大量金钱，在真正攀登时连续数周筋疲力尽，并多次让自己的生命处于危险之中。"],["Est-ce que ça vous ressemble ?","这像您吗？"],["Ou préféreriez-vous arriver directement au sommet par hélicoptère et profiter de la vue (2) ?","或者您更愿意直接乘直升机到达山顶，欣赏（2）的景色吗？"]]},{"title":"16. Casques bleus tchadiens au Mali","stem":"Les casques bleus tchadiens de la Mission multidimensionnelle intégrée des Nations unies pour la stabilisation au Mali ont commencé à quitter plus tôt (1) de la région de Kidal, dans le nord-est du pays selon notre correspondant à Dakar. Ils protestent contre les refus des autorités maliennes de transition d'accorder des autorisations de vol pour (2) le Tchad.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. que prévu","B. qu'avancé","C. que jamais","D. que demeuré"],"answer":"A. que prévu","explanation":{"full":"涉及原句：\n... ont commencé à quitter plus tôt que prévu la région de Kidal.\n中文：\n……已经开始比预期更早离开基达尔地区。\n简析：\nplus tôt que prévu = 比预期更早。","sentence":"... ont commencé à quitter plus tôt que prévu la région de Kidal.","translation":"……已经开始比预期更早离开基达尔地区。","analysis":"plus tôt que prévu = 比预期更早。"},"optionTranslations":["A. 比预期","B. 错误搭配","C. 比以往任何时候","D. 错误搭配"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. rassembler","B. réunir","C. rallier","D. renouer"],"answer":"C. rallier","explanation":{"full":"涉及原句：\n... des autorisations de vol pour rallier le Tchad.\n中文：\n……飞往乍得的飞行许可。\n简析：\nrallier + 地点 = 前往/抵达某地。","sentence":"... des autorisations de vol pour rallier le Tchad.","translation":"……飞往乍得的飞行许可。","analysis":"rallier + 地点 = 前往/抵达某地。"},"optionTranslations":["A. 集合/聚集","B. 召集/集合","C. 前往/抵达/归队","D. 重新建立/恢复"]}],"sentencePairs":[["Les casques bleus tchadiens de la Mission multidimensionnelle intégrée des Nations unies pour la stabilisation au Mali ont commencé à quitter plus tôt (1) de la région de Kidal, dans le nord-est du pays selon notre correspondant à Dakar.","据我们驻达喀尔记者报道，联合国马里多层面综合稳定特派团中的乍得蓝盔部队已经开始（1）更早地离开位于该国东北部的基达尔地区。"],["Ils protestent contre les refus des autorités maliennes de transition d'accorder des autorisations de vol pour (2) le Tchad.","他们抗议马里过渡当局拒绝发放飞往/前往乍得的飞行许可。"]]},{"title":"17. À nous l'espace !","stem":"Malgré la crise, de nombreux pays investissent énormément d'argent dans la (1) spatiale. Les enjeux scientifiques mais aussi politiques et financiers sont (2) : la guerre des étoiles semble bien lancée !","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. purchase","B. conquête","C. ruée","D. poursuite"],"answer":"D. poursuite","explanation":{"full":"涉及原句：\nDe nombreux pays investissent énormément d'argent dans la poursuite spatiale.\n中文：\n许多国家在太空追逐/太空竞赛中投入大量资金。\n简析：\npoursuite spatiale 强调“太空追逐/竞赛”；语境后面有 guerre des étoiles。","sentence":"De nombreux pays investissent énormément d'argent dans la poursuite spatiale.","translation":"许多国家在太空追逐/太空竞赛中投入大量资金。","analysis":"poursuite spatiale 强调“太空追逐/竞赛”；语境后面有 guerre des étoiles。"},"optionTranslations":["A. 购买（英语词）","B. 征服","C. 蜂拥/淘金热式涌入","D. 追逐/追求"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. colossaux","B. fructueux","C. insupportables","D. irréels"],"answer":"A. colossaux","explanation":{"full":"涉及原句：\nLes enjeux scientifiques mais aussi politiques et financiers sont colossaux.\n中文：\n科学、政治和金融方面的利害关系都非常巨大。\n简析：\nenjeux colossaux = 巨大的利害/重大挑战，是固定语感搭配。","sentence":"Les enjeux scientifiques mais aussi politiques et financiers sont colossaux.","translation":"科学、政治和金融方面的利害关系都非常巨大。","analysis":"enjeux colossaux = 巨大的利害/重大挑战，是固定语感搭配。"},"optionTranslations":["A. 巨大的","B. 富有成果的","C. 难以忍受的","D. 不真实的"]}],"sentencePairs":[["Malgré la crise, de nombreux pays investissent énormément d'argent dans la (1) spatiale.","尽管处于危机之中，许多国家仍在太空（1）中投入大量资金。"],["Les enjeux scientifiques mais aussi politiques et financiers sont (2) : la guerre des étoiles semble bien lancée !","科学方面、同时也包括政治和金融方面的利害关系都（2）：星球大战似乎确实已经打响！"]]},{"title":"18. Bourse universitaire","stem":"L'Agence universitaire de la francophonie offre plusieurs bourses afin de favoriser (1) universitaire, notamment dans le cadre de la recherche. Elles permettent aux étudiants de poursuivre des études à l'international dans un pays membre de l'AUF. Pour être (2), il faut remplir un certain nombre de critères XXX notre site.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. la mobilité","B. la migration","C. la fluctuation","D. la mouvance"],"answer":"A. la mobilité","explanation":{"full":"涉及原句：\nL'AUF offre plusieurs bourses afin de favoriser la mobilité universitaire.\n中文：\n法语大学联盟提供多项奖学金，以促进大学层面的流动交流。\n简析：\nmobilité universitaire = 大学流动/学术交流，是奖学金语境常用搭配。","sentence":"L'AUF offre plusieurs bourses afin de favoriser la mobilité universitaire.","translation":"法语大学联盟提供多项奖学金，以促进大学层面的流动交流。","analysis":"mobilité universitaire = 大学流动/学术交流，是奖学金语境常用搭配。"},"optionTranslations":["A. 流动性/交流流动","B. 迁移/移民","C. 波动","D. 潮流/运动圈子"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. éligible","B. souscrit","C. plausible","D. toléré"],"answer":"A. éligible","explanation":{"full":"涉及原句：\nPour être éligible, il faut remplir un certain nombre de critères.\n中文：\n要符合申请资格，必须满足一定数量的条件。\n简析：\nêtre éligible = 符合资格；后接 remplir des critères。","sentence":"Pour être éligible, il faut remplir un certain nombre de critères.","translation":"要符合申请资格，必须满足一定数量的条件。","analysis":"être éligible = 符合资格；后接 remplir des critères。"},"optionTranslations":["A. 符合资格的","B. 认购的/签署的","C. 可信的/貌似合理的","D. 被容忍的"]}],"sentencePairs":[["L'Agence universitaire de la francophonie offre plusieurs bourses afin de favoriser (1) universitaire, notamment dans le cadre de la recherche.","法语大学联盟提供多项奖学金，以促进大学层面的（1），尤其是在研究框架内。"],["Elles permettent aux étudiants de poursuivre des études à l'international dans un pays membre de l'AUF.","这些奖学金使学生能够在法语大学联盟成员国继续进行国际学习。"],["Pour être (2), il faut remplir un certain nombre de critères XXX notre site.","要成为（2）的申请者，必须满足我们网站上列出的一定数量的条件。"]]},{"title":"19. Événement annulé","stem":"Important : (1) derniers développements relatifs à la tempête de neige, l'université de Montréal a décidé d'annuler ou de reporter toutes ses activités spéciales occasionnant des rassemblements d'importance, vecteurs de trafic. Nous avons (2) le regret de vous annoncer l'annulation des conférences-cocktails sur le thème du jeu et de l'intelligence numérique.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. malgré les","B. grâce aux","C. au mépris de","D. compte tenu des"],"answer":"D. compte tenu des","explanation":{"full":"涉及原句：\nCompte tenu des derniers développements relatifs à la tempête de neige, l'université de Montréal a décidé d'annuler ou de reporter toutes ses activités spéciales.\n中文：\n鉴于暴风雪相关的最新进展，蒙特利尔大学决定取消或推迟所有特别活动。\n简析：\ncompte tenu de/des = 鉴于/考虑到，后接原因背景。","sentence":"Compte tenu des derniers développements relatifs à la tempête de neige, l'université de Montréal a décidé d'annuler ou de reporter toutes ses activités spéciales.","translation":"鉴于暴风雪相关的最新进展，蒙特利尔大学决定取消或推迟所有特别活动。","analysis":"compte tenu de/des = 鉴于/考虑到，后接原因背景。"},"optionTranslations":["A. 尽管","B. 多亏/幸亏","C. 无视/不顾","D. 鉴于/考虑到"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. ensuite","B. d'où","C. pourtant","D. donc"],"answer":"D. donc","explanation":{"full":"涉及原句：\nNous avons donc le regret de vous annoncer l'annulation des conférences-cocktails.\n中文：\n因此，我们很遗憾地通知您，主题鸡尾酒会讲座已取消。\n简析：\n前面说明取消/延期活动的原因，后面通知取消，用 donc 表结果。","sentence":"Nous avons donc le regret de vous annoncer l'annulation des conférences-cocktails.","translation":"因此，我们很遗憾地通知您，主题鸡尾酒会讲座已取消。","analysis":"前面说明取消/延期活动的原因，后面通知取消，用 donc 表结果。"},"optionTranslations":["A. 然后","B. 因此/由此产生","C. 然而","D. 因此/所以"]}],"sentencePairs":[["Important : (1) derniers développements relatifs à la tempête de neige, l'université de Montréal a décidé d'annuler ou de reporter toutes ses activités spéciales occasionnant des rassemblements d'importance, vecteurs de trafic.","重要通知：（1）与暴风雪有关的最新进展，蒙特利尔大学决定取消或推迟所有会造成大规模聚集并带来交通流量的特别活动。"],["Nous avons (2) le regret de vous annoncer l'annulation des conférences-cocktails sur le thème du jeu et de l'intelligence numérique.","我们（2）很遗憾地通知您，关于游戏与数字智能主题的鸡尾酒会讲座取消。"]]},{"title":"20. Ressources naturelles et intox","stem":"Lettre de motivation\nLes pays dotés de ressources naturelles abondantes sont en général des pays en voie de développement. S'ils sont dans cette situation, ce n'est pas (1) leurs richesses naturelles, mais bien à cause de celles-ci.\n\nIntox\nDe nombreuses études montrent que lorsqu'ils sont exposés à de fausses données, leur fournir les vraies permet (2) de corriger les connaissances factuelles, mais pas de refondre les croyances initiales.","questions":[{"qtext":"Question 1. 选择合适内容填入(1)","options":["A. en dépit de","B. à l'égard de","C. grâce à","D. en faveur de"],"answer":"A. en dépit de","explanation":{"full":"涉及原句：\nS'ils sont dans cette situation, ce n'est pas en dépit de leurs richesses naturelles, mais bien à cause de celles-ci.\n中文：\n如果它们处于这种状况，并不是尽管拥有自然资源，而恰恰是因为这些资源。\n简析：\nce n'est pas en dépit de..., mais à cause de... = 不是尽管……，而是因为……。","sentence":"S'ils sont dans cette situation, ce n'est pas en dépit de leurs richesses naturelles, mais bien à cause de celles-ci.","translation":"如果它们处于这种状况，并不是尽管拥有自然资源，而恰恰是因为这些资源。","analysis":"ce n'est pas en dépit de..., mais à cause de... = 不是尽管……，而是因为……。单独的 leurs 已删除，因为它不能单独填在介词结构位置。"},"optionTranslations":["A. 尽管","B. 关于/对于","C. 多亏/由于","D. 支持/有利于"]},{"qtext":"Question 2. 选择合适内容填入(2)","options":["A. non seulement","B. également","C. par ailleurs","D. certes"],"answer":"D. certes","explanation":{"full":"涉及原句：\nLeur fournir les vraies permet certes de corriger les connaissances factuelles, mais pas de refondre les croyances initiales.\n中文：\n给他们提供真实信息固然能够纠正事实性知识，但不能重塑最初的信念。\n简析：\ncertes ... mais pas ... = 固然/确实……，但并不……。non seulement 通常要与 mais aussi / mais encore 呼应，这里接 mais pas 不自然。","sentence":"Leur fournir les vraies permet certes de corriger les connaissances factuelles, mais pas de refondre les croyances initiales.","translation":"给他们提供真实信息固然能够纠正事实性知识，但不能重塑最初的信念。","analysis":"certes ... mais pas ... = 固然/确实……，但并不……。non seulement 通常要与 mais aussi / mais encore 呼应，这里接 mais pas 不自然。"},"optionTranslations":["A. 不仅","B. 也/同样","C. 此外","D. 固然/当然"]}],"sentencePairs":[["Les pays dotés de ressources naturelles abondantes sont en général des pays en voie de développement.","拥有丰富自然资源的国家通常是发展中国家。"],["S'ils sont dans cette situation, ce n'est pas (1) leurs richesses naturelles, mais bien à cause de celles-ci.","如果它们处于这种状况，并不是（1）它们的自然财富，而恰恰是因为这些资源。"],["De nombreuses études montrent que lorsqu'ils sont exposés à de fausses données, leur fournir les vraies permet (2) de corriger les connaissances factuelles, mais pas de refondre les croyances initiales.","许多研究表明，当人们接触虚假数据时，向他们提供真实信息可以（2）纠正事实性知识，但不能重塑原有信念。"]]}];
let idx=0; let selected={}; let results=[]; let dropdown=null; let feedbackShown=false; let seconds=30*60; let translationVisible=false;
const el=id=>document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function renderStem(stem){
  let s=esc(stem);
  s=s.replace(/\(1\)/g,'<span class="blank unfilled" data-q="0">(1)</span>');
  s=s.replace(/\(2\)/g,'<span class="blank unfilled" data-q="1">(2)</span>');
  return s;
}
function renderTranslations(){
  const item=DATA[idx];
  const html=(item.sentencePairs||[]).map(p=>`<div class="pair"><div class="pair-fr">${esc(p[0])}</div><div class="pair-cn">${esc(p[1])}</div></div>`).join('');
  el('translationPanel').innerHTML=html || '<div class="pair-cn">本题暂无逐句翻译。</div>';
  el('translationPanel').style.display=translationVisible?'block':'none';
  el('translateBtn').textContent=translationVisible?'隐藏中文对照':'中文对照翻译';
}
function renderNav(){
  const nav=el('questionNav');
  if(!nav) return;
  let html='<div class="questionNavTitle">全部题号</div><div class="questionNavHint">点击题号可直接跳到指定篇目。</div><div class="qnavGrid">';
  DATA.forEach((item,i)=>{
    const r=results[i];
    let cls='qnavBtn';
    if(i===idx) cls+=' current';
    else if(r && r.per && r.per.every(Boolean)) cls+=' done';
    else if(r && r.per) cls+=' wrongStatus';
    html+=`<button class="${cls}" data-jump="${i}" title="${esc(item.title)}">${i+1}</button>`;
  });
  html+='</div><div class="qnavLegend"><span><i class="dot cur"></i>当前</span><span><i class="dot ok"></i>全对</span><span><i class="dot bad"></i>有错</span></div>';
  nav.innerHTML=html;
  nav.querySelectorAll('[data-jump]').forEach(b=>b.addEventListener('click',()=>jumpToQuestion(Number(b.dataset.jump))));
}
function jumpToQuestion(n){
  if(n<0 || n>=DATA.length) return;
  idx=n;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function render(){
  closeDrop(); feedbackShown=false; selected={}; translationVisible=false;
  const item=DATA[idx];
  el('quiz').style.display='block'; el('summary').style.display='none'; el('title').textContent=item.title;
  el('counter').textContent=`题 ${idx+1} / ${DATA.length}`; el('bar').style.width=`${idx/DATA.length*100}%`;
  el('stem').innerHTML=renderStem(item.stem);
  el('feedback').style.display='none'; el('feedback').innerHTML=''; el('oknote').style.display='none';
  el('nextBtn').textContent='下一题'; el('nextBtn').disabled=true;
  renderTranslations();
  document.querySelectorAll('.blank').forEach(b=>b.addEventListener('click',openDrop));
  updateAnswered();
  renderNav();
}
function openDrop(e){
  closeDrop(); const b=e.currentTarget; const qn=Number(b.dataset.q); const item=DATA[idx];
  dropdown=document.createElement('div'); dropdown.className='dropdown';
  dropdown.innerHTML=item.questions[qn].options.map((o,i)=>{ const cn=translationVisible?`<div class="choice-cn">${esc(item.questions[qn].optionTranslations?.[i]||'')}</div>`:''; return `<div class="choice" data-val="${esc(o)}"><div class="choice-fr">${esc(o)}</div>${cn}</div>`; }).join('');
  document.body.appendChild(dropdown);
  const r=b.getBoundingClientRect();
  dropdown.style.left=Math.min(r.left+window.scrollX, window.scrollX+window.innerWidth-380)+'px';
  dropdown.style.top=(r.bottom+window.scrollY+6)+'px';
  dropdown.querySelectorAll('.choice').forEach(c=>c.addEventListener('click',()=>{
    selected[qn]=c.dataset.val; b.textContent=c.dataset.val; b.classList.remove('unfilled'); closeDrop(); updateNext(); updateAnswered();
  }));
}
function closeDrop(){ if(dropdown){ dropdown.remove(); dropdown=null; } }
document.addEventListener('click',e=>{ if(dropdown && !dropdown.contains(e.target) && !e.target.classList.contains('blank')) closeDrop(); });
function updateNext(){ el('nextBtn').disabled=!(selected[0]&&selected[1]); }
function updateAnswered(){ let total=results.reduce((a,r)=>a+r.selected.filter(Boolean).length,0)+Object.keys(selected).length; el('answered').textContent=`${total} / ${DATA.length*2} 空`; }
function check(){
  const item=DATA[idx]; const per=item.questions.map((q,i)=>selected[i]===q.answer); const all=per.every(Boolean);
  const record={title:item.title, selected:[selected[0]||'', selected[1]||''], correct:item.questions.map(q=>q.answer), per, explanations:item.questions.map(q=>q.explanation)};
  results[idx]=record;
  renderNav();
  if(all){ el('oknote').style.display='block'; setTimeout(()=>goNext(),450); }
  else { feedbackShown=true; showFeedback(record); el('nextBtn').textContent=idx===DATA.length-1?'查看汇总':'看完解析，进入下一题'; }
}
function showFeedback(record){
  let html='<h3>本题有错误，先看解析。</h3>';
  record.per.forEach((ok,i)=>{
    const exp=record.explanations[i]||{};
    html+=`<div class="explain"><b>空 ${i+1}：</b>${ok?'答对':'答错'}。你的答案：${esc(record.selected[i]||'未作答')}；正确答案：<b style="color:#1266cc">${esc(record.correct[i])}</b><br>`;
    if(exp.sentence) html+=`<b>涉及原句：</b>${esc(exp.sentence)}<br>`;
    if(exp.translation) html+=`<b>中文：</b>${esc(exp.translation)}<br>`;
    if(exp.analysis) html+=`<b>简析：</b>${esc(exp.analysis)}`;
    html+='</div>';
  });
  el('feedback').innerHTML=html; el('feedback').style.display='block';
}
function goNext(){ if(idx<DATA.length-1){ idx++; render(); window.scrollTo({top:0,behavior:'smooth'}); } else { showSummary(); } }
el('nextBtn').addEventListener('click',()=>{ if(feedbackShown) goNext(); else check(); });
el('resetBtn').addEventListener('click',()=>{ render(); });
el('translateBtn').addEventListener('click',()=>{ translationVisible=!translationVisible; renderTranslations(); });
function classify(exp){
  const a=(exp.analysis||'')+(exp.sentence||'');
  if(/固定搭配|搭配|au fil|faire face|en cas|à des fins|vue imprenable|éligible|mobilité|enjeux|plus tôt que prévu|rallier|compte tenu/.test(a)) return '固定搭配/词汇语感';
  if(/ce qui|主语|指代/.test(a)) return '关系代词/指代';
  if(/对比|相反|Au contraire|alors/.test(a)) return '逻辑连接：对比';
  if(/目的|pour que|afin|虚拟式/.test(a)) return '逻辑连接：目的';
  if(/因此|En effet|解释|顺势|dès lors|conséquence|par conséquent|donc/.test(a)) return '逻辑连接：解释/结果';
  return '语境词义判断';
}
function showSummary(){
  el('quiz').style.display='none'; el('summary').style.display='block'; el('bar').style.width='100%'; el('counter').textContent='完成';
  const total=DATA.length*2; const correct=results.reduce((a,r)=>a+r.per.filter(Boolean).length,0);
  const passCorrect=results.filter(r=>r.per.every(Boolean)).length;
  let wrongs=[]; let cats={};
  results.forEach((r,ri)=>r.per.forEach((ok,qi)=>{ const cat=classify(r.explanations[qi]||{}); cats[cat]=(cats[cat]||{total:0,wrong:0}); cats[cat].total++; if(!ok){cats[cat].wrong++; wrongs.push({ri,qi,r,cat})} }));
  let html=`<h2>练习汇总</h2><div class="score">${correct} / ${total}</div><p>完全答对的篇目：<b>${passCorrect} / ${DATA.length}</b>。用时：<b>${formatTime(30*60-seconds)}</b>。</p>`;
  html+='<div class="grid">';
  results.forEach((r,i)=>{ html+=`<div class="card ${r.per.every(Boolean)?'right':'wrong'}"><b>${i+1}. ${esc(r.title.replace(/^\d+\.\s*/,''))}</b><br><span class="small">空1：${r.per[0]?'✓':'✗'}　空2：${r.per[1]?'✓':'✗'}</span></div>`; });
  html+='</div><h3>错题解析索引</h3>';
  if(!wrongs.length) html+='<p>全部正确。重点保持速度：看到固定搭配和逻辑连接词直接判断。</p>';
  else { html+='<div class="grid">'; wrongs.forEach(w=>{ const exp=w.r.explanations[w.qi]||{}; html+=`<div class="card wrong"><b>${w.ri+1}-${w.qi+1} ${esc(w.r.title.replace(/^\d+\.\s*/,''))}</b><br>你的答案：${esc(w.r.selected[w.qi]||'未作答')}<br>正确答案：<b style="color:#1266cc">${esc(w.r.correct[w.qi])}</b><br><span class="small">类型：${w.cat}</span><br>${esc(exp.analysis||'')}</div>`; }); html+='</div>'; }
  html+='<h3>类型表现</h3><div class="grid">';
  Object.entries(cats).forEach(([k,v])=>{ html+=`<div class="card"><b>${k}</b><br><span class="small">错误 ${v.wrong} / ${v.total}</span></div>`; }); html+='</div>';
  html+='<div class="actions"><button class="btn secondary" onclick="restart()">重新做一遍</button></div>';
  el('summary').innerHTML=html; el('answered').textContent=`${total} / ${total} 空`;
}
function restart(){ idx=0; selected={}; results=[]; seconds=30*60; render(); }
function formatTime(s){ const m=Math.floor(s/60), sec=s%60; return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }
setInterval(()=>{ if(el('summary').style.display==='block') return; seconds=Math.max(0,seconds-1); el('timer').textContent=formatTime(seconds); },1000);
render();
</script></body></html>
