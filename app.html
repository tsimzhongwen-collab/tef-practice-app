<style>
:root{--bg:#eef2f7;--panel:#fff;--line:#d0d5dd;--text:#111827;--muted:#667085;--blue:#175cd3;--blue2:#eff8ff;--green:#067647;--red:#b42318;--shadow:0 10px 28px rgba(16,24,40,.08)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;overflow:hidden}.top{height:64px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:relative;z-index:30}.brand{font-weight:850;font-size:18px}.userbar{display:flex;align-items:center;gap:8px;color:#344054;font-size:13px}.pill{border:1px solid #e4e7ec;background:#f8fafc;border-radius:999px;padding:7px 10px;white-space:nowrap}.logout{border:0;background:#111827;color:#fff;border-radius:10px;padding:8px 12px;font-weight:750;cursor:pointer}.layout{display:grid;grid-template-columns:270px minmax(0,1fr);height:calc(100vh - 64px)}.side{background:rgba(255,255,255,.96);border-right:1px solid var(--line);padding:16px;overflow:auto;position:relative;z-index:20}.navTitle{font-size:13px;color:var(--muted);font-weight:800;margin:4px 0 10px}.module{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;margin:8px 0;padding:14px;text-align:left;cursor:pointer}.module:hover{border-color:var(--blue);background:var(--blue2)}.module.active{background:#dbeafe;border-color:var(--blue)}.module b{display:block;margin-bottom:5px}.module span{font-size:13px;color:var(--muted);line-height:1.45}.tools{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}.readingTools{margin-top:14px;border-top:1px solid var(--line);padding-top:14px}.readingTools.hidden{display:none}.qnavGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.qnavBtn{height:34px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;font-weight:800;color:#344054}.qnavBtn.active{background:#dbeafe;border-color:var(--blue);color:var(--blue)}.qnavBtn.done{border-color:#75c994;background:#ecfdf3}.qnavBtn.bad{border-color:#fda29b;background:#fff1f2;color:#b42318}.translationBox{display:none;margin-top:16px;border:1px solid #dbeafe;background:#f8fbff;border-radius:12px;padding:16px;color:#344054;line-height:1.8;font-size:15px}.translationBox.show{display:block}.readingActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.smallBtn{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 12px;margin:6px 0;cursor:pointer;font-weight:750}.smallBtn:hover{background:#f8fafc}.main{position:relative;overflow:hidden}.frameWrap{height:100%;display:none}.frameWrap.active{display:block}.frame{width:100%;height:100%;border:0;background:#fff}.reading{height:100%;overflow:auto;padding:22px}.readingCard{max-width:1080px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.readingHead{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}.readingBody{display:grid;grid-template-columns:1fr 390px}.article{padding:26px;border-right:1px solid var(--line);line-height:1.9;font-size:18px}.qa{padding:26px;background:#fbfcff}.opt{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;margin:10px 0;cursor:pointer;line-height:1.45}.opt:hover{border-color:var(--blue);background:var(--blue2)}.opt.correct{border-color:#12b76a;background:#f6fef9}.opt.wrong{border-color:#f04438;background:#fff1f0}.feedback{display:none;margin-top:16px;border-radius:12px;padding:14px;line-height:1.65}.feedback.ok{display:block;background:#f6fef9;border:1px solid #abefc6}.feedback.bad{display:block;background:#fff1f0;border:1px solid #fecdca}.wrongPanel{position:absolute;right:18px;top:18px;bottom:18px;width:min(460px,calc(100vw - 36px));background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 60px rgba(16,24,40,.2);z-index:45;display:none;overflow:hidden}.wrongPanel.show{display:block}.wrongHead{height:58px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-weight:850}.wrongList{height:calc(100% - 58px);overflow:auto;padding:14px}.wrongItem{border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;line-height:1.55;background:#fbfcff}.wrongItem .meta{font-size:12px;color:var(--muted);margin-bottom:5px}.close{border:0;background:#f2f4f7;border-radius:10px;padding:8px 11px;cursor:pointer}.watermark{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:.18;overflow:hidden}.wmGrid{position:absolute;inset:-22%;display:grid;grid-template-columns:repeat(3,760px);grid-auto-rows:190px;column-gap:90px;row-gap:55px;transform:rotate(-22deg);transform-origin:center}.wm{width:760px;font-size:15px;font-weight:900;color:#0f172a;letter-spacing:.2px;line-height:1.45;text-shadow:0 1px 0 rgba(255,255,255,.6);display:flex;flex-direction:column;gap:3px;align-items:flex-start}.wm b{font-size:16px}.wm span{white-space:nowrap}.wm .ban{font-size:14px}.appLoading{position:fixed;inset:0;background:rgba(238,242,247,.92);backdrop-filter:blur(8px);z-index:220;display:grid;place-items:center}.appLoadingBox{width:min(380px,calc(100vw - 44px));background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 60px rgba(16,24,40,.18);padding:28px;text-align:center}.appSpinner{width:38px;height:38px;border-radius:999px;border:4px solid #dbeafe;border-top-color:var(--blue);margin:0 auto 14px;animation:spin .8s linear infinite}.appLoadingTitle{font-size:20px;font-weight:850}.appLoadingSub{margin-top:8px;color:var(--muted);font-size:14px}@keyframes spin{to{transform:rotate(360deg)}}.shield{position:fixed;inset:0;background:rgba(238,242,247,.86);backdrop-filter:blur(7px);z-index:90;display:none;align-items:center;justify-content:center;text-align:center;padding:20px}.shield.show{display:flex}.shieldBox{background:#fff;border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--shadow);max-width:420px}.notice{font-size:12px;color:var(--muted);line-height:1.6;margin-top:10px}.badge{font-size:12px;background:#eef4ff;color:#175cd3;border-radius:999px;padding:5px 9px;font-weight:800}@media(max-width:900px){body{overflow:auto}.layout{grid-template-columns:1fr;height:auto}.side{border-right:0;border-bottom:1px solid var(--line)}.main{height:calc(100vh - 64px)}.readingBody{grid-template-columns:1fr}.article{border-right:0;border-bottom:1px solid var(--line)}.userbar .pill:nth-child(n+2){display:none}}@media(prefers-color-scheme:dark){:root{--bg:#0b0f16;--panel:#111827;--line:#2b3442;--text:#e5e7eb;--muted:#9ca3af;--blue:#7db7ff;--blue2:#132235}.top,.side{background:rgba(15,23,42,.97)}.pill{background:#111827;border-color:#2b3442;color:#cbd5e1}.module,.smallBtn,.readingCard,.qa,.opt,.wrongPanel,.wrongItem,.shieldBox,.qnavBtn{background:#111827;color:#e5e7eb;border-color:#2b3442}.module.active{background:#132235}.article{border-color:#2b3442}.frame{background:#111827}.wm{color:#fff}.shield{background:rgba(11,15,22,.86)}.appLoading{background:rgba(11,15,22,.92)}.appLoadingBox{background:#111827}}
@media print{body{display:none!important}}
</style>
</head>
<body>
<div class="appLoading" id="appLoading"><div class="appLoadingBox"><div class="appSpinner"></div><div class="appLoadingTitle">加载中，请稍等...</div><div class="appLoadingSub">正在载入题库与权限信息</div></div></div>
<header class="top">
  <div class="brand">TEF 高频互动刷题系统 <span class="badge">v1.2</span></div>
  <div class="userbar">
    <span class="pill" id="userPill">用户</span>
    <span class="pill" id="expirePill">到期</span>
    <span class="pill" id="devicePill">设备</span>
    <button class="logout" id="logout">退出</button>
  </div>
</header>
<div class="layout">
  <aside class="side">
    <div class="navTitle">功能分区</div>
    <button class="module active" data-target="reading"><b>阅读 Compréhension écrite</b></button>
    <button class="module" data-target="grammar170"><b>语法 Grammaire</b></button>
    <button class="module" data-target="grammar"><b>完形填空 Cloze</b></button>
    <button class="module" data-target="listening"><b>听力 Compréhension orale（更新）</b></button>
    <div class="readingTools" id="readingTools">
      <div class="navTitle">阅读题号导航</div>
      <div class="qnavGrid" id="readingNav"></div>
    </div>
    <div class="tools">
      <div class="navTitle">本地错题板</div>
      <button class="smallBtn" id="openWrong">查看本地错题板 <span id="wrongCount">0</span></button>
      <button class="smallBtn" id="manualWrong">把当前页面加入错题板</button>
      <button class="smallBtn" id="clearWrong">清空本地错题板</button>
    </div>
  </aside>
  <main class="main">
    <section class="frameWrap active" id="reading"><div class="reading" id="readingApp"></div></section>
    <section class="frameWrap" id="grammar170"><iframe class="frame" src="modules/grammar_170.html"></iframe></section>
    <section class="frameWrap" id="grammar"><iframe class="frame" src="modules/grammar_fill.html"></iframe></section>
    <section class="frameWrap" id="listening"><iframe class="frame" src="modules/listening.html"></iframe></section>
    <section class="wrongPanel" id="wrongPanel"><div class="wrongHead"><span>本地错题板</span><button class="close" id="closeWrong">关闭</button></div><div class="wrongList" id="wrongList"></div></section>
  </main>
</div>
<div class="shield" id="shield" style="display:none"></div>
<div class="watermark"><div class="wmGrid" id="wmGrid"></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/auth.js"></script>
<script>
let session = null;
async function bootAuth(){
  const valid = await TEF_AUTH.validateSession();
  if(!valid.ok){ alert(valid.reason); location.href='index.html'; return null; }
  return valid.session;
}

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const fmt = d => new Date(d).toLocaleString('zh-CN',{hour12:false});
(async function init(){
session = await bootAuth();
if(!session) return;
$('#userPill').textContent = `${session.nickname}｜${session.plan}`;
$('#expirePill').textContent = `到期：${fmt(session.expiresAt)}`;
$('#devicePill').textContent = `设备：${session.deviceId.slice(0,8).toUpperCase()}`;
$('#logout').onclick = async ()=>{ await TEF_AUTH.logout(); location.href='index.html'; };

// 定期权限校验：向 Supabase 重新检查账号有效期和设备绑定。
setInterval(async()=>{
  const v = await TEF_AUTH.validateSession();
  if(!v.ok){ alert(v.reason); await TEF_AUTH.logout(); location.href='index.html'; }
}, 60 * 1000);

// 动态水印
function renderWatermark(){
  const grid = $('#wmGrid');
  const name = session.nickname || '专属用户';
  const account = session.phoneMasked || session.email || '账号';
  const device = (session.deviceId || '').slice(0,8).toUpperCase();
  const now = new Date().toLocaleString('zh-CN',{hour12:false});
  grid.innerHTML = Array.from({length:42},()=>`
    <div class="wm">
      <span><b>${name}</b>｜${account}｜设备 ${device}</span>
      <span class="ban">禁止截图/录屏/转发｜泄漏立即封号不退款｜${now}</span>
    </div>`).join('');
}
renderWatermark(); setInterval(renderWatermark, 15000);

// 模块切换
function updateReadingToolsVisibility(target){
  const tools = $('#readingTools');
  if(tools) tools.classList.toggle('hidden', target !== 'reading');
}
$$('.module').forEach(btn=>btn.addEventListener('click',()=>{
  $$('.module').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  $$('.frameWrap').forEach(p=>p.classList.remove('active'));
  $('#' + btn.dataset.target).classList.add('active');
  updateReadingToolsVisibility(btn.dataset.target);
}));
updateReadingToolsVisibility('reading');

// 防复制 / 防右键 / 防打印基础层。已取消“切屏模糊”弹窗，避免正常刷题时被打断。
window.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  if((e.ctrlKey || e.metaKey) && ['c','s','p','u'].includes(k)) e.preventDefault();
});

// 本地错题板
const WRONG_KEY = `tef_v1_wrong_${session.username}`;
function getWrongs(){ try{return JSON.parse(localStorage.getItem(WRONG_KEY)||'[]')}catch(e){return []} }
function setWrongs(items){ localStorage.setItem(WRONG_KEY, JSON.stringify(items)); updateWrongCount(); }
function addWrong(item){ const items=getWrongs(); items.unshift({...item, id:Date.now()+Math.random(), at:new Date().toISOString()}); setWrongs(items.slice(0,300)); }
function updateWrongCount(){ $('#wrongCount').textContent = getWrongs().length; }
function activeModuleName(){ const active = $('.module.active b')?.textContent || '当前模块'; return active; }
function renderWrongList(){
  const items = getWrongs();
  $('#wrongList').innerHTML = items.length ? items.map(x=>`<div class="wrongItem"><div class="meta">${new Date(x.at).toLocaleString('zh-CN',{hour12:false})}｜${x.module}</div><b>${x.title||'错题记录'}</b><div>${x.detail||''}</div></div>`).join('') : '<div class="notice">还没有错题。阅读模块会自动加入错题；嵌入的旧页面可用“把当前页面加入错题板”手动记录。</div>';
}
$('#openWrong').onclick = ()=>{ renderWrongList(); $('#wrongPanel').classList.add('show'); };
$('#closeWrong').onclick = ()=> $('#wrongPanel').classList.remove('show');
$('#manualWrong').onclick = ()=>{ addWrong({module:activeModuleName(), title:'手动记录', detail:'当前模块的一道题需要重刷。'}); renderWrongList(); $('#wrongPanel').classList.add('show'); };
$('#clearWrong').onclick = ()=>{ if(confirm('确定清空本地错题板？')){ setWrongs([]); renderWrongList(); }};
updateWrongCount();

// 阅读模块：已接入上传的《TEF阅读_机经实拍新增_互动练习_优先必刷版.html》题库。
const READING = [{"num":1,"source":"完整文章秒选PDF","origNum":"4","title":"Passion gastronomie","article":"Le restaurant gastronomique québécois /a folle fourchette multiplie les cours On vous propose d'explorer les techniques de base, les spécialités culinaires, \nla confection de pates fraiches, la cuisine végétarienne, régionale, etc. «Notre offre varle selon les saisons et selon certaines thématiques (les récoltes, \nNoël..), expliquent les propriétaires. « On va bientôt proposer une introduction Consultez l'offre et inscrivez-vous vite car les places sont limitées !","question":"Ce document propose de","options":[{"letter":"A","text":"confectionner un repas de Noël.","zh":"做一顿圣诞餐。"},{"letter":"B","text":"participer à des ateliers de cuisine.","zh":"参加烹饪工作坊。"},{"letter":"C","text":"découvrir des spécialités locales.","zh":"发现地方特色菜。"},{"letter":"D","text":"s’inscrire à un concours gastronomique.","zh":"报名参加美食比赛。"}],"answerLetter":"B","answerText":"participer à des ateliers de cuisine.","answerRaw":"B","note":"餐厅课程-选烹饪课","complete":true,"image":null,"articleZh":"魁北克美食餐厅 La Folle Fourchette 开设多种课程：可以学习基础烹饪技巧、地方特色菜、制作新鲜意面、素食料理和地区菜等。店主解释说，课程会根据季节和不同主题变化，例如收获季、圣诞节等。餐厅还将很快推出入门课程。请查看课程并尽快报名，因为名额有限。","questionZh":"这份文件提供什么？"},{"num":2,"source":"完整文章秒选PDF","origNum":"6","title":"Perturbation de circulation","article":"La Ville de Québec informe la population d'une perturbation en cours sur le boulevard Charest, entre les rues de la Couronne et du Parvis. Le trafic est \nrestreint à une seule voie en direction ouest. Les automobilistes sont invites à sulvre les indications de détour sur place afin de contourner la Des policiers \nseront sur place au besoin pour maximiser la fluidité de la circulation.Un important ralentissement de la circulation est toutefois à\nprévoir.","question":"Ce document annonce","options":[{"letter":"A","text":"une interdiction de se garer.","zh":"禁止停车。"},{"letter":"B","text":"une déviation de circulation.","zh":"交通绕行/改道。"},{"letter":"C","text":"une limitation de vitesse.","zh":"限速。"},{"letter":"D","text":"des contrôles policiers.","zh":"警察检查。"}],"answerLetter":"B","answerText":"une déviation de circulation.","answerRaw":"B","note":"道路改道-选绕行","complete":true,"image":null,"articleZh":"魁北克市通知居民：Charest 大道在 Couronne 街与 Parvis 街之间正在发生交通扰动。向西方向的交通被限制为一条车道。司机应按照现场绕行指示避开施工区域。必要时警察会在现场协助，以尽量保持交通顺畅，但仍预计会出现明显拥堵。","questionZh":"这份文件通知/宣布什么？"},{"num":3,"source":"完整文章秒选PDF","origNum":"11","title":"Activité partielle","article":"L'activité partielle, appelée aussi chômage partiel, est un dispositif d'aide aux entreprises en difficulté. Il permet aux salariés de recevoir une indemnité \nvisant à compenser la perte de rémunération due aux heures non travaillées.","question":"1. Ce message informe sur","options":[{"letter":"A","text":"les possibilités de compensation financière pour les salariés.","zh":"员工获得经济补偿的可能。"},{"letter":"B","text":"la limite du temps de travail d’une personne chômée.","zh":"失业者工作时间限制。"},{"letter":"C","text":"les conditions de rupture du contrat de travail.","zh":"劳动合同解除条件。"},{"letter":"D","text":"les droits au chômage lors de la perte d’un emploi.","zh":"失去工作时的失业权利。"}],"answerLetter":"A","answerText":"les possibilités de compensation financière pour les salariés.","answerRaw":"A","note":"部分失业-有补偿","complete":true,"image":null,"articleZh":"“部分活动”，也叫“部分失业”，是一项帮助遇到经济困难企业的制度。它允许处于部分工作状态的员工领取一笔补偿金，用来弥补因未工作时数造成的收入损失。","questionZh":"这条信息介绍什么？"},{"num":4,"source":"完整文章秒选PDF","origNum":"11-2","title":"Activité partielle","article":"Selon le même document, la période indemnisée est considérée comme chômée et le contrat est suspendu mais non rompu.","question":"2. Selon ce document,","options":[{"letter":"A","text":"l’entreprise peut verser une compensation financière.","zh":"企业可以支付经济补偿。"},{"letter":"B","text":"l’entreprise peut rompre un contrat de travail sans préavis.","zh":"企业可以不预告解除劳动合同。"},{"letter":"C","text":"l’employeur peut interrompre la rémunération des salariés.","zh":"雇主可以中断员工薪酬。"},{"letter":"D","text":"l’État peut pénaliser le dépassement de la durée légale.","zh":"国家可处罚超过法定时长。"}],"answerLetter":"A","answerText":"l’entreprise peut verser une compensation financière.","answerRaw":"A","note":"企业补偿-选A","complete":true,"image":null,"articleZh":"根据同一文件，获得补偿的时段被视作失业时段；劳动合同处于暂停状态，但并没有被解除。","questionZh":"根据这份文件，哪项说法正确？"},{"num":5,"source":"完整文章秒选PDF","origNum":"12","title":"Courrier de Franck","article":"Bonsoir, Merci à Camille pour sa synthèse. De mon côté, j’ai travaillé ce week-end et produit le papier joint. Je vous demande de parcourir attentivement \nle plus tôt possible. Toutes vos remarques sur le fond et la mise en page seront bienvenues.","question":"1. L’auteur du courrier demande à ses lecteurs de","options":[{"letter":"A","text":"proposer un résumé.","zh":"提出摘要。"},{"letter":"B","text":"formuler des commentaires.","zh":"提出评论/意见。"},{"letter":"C","text":"corriger des coquilles.","zh":"修改错别字。"},{"letter":"D","text":"respecter une date butoir.","zh":"遵守截止日期。"}],"answerLetter":"B","answerText":"formuler des commentaires.","answerRaw":"B","note":"征求意见-选评论","complete":true,"image":null,"articleZh":"晚上好，感谢 Camille 写的综合摘要。我这边周末也工作了，并完成了附件中的文章。请你们尽快认真浏览。关于内容和排版方面的任何意见都很欢迎。","questionZh":"邮件作者要求读者做什么？"},{"num":6,"source":"完整文章秒选PDF","origNum":"12-2","title":"Courrier de Franck","article":"C’est le papier que je pense remettre à l’issue de ma communication, le 16, au Congrès des mouvements sociaux. Une version finale sera par la suite mise \nau point.","question":"2. Le document préparé par l’auteur sera","options":[{"letter":"A","text":"édité en version courte.","zh":"被编辑成短版。"},{"letter":"B","text":"traduit en espagnol.","zh":"被翻译成西班牙语。"},{"letter":"C","text":"remanié pour publication.","zh":"为发表而修改。"},{"letter":"D","text":"lu lors d’un événement.","zh":"在活动中朗读。"}],"answerLetter":"C","answerText":"remanié pour publication.","answerRaw":"C","note":"会后修改-选发表","complete":true,"image":null,"articleZh":"这是作者打算在 16 日社会运动大会发言结束后提交的文章。之后还会确定一个最终版本。","questionZh":"作者准备的文件之后会怎样？"},{"num":7,"source":"完整文章秒选PDF","origNum":"14","title":"Résiliation Ivanova","article":"Madame Ivanova, Nous avons pris en compte votre demande de résiliation de toutes vos offres téléphone-télévision-internet. Les frais de fermeture \nseront facturés 48 €. L’arrêt du service sera effectif dans 10 jours. Vous disposez d’un délai de 3 semaines pour nous retourner votre équipement.","question":"1. Madame Ivanova doit","options":[{"letter":"A","text":"renvoyer du matériel.","zh":"退回设备。"},{"letter":"B","text":"confirmer sa décision.","zh":"确认她的决定。"},{"letter":"C","text":"contacter le service client.","zh":"联系客户服务。"},{"letter":"D","text":"répondre sous 10 jours.","zh":"10天内回复。"}],"answerLetter":"A","answerText":"renvoyer du matériel.","answerRaw":"A","note":"退设备-选A","complete":true,"image":null,"articleZh":"Ivanova 女士：我们已经受理您取消全部电话、电视和互联网套餐的申请。关闭服务的费用为 48 欧元。服务将在 10 天后正式停止。您有 3 周时间把设备退还给我们。","questionZh":"Ivanova 女士必须做什么？"},{"num":8,"source":"完整文章秒选PDF","origNum":"14-2","title":"Résiliation Ivanova","article":"Le message confirme la résiliation des offres téléphone-télévision-internet.","question":"2. Madame Ivanova souhaite","options":[{"letter":"A","text":"souscrire à une offre.","zh":"订购一个套餐/服务。"},{"letter":"B","text":"faire une réclamation.","zh":"提出投诉。"},{"letter":"C","text":"mettre un terme à son contrat.","zh":"终止合同。"},{"letter":"D","text":"bénéficier d’une réduction.","zh":"享受折扣。"}],"answerLetter":"C","answerText":"mettre un terme à son contrat.","answerRaw":"C","note":"取消合约-选C","complete":true,"image":null,"articleZh":"这条信息确认 Ivanova 女士已经申请取消电话、电视和互联网套餐。","questionZh":"Ivanova 女士想做什么？"},{"num":9,"source":"完整文章秒选PDF","origNum":"15","title":"Trains et cars","article":"","question":"On peut lire cette information dans","options":[{"letter":"A","text":"un supermarché.","zh":"超市。"},{"letter":"B","text":"un cinéma.","zh":"电影院。"},{"letter":"C","text":"une gare.","zh":"车站。"},{"letter":"D","text":"une école.","zh":"学校。"}],"answerLetter":"C","answerText":"une gare.","ans manger, se nourrir est un acte politique. C'est dans cette optique qu'elle a monté la Cantine Vagabonde Paris. Elle y propose une cuisine bio, végétarienne et de saison, soutenant les artisans producteurs d'aliments de qualité. Son livre offre des recettes tout en apportant des informations sur les aliments et les pratiques de consommation pour diminuer l'empreinte écologique.","question":"D’après la cuisinière, bien se nourrir","options":[{"letter":"A","text":"répond à une démarche écologique.","zh":"符合一种生态环保做法。"},{"letter":"B","text":"est une préoccupation récente.","zh":"是最近的关注点。"},{"letter":"C","text":"demande beaucoup d’investissement.","zh":"需要很多投入。"},{"letter":"D","text":"est réservé à une clientèle aisée.","zh":"只面向富裕客户。"}],"answerLetter":"A","answerText":"répond à une démarche écologique.","answerRaw":"A","note":"饮食环保-选生态","complete":true,"image":null,"articleZh":"这位厨师兼餐饮从业者同时关注社会和本地饮食，认为吃饭是一种政治行为。正是基于这一理念，她创办了巴黎的 Cantine Vagabonde。她提供有机、素食、季节性料理，并支持生产优质食材的手工业者和生产者。她的书不仅提供食谱，也介绍食材、消费习惯以及减少环境足迹的做法。","questionZh":"根据这位厨师，吃得好意味着什么？"},{"num":11,"source":"完整文章秒选PDF","origNum":"17","title":"Avoir l’esprit tranquille","article":"Avoir l'esprit tranquille est-il un pur fantasme ? Le niveau zéro stress est-il atteignable ou est-ce une publicité mensongère ? Les turpitudes de l'existence \nque nous ressentons à l'intérieur peuvent-elles disparaître un jour ? Cela paraît largement utopique. Aujourd'hui, chacun a en tête son éden, mais pour \nbeaucoup, bien plus qu'un lieu de liberté, celui-ci ressemble davantage à un cocon de calme et de sérénité. Et, pour atteindre ce paradis, toutes sortes de \nmoyens sont\nproposés: les bien nommés tranquillisants, mais aussi la méditation, le jogging qui libère des endorphins bienvenues pour s'apaiser. Dans cette course à la \npaix, certains sont plus radicaux, cherchant carrément à disparaître de la carte sociétale. Ces arpenteurs de déserts qui souvent ont construit une vie au \nmilieu de nulle part ne sont en rien des vagabonds ou des fuyards mais bien plutôt les porteurs d'un réel projet d'autonomie. Un grand nombre d'entre eux \nrecréent\nune communauté, et restent connectés à l'actualité via internet ! leur intranquillité, qu'ils ont finalement emmenée avec eux, se transforme même parfois \nen une forme de légère paranoia vis-à-vis de ce qui se passe dans le monde. Cependant, vivre, c'est être fondamentalement intranquille. Soit. Mais entre \nanxiété et acceptation passive de notre essentielle insécurité psychologique, comment s'en sortir ? En agissant aussi souvent que possible dans une\nforme d'empathie et de vigilance aux mouvements de la vie. Tout sauf l'inaction et le grand calme donc. C'est un équilibre à trouver, d'une certaine \nmanière, nous devons à la fois lutter contre ce qui provoque de l'intranquillité en nous - nos représentations","question":"1. D’après le texte, l’être humain","options":[{"letter":"A","text":"doit trouver son harmonie spirituelle.","zh":"应该寻找精神和谐。"},{"letter":"B","text":"s’épanouit dans ses relations humaines.","zh":"在人际关系中获得成长。"},{"letter":"C","text":"doit intérioriser ses tourments.","zh":"应该内化自己的痛苦。"},{"letter":"D","text":"se complaît dans son anxiété.","zh":"沉溺于焦虑。"}],"answerLetter":"A","answerText":"doit trouver son harmonie spirituelle.","answerRaw":"A","note":"求内心平衡","complete":true,"image":null,"articleZh":"拥有平静心灵是纯粹的幻想吗？零压力状态能够达到吗，还是一种虚假广告？我们内心感受到的生活波折会有一天消失吗？这看起来很乌托邦。今天每个人心里都有自己的乐园，但对很多人来说，那与其说是自由之地，不如说是一个安静和安宁的茧。为了到达这种天堂，人们尝试各种方法：镇静剂、冥想、慢跑等。有人更激进，想从社会地图上消失，搬到荒野生活；但他们并不是流浪汉或逃避者，而是追求自治生活的人。很多人还会重新建立共同体，并通过互联网与新闻保持联系。他们带走的不安有时甚至会变成对世界的轻微偏执。然而，活着本质上就是不安的。问题是，在焦虑与被动接受心理不安全之间，如何脱身？文章认为应尽可能行动，在同理心和对生活变化的警觉中寻找平衡，而不是无所作为或追求彻底平静。","questionZh":"根据文章，人类应该怎样？"},{"num":12,"source":"完整文章秒选PDF","origNum":"17-2","title":"Avoir l’esprit tranquille","article":"Dans le texte, la technologie permet aux personnes isolées de rester connectées au monde et à l’actualité.","question":"2. D’après le texte, la technologie","options":[{"letter":"A","text":"favorise la paix intérieure.","zh":"促进内心平静。"},{"letter":"B","text":"symbolise un retour à la réalité.","zh":"象征回到现实。"},{"letter":"C","text":"incarne une extension de l’homme.","zh":"体现人的延伸。"},{"letter":"D","text":"représente un moyen de méditation.","zh":"代表一种冥想方式。"}],"answerLetter":"C","answerText":"incarne une extension de l’homme.","answerRaw":"C","note":"技术延伸人","complete":true,"image":null,"articleZh":"文章认为，技术让那些远离社会的人仍然可以与世界和时事保持联系。","questionZh":"根据文章，技术怎样？"},{"num":13,"source":"完整文章秒选PDF","origNum":"18","title":"Droits de l’Homme 1789","article":"18. AU HE\nExtraits de la Déclaration des Droits de l'Homme de 1789\nArticle IV\nLa liberté consiste à pouvoir faire tout ce qui ne nuit pas à autrui: ainsi, l'exercice des droits naturels de chaque homme n'a de bornes que celles qui \nassurent aux autres membres de la société, la jouissance de ces mêmes droits. ces bornes ne peuvent être déterminées que par la loi.\nArticle V\nLa loi n'a le droit de défendre que les actions nuisibles à la Société. Tout ce qui n'est pas défendu par la Loi ne peut être empêché, et nul ne peut être \ncontraint à faire ce qu'elle n'ordonne pas.\n\nArticle VI\nLa Loi est l'expression de la volonté générale. [..] Elle doit être la même pour tous. soit qu'elle protège, soit qu'elle punisse. tous les Citoyens étant égaux \nà ses yeux, sont également admissibles à toutes dignités, places et emplois publics, selon leur capacité, et sans autre distinction que celle de leurs vertus et \nde leurs talents.","question":"1. Selon ces articles,","options":[{"letter":"A","text":"le sort d’un citoyen dépend de la volonté générale.","zh":"公民命运取决于公意。"},{"letter":"B","text":"l’égalité des citoyens est conditionnée par leur instruction.","zh":"公民平等取决于教育程度。"},{"letter":"C","text":"la loi n’interdit que ce qui est néfaste à autrui.","zh":"法律只禁止伤害他人的行为。"},{"letter":"D","text":"les lois sur les libertés sont irrévocables.","zh":"关于自由的法律不可撤销。"}],"answerLetter":"C","answerText":"la loi n’interdit que ce qui est néfaste à autrui.","answerRaw":"C","note":"法律限害人","complete":true,"image":null,"articleZh":"《1789 年人权宣言》节选：第四条说，自由就是能够做一切不损害他人的事情；每个人行使自然权利的边界，只能是保障社会其他成员享有同样权利的边界，而这些边界只能由法律规定。第五条说，法律只能禁止危害社会的行为；凡是法律没有禁止的，都不能被阻止，任何人也不能被迫做法律没有命令的事。第六条说，法律是公意的表达；无论保护还是惩罚，法律对所有人都必须相同；所有公民在法律面前平等，并根据能力平等地获得公共职位，除德行和才能外不作其他区别。","questionZh":"根据这些条文，哪项说法正确？"},{"num":14,"source":"完整文章秒选PDF","origNum":"18-2","title":"Droits de l’Homme 1789","article":"18. AU HE\nExtraits de la Déclaration des Droits de l'Homme de 1789\nArticle IV\nLa liberté consiste à pouvoir faire tout ce qui ne nuit pas à autrui: ainsi, l'exercice des droits naturels de chaque homme n'a de bornes que celles qui \nassurent aux autres membres de la société, la jouissance de ces mêmes droits. ces bornes ne peuvent être déterminées que par la loi.\nArticle V\nLa loi n'a le droit de défendre que les actions nuisibles à la Société. Tout ce qui n'est pas défendu par la Loi ne peut être empêché, et nul ne peut être \ncontraint à faire ce qu'elle n'ordonne pas.\nArticle VI\nLa Loi est l'expression de la volonté générale. [..] Elle doit être la même pour tous. soit qu'elle protège, soit qu'elle punisse. tous les Citoyens étant égaux \nà ses yeux, sont également admissibles à toutes dignités, places et emplois publics, selon leur capacité, et sans autre distinction que celle de leurs vertus et \nde leurs talents.","question":"Ces articles","options":[{"letter":"A","text":"requièrent l’approbation des citoyens par référendum.","zh":"需要公民通过公投批准。"},{"letter":"B","text":"recensent les agissements nuisibles à la société.","zh":"列举对社会有害的行为。"},{"letter":"C","text":"déclarent un durcissement de la législation.","zh":"宣布立法收紧。"},{"letter":"D","text":"définissent un cadre relatif aux libertés publiques.","zh":"定义公共自由的框架。"}],"answerLetter":"D","answerText":"définissent un cadre relatif aux libertés publiques.","answerRaw":"D","note":"自由框架-选D","complete":true,"image":null,"articleZh":"这些条文说明：自由以不伤害他人为界；法律只能规定和限制相关边界；法律对所有人相同，且公民在法律面前平等。","questionZh":"这些条文的作用是什么？"},{"num":15,"source":"完整文章秒选PDF","origNum":"19","title":"Appartement à louer","article":"Suasse, Neutchatel (centre ville), superbe appartement, cinq pièces, trois chambres, deux salles de bain, cuisine équipée, grand balcon avec 2800 francs \npar mois, eau et électricité non comprises.\nA. voir absolument !\nCe message propose\nA. de profiter d'un séjour.\nC. d'acheter un article.\nD. de visiter un site touristique.","question":"Ce message propose","options":[{"letter":"A","text":"de profiter d’un séjour.","zh":"享受一次停留/旅行。"},{"letter":"B","text":"de louer un logement.","zh":"租一个住所。"},{"letter":"C","text":"d’acheter un article.","zh":"购买一件物品。"},{"letter":"D","text":"de visiter un site touristique.","zh":"参观旅游景点。"}],"answerLetter":"B","answerText":"de louer un logement.","answerRaw":"B","note":"租房广告-选租住","complete":true,"image":null,"articleZh":"瑞士 Neuchâtel 市中心出租一套很好的公寓：五个房间、三间卧室、两间浴室、设备齐全的厨房和带美景的大阳台。每月租金 2800 法郎，不包含水费和电费。非常值得一看。","questionZh":"这条信息提供什么？"},{"num":16,"source":"完整文章秒选PDF","origNum":"20","title":"Cours de chant","article":"Professeur au Conservatoire de Montréal donne des COURS DE CHANT Techniques italienne et française Opéra - chanson française - opérette Sessions \nd'une semaine à six mois Progrès rapides garantis !","question":"Ce document propose","options":[{"letter":"A","text":"un enseignement de qualité.","zh":"高质量教学。"},{"letter":"B","text":"une place à l’opéra.","zh":"歌剧院座位/职位。"},{"letter":"C","text":"une semaine de concerts.","zh":"一周音乐会。"},{"letter":"D","text":"un poste en Italie.","zh":"意大利的职位。"}],"answerLetter":"A","answerText":"un enseignement de qualité.","answerRaw":"A","note":"声乐课程-选教学","complete":true,"image":null,"articleZh":"蒙特利尔音乐学院的教师开设声乐课程：包括意大利和法国技巧、法国歌唱、法国歌曲、轻歌剧。课程时长从一周到六个月不等，保证快速进步，并附有联系电话。","questionZh":"这份文件提供什么？"},{"num":17,"source":"完整文章秒选PDF","origNum":"22","title":"Tour de France écologique","article":"Tous engagés dans la roue du tour Afin de se mettre en conformité avec les préoccupations écologiques actuelles, les organisateurs du Tour de France, \ncélèbre course cycliste, demandent à tous les partenaires commerciaux d'offrir des cadeaux publicitaires utiles, en matière recycle et/ou recyclable. les \nproduits alimentaires n'échapperont pas à cette règle. Surfant sur cette vague, une célèbre marque de fromage a développé un embalage en plastique\nrecyclable en exclusivité pour le Tour de France. Signalons également un pas important en faveur de l'économie circulaire. Déterminée à atteindre la \nneutralité carbone d'ici 3 ans, la marque d'eau minérale présente sur le Tour propose des emballages toujours plus durables avec désormais des bouteilles \nen plastique 100 % recyclé à découvrir sur le","question":"1. Pour affirmer son engagement écologique, le sponsor","options":[{"letter":"A","text":"promeut une forme d’économie verte.","zh":"推广一种绿色经济。"},{"letter":"B","text":"vise la fin des emballages inutiles.","zh":"目标是结束无用包装。"},{"letter":"C","text":"participe à des actions de protection de l’océan.","zh":"参与海洋保护行动。"},{"letter":"D","text":"propose l’abandon du charbon dans ses usines.","zh":"建议工厂放弃煤炭。"}],"answerLetter":"A","answerText":"promeut une forme d’économie verte.","answerRaw":"A","note":"赞助商环保","complete":true,"image":null,"articleZh":"为了符合当前生态环保方面的关注，环法自行车赛的组织者要求所有商业合作伙伴提供有用的广告礼品，材料必须可回收或由回收材料制成。食品也不例外。一家著名奶酪品牌顺应这一趋势，为环法推出了独家可回收塑料包装。另一个重要进展是循环经济：一个参与环法的矿泉水品牌决心在三年内实现碳中和，因此推出更耐久的包装，并使用 100% 回收塑料制成的瓶子。","questionZh":"为表明生态承诺，赞助商做了什么？"},{"num":18,"source":"完整文章秒选PDF","origNum":"22-2","title":"Tour de France écologique","article":"Le document présente l’engagement écologique de la course et de ses sponsors.","question":"2. Ce document informe sur","options":[{"letter":"A","text":"le discours critique des écologistes sur la course.","zh":"环保人士对赛事的批评言论。"},{"letter":"B","text":"les principaux sponsors de la course.","zh":"赛事主要赞助商。"},{"letter":"C","text":"l’engagement environnemental de la course.","zh":"赛事的环保承诺。"},{"letter":"D","text":"les déchets laissés par les spectateurs.","zh":"观众留下的垃圾。"}],"answerLetter":"C","answerText":"l’engagement environnemental de la course.","answerRaw":"C","note":"赛事环保-选C","complete":true,"image":null,"articleZh":"这份文件介绍环法自行车赛及其赞助商在生态环保方面的承诺。","questionZh":"这份文件介绍什么？"},{"num":19,"source":"完整文章秒选PDF","origNum":"28","title":"Cantine de Glasgow","article":"28. TER. FPL A Ut CH, CT FFF,\nà. À la cantine, des tablettes numériques plutôt que des frites Manger des carottes rapées à la cantine du collège plutôt que des pâtes ou des hamburgers \npour gagner des tablettes numériques dont rêvent tous les adolescents, des jeux vidéos, des livres ou des places de cinéma: c'est désormais possible pour \nles 30 000 élèves d'une trentaine d'établissements scolaires de Glasgow en Écosse où la municipalité a trouvé ce moyen original de lutter contre l'obésité \ndes jeunes.\nCertains plats au menu des cantines scolaires permettent d'acquérir un certain nombre de points: une salade verte ou un fruit valent 15 points, un \nhamburger n'en vaut que 4 et une assiette de frites n'en donne aucun. Les élèves ont reçu des cartes magnétiques sur lesquelles sont stockés les points de \nleur menu lorsqu'ils passent à la caisse. Lorsqu'on à 4 000 points, on gagne une tablette, 1 500 points donnent droit à un bon d'achat de 15 euros\nsur un site de vente de livres sur Internet; 850 points à deux places de cinéma. Katie, 13 ans, élève du collège, trouve cette idée formidable. « Avant, tout \nle monde se précipitait sur les pizzas et les chips. Maintenant on mange des trucs plus sains, J'ai déjà gagné deux places de cinéma, je vais continuer », \nraconte-t-elle, Le menu sain, le plus populaire, comprend aujourd'hui une soupe, un sandwich, un yaourt et du lait pour 1,80 euros. Il rapporte 40 points. \nII suffit d'en ingurgiter 100 pour gagner une\ntablette numérique d'une valeur de 280 euros. Un site Internet a même été créé pour permettre aux élèves de vérifier leurs points. La municipalité promet \nde dépenser plus de 60 000 euros pour acheter les prix pour les 12 prochains mois, considérant que c'est là la meilleure solution pour lutter contre le \nsurpoids","question":"Question 20 : Pour gagner une tablette numérique de 280 euros, il faut","options":[{"letter":"A","text":"cumuler au moins 4000 points.","zh":"累计至少4000分。"},{"letter":"B","text":"manger uniquement des menus sains.","zh":"只吃健康菜单。"},{"letter":"C","text":"obligatoirement commander 100 menus sains.","zh":"必须点100份健康菜单。"},{"letter":"D","text":"ajouter 1,80 euros chaque fois qu’on achète un plat.","zh":"每次买菜品都加1.80欧。"}],"answerLetter":"A","answerText":"cumuler au moins 4000 points.","answerRaw":"A","note":"健康餐积分","complete":true,"image":null,"articleZh":"在格拉斯哥的学校食堂，学生可以通过选择胡萝卜丝、沙拉、水果等更健康的食物来积累积分，并用积分兑换平板电脑、电子游戏、书籍或电影票。绿色沙拉或水果值 15 分，汉堡只值 4 分，薯条没有积分。积分储存在磁卡上，结账时记录。4000 分可换一台平板电脑，1500 分可换 15 欧购书券，850 分可换两张电影票。一份健康菜单包括汤、三明治、酸奶和牛奶，价格 1.80 欧，值 40 分；吃 100 份即可得到价值 280 欧的平板电脑。市政府认为这是对抗青少年超重的有效办法，并承诺未来 12 个月继续购买奖品。","questionZh":"为了赢得价值 280 欧的平板电脑，需要做什么？"},{"num":20,"source":"完整文章秒选PDF","origNum":"28-2","title":"Cantine de Glasgow","article":"28. TER. FPL A Ut CH, CT FFF,\nà. À la cantine, des tablettes numériques plutôt que des frites Manger des carottes rapées à la cantine du collège plutôt que des pâtes ou des hamburgers \npour gagner des tablettes numériques dont rêvent tous les adolescents, des jeux vidéos, des livres ou des places de cinéma: c'est désormais possible pour \n\nles 30 000 élèves d'une trentaine d'établissements scolaires de Glasgow en Écosse où la municipalité a trouvé ce moyen original de lutter contre l'obésité \ndes jeunes.\nCertains plats au menu des cantines scolaires permettent d'acquérir un certain nombre de points: une salade verte ou un fruit valent 15 points, un \nhamburger n'en vaut que 4 et une assiette de frites n'en donne aucun. Les élèves ont reçu des cartes magnétiques sur lesquelles sont stockés les points de \nleur menu lorsqu'ils passent à la caisse. Lorsqu'on à 4 000 points, on gagne une tablette, 1 500 points donnent droit à un bon d'achat de 15 euros\nsur un site de vente de livres sur Internet; 850 points à deux places de cinéma. Katie, 13 ans, élève du collège, trouve cette idée formidable. « Avant, tout \nle monde se précipitait sur les pizzas et les chips. Maintenant on mange des trucs plus sains, J'ai déjà gagné deux places de cinéma, je vais continuer », \nraconte-t-elle, Le menu sain, le plus populaire, comprend aujourd'hui une soupe, un sandwich, un yaourt et du lait pour 1,80 euros. Il rapporte 40 points. \nII suffit d'en ingurgiter 100 pour gagner une\ntablette numérique d'une valeur de 280 euros. Un site Internet a même été créé pour permettre aux élèves de vérifier leurs points. La municipalité promet \nde dépenser plus de 60 000 euros pour acheter les prix pour les 12 prochains mois, considérant que c'est là la meilleure solution pour lutter contre le \nsurpoids","question":"Question 21 : La mairie de Glasgow","options":[{"letter":"A","text":"souhaite prolonger cette opération qu’elle juge efficace.","zh":"希望延长这项她认为有效的行动。"},{"letter":"B","text":"va proposer un prix de 60 000 euros pour motiver les jeunes.","zh":"将提供6万欧奖金激励年轻人。"},{"letter":"C","text":"a déjà dépensé plus de 60 000 euros pour lutter contre l’obésité.","zh":"已花费超过6万欧对抗肥胖。"},{"letter":"D","text":"promet de créer un site internet afin de contrôler les points.","zh":"承诺创建网站以查看积分。"}],"answerLetter":"A","answerText":"souhaite prolonger cette opération qu’elle juge efficace.","answerRaw":"A","note":"市府延续项目","complete":true,"image":null,"articleZh":"同一篇文章说明：格拉斯哥市政府用健康饮食积分奖励来鼓励学生少吃薯条、披萨和汉堡，多吃健康菜单，并计划继续投入资金购买奖品。","questionZh":"格拉斯哥市政府怎样？"},{"num":21,"source":"完整文章秒选PDF","origNum":"30","title":"Point médian et cause des femmes","article":"30. {LEE VE Point médian et cause des femmes\nPoint médian et cause des femmes Seraient-elles allées trop vite, trop haut, trop fort ? « Elles », c'est-à-dire les féministes dont les propositions en faveur \nd'une écriture inclusive enflamment le débat public.\nSelon Eliane viennot, historienne de littérature, les graphies particulières\ntelles que intellectuel(le), intellectuel-le, intellectuel/le ou encore intellectuel.le, mises en oeuvre ces dernières années afin d'être plus justes et moins \nsexistes ont fait l'objet de tâtonnements. Toujours selon Eliane Viennot, les personnes qui critiquent à bon escient devraient se satisfaire de l'allègement \ndes protocoles déjaen place qui est proposé, c'est à dire le point médian: intellectuelle. « Dénoncer le monopole masculin ici et là,\nse donner les moyens de le démanteler, exige mécaniquement d'augmenter la présence du féminin dans la langue » conclue-t-elle. Le récent ouvrage \ncollectif Le Féminin et le Masculin dans la langue apporte des éclairages sur l'état de la question dans les langues anglaise, allemande, coréenne et arabe. \nL'approche historique s'y avère en outré bien plus fouillée que celle de Viennot. Si les chercheurs complètent certaines de\nses thèses mal étayées, ils en infirment la plupart et penchent, tout bien pesé, du côtédes sceptiques. Les auteurs pensent aussi aux élèves et aux étrangers \napprenants, que les partisans de l'écriture inclusive paraissent parfois passer par pertes et profits. Une des collaboratrices avertit: « C'est une pratique \nréservée aux adultes, une pratique cultivée, conçue pour des lettrés, à l'intention de ceux qu'on appelle des lecteurs-scripteurs \"experts\". » Alors\npourquoi « complexifier l'orthographe notoirement redoutable du français pour des besoins de visibilité symbolique »?","question":"Selon le document, les graphies particulières","options":[{"letter":"A","text":"réfutent les présupposés sexistes de la langue.","zh":"反驳语言中的性别歧视预设。"},{"letter":"B","text":"démontrent l’absurdité de l’usage du point médian.","zh":"证明中点用法荒谬。"},{"letter":"C","text":"complexifient inutilement l’apprentissage.","zh":"不必要地让学习复杂化。"},{"letter":"D","text":"relèvent d’un phénomène récent.","zh":"属于近期现象。"}],"answerLetter":"A","answerText":"réfutent les présupposés sexistes de la langue.","answerRaw":"A","note":"反性别偏见","complete":true,"image":null,"articleZh":"文章讨论包容性书写中的‘中点’与女性议题。女性主义者提出的包容性书写激起公共争论。文学史家 Éliane Viennot 认为，intellectuel(le)、intellectuel-le、intellectuel/le、intellectuel.le 等写法是为了更公平、更少性别歧视而出现的尝试；她认为批评者至少应接受较轻便的中点写法，如 intellectuel·le。她认为，要揭露并拆解语言中的男性垄断，就必然要增加女性形式在语言中的存在。另一部集体著作从英语、德语、韩语和阿拉伯语等角度提供补充视角，历史研究比 Viennot 更深入；作者们修正了她部分论点，也反驳了多数论点，更倾向怀疑立场。他们还考虑到学生和外国学习者，指出包容性写法有时忽视了他们；有人提醒说，这是一种给成人、受教育者、熟练读写者使用的做法。文章最后质疑：为什么要为了象征性可见度，把本来就很难的法语拼写复杂化？","questionZh":"根据文件，这些特殊写法怎样？"},{"num":22,"source":"完整文章秒选PDF","origNum":"30-2","title":"Point médian et cause des femmes","article":"Le texte présente l’écriture inclusive comme une tentative d’équilibre linguistique entre hommes et femmes.","question":"Ces graphies","options":[{"letter":"A","text":"tendent vers un traitement paritaire de la langue.","zh":"趋向语言上的平等处理。"},{"letter":"B","text":"suppriment toute difficulté de lecture.","zh":"消除所有阅读困难。"},{"letter":"C","text":"concernent seulement les spécialistes.","zh":"只涉及专家。"},{"letter":"D","text":"sont refusées par tous les auteurs.","zh":"被所有作者拒绝。"}],"answerLetter":"A","answerText":"tendent vers un traitement paritaire de la langue.","answerRaw":"A","note":"语言平等化","complete":true,"image":null,"articleZh":"这段文字把包容性书写呈现为一种试图在语言中提高女性可见度、追求男女平等表达的做法。","questionZh":"这些写法有什么作用？"},{"num":23,"source":"完整文章秒选PDF","origNum":"32","title":"Offres d’emploi","article":"Offre 1 : Dans le cadre de notre expansion, nous recherchons actuellement un expert-comptable spécialiste de l'immobilier.\nOffre 2 : Vous aimez le sport. Dynamique et souriant, vous savez convaincre, mobile au niveau international. Dans le cadre du développement de notre entreprise, nous recherchons un représentant en ventes sur toute la zone Europe.\nOffre 3 : Notre groupe dispose d'une offre élargie avec une vision novatrice de la relation entre entreprises, candidats à l'emploi et institutionnels. Nous recherchons plusieurs conseillers emploi et carrière.\nOffre 4 : Nous recherchons, dans le cadre de l'ouverture d'une agence spécialisée dans le secteur de la restauration, un(e) responsable d'agence.","question":"Quelle offre d’emploi propose un poste de commercial ?","options":[{"letter":"A","text":"Offre 1.","zh":"第1则招聘/报价。"},{"letter":"B","text":"Offre 2.","zh":"第2则招聘/报价。"},{"letter":"C","text":"Offre 3.","zh":"第3则招聘/报价。"},{"letter":"D","text":"Offre 4.","zh":"第4则招聘/报价。"}],"answerLetter":"B","answerText":"Offre 2.","answerRaw":"B","note":"销售代表-选2","complete":true,"image":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAQDAwMDAgQDAwMEBAQFBgoGBgUFBgwICQcKDgwPDg4MDQ0PERYTDxAVEQ0NExoTFRcYGRkZDxIbHRsYHRYYGRj/2wBDAQQEBAYFBgsGBgsYEA0QGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBj/wAARCAG9AmIDASIAAhEBAxEB/8QAHAAAAQUBAQEAAAAAAAAAAAAAAAEEBQYHAgMI/8QAUhAAAQMDAwIDBAQICwQIBwEBAQIDBAAFEQYSIQcxE0FRFCJhcRUygZFSVJKhscHR4RYjNkJTYnN0k6KyM1Vj8AgXJCZkcoLCNDVDREaE8UUl/8QAFwEBAQEBAAAAAAAAAAAAAAAAAAECA//EABsRAQEBAQADAQAAAAAAAAAAAAARAQIhMUES/9oADAMBAAIRAxEAPwD70kSHWi0lpAUpxW0ZOAOCf1Um+4f0TP5R/ZXlOWhuRDK+3iY/ymngIOB34oPDfcP6Fn8o/so33D+iZ/KP7Kcgc9vz11QNN9w/omfyj+yjfcP6Jn8o/sp3RQNN9w/omfyj+yjfcP6Jn8o/sp3RQNN9w/omfyj+yjfcP6Jn8o/sp3RQNN9w/omfyj+yjfcP6Jn8o/sp3RQNN9w/omfyj+yjfcP6Jn8o/sp3RQNN9w/omfyj+yjfcP6Jn8o/sp3RQNN9w/omfyj+yjfcP6Jn8o/sp1Rmga77h/RM/lH9lG+4f0TP5R/ZTqloGm+4/wBCyf8A1n9lJvuP9Az+X+6nZGfIfbRtHoPuoGS3bkkcR2T/AOv91CHLmTzHYH/qP7KdlAPkPspA2QryI+PNA333DzZZ/KP7KPEn/wA1hn8o/sp0E4PYD5Clxnvz86Bp4lw82Gfyz+yl8Sf+Ls/lH9lOto9BRt+A++ga+JP/ABdn8o/so8Sf+Ls/lH9lOtvwH30bfgPvoGviT/xdn8o/so8Sf+Ls/lH9lOtvwH30bfgPvoGviT/xdn8o/so8Sf8Ai7P5R/ZTrb8B99G34D76Br4k/wDF2fyj+yjxJ+R/EM9/wj+ynW34D76Qp+HmPOgYiTPVILYjs4CQrlR8/wD+V6b5/kwz+Uf2V5tqAupbPdTKSOfiaeJTnnA+3mgb77j/AEDP5f7qN9x/oGfy/wB1O9o9E/dRtHon7qBpvuP9Az+X+6jfcf6Bn8v91O9o9E/dRtHon7qBpvuP9Az+X+6jfcf6Bn8v91O9o9E/dRtHon7qBpvuP9Az+X+6jxLj/QM/l/up3tHon7qTAHkKBr4lw82Gfyj+yjxJ/wCLs/lH9lOuPT89ISAOR+egbeJOHPs7P5R/ZXJfneUdr8o/sr1V7xxyPtrpDYBzyftoPIO3A92Gvyj+yl8Sf+Ls/lH9lOQB5D89Lt+A++ga+J e la 5g semblent infinies. Présentée comme une solution idéale pour déployer le haut débit, cette \nnouvelle technologie est également perçue comme une solution pour connecter les véhicules autonomes et une multitude de dispositifs de l'internet des \nobjets. néanmoins; la valeur ajoutée pour les consommateurs n'est pas encore claire. Cette technologie introduit par ailleurs des vulnérabilités qui incluent \nun\nhaut risque d'exposition des données. Plus inquiétant encore, la 5g ne va résoudre aucun des risques de protection des données et de la vie privée. Elle va \nde plus introduire de nouveaux problèmes de contrôle pour les Mais le plus ennuyeux est qu'elle accentue la lente disparition du concept de « neutralité \ndu réseau », l'un des principes fondateurs d'internet, qui permet la liberté de consulter, partager et faire circuler l'information sans aucune\ndiscrimination. le risque est surtout de se voir imposer encore plus de contrôle et de surveillance, sans pour autant que la sécurité des individus Par \nailleurs, la 5g offre la possibilité de mettre en place des réseaux contrôlés par des intermédiaires, ou par des etats spécifiques. Cela signerait la fin d'un \nréseau unique, libre, universel et accessible par tous sans ce document traite des stratégies des usagers pour contrôler leurs données.\n\ndes dangers potentiels dus à l'évolution des réseaux mobiles. des techniques de désinformation propres aux nouvelles technologies. des alertes résultant \nd'une utilisation frauduleuse d'internet.","question":"Le document traite","options":[{"letter":"A","text":"des stratégies des usagers pour contrôler leurs données.","zh":"中文辅助：请结合题干和关键词理解。"},{"letter":"B","text":"des dangers potentiels dus à l’évolution des réseaux mobiles.","zh":"中文辅助：请结合题干和关键词理解。"},{"letter":"C","text":"des techniques de désinformation propres aux nouvelles technologies.","zh":"中文辅助：请结合题干和关键词理解。"},{"letter":"D","text":"des alertes résultant d’une utilisation frauduleuse d’internet.","zh":"中文辅助：请结合题干和关键词理解。"}],"answerLetter":"B","answerText":"des dangers potentiels dus à l’évolution des réseaux mobiles.","answerRaw":"B","note":"5G 风险-选B","complete":true,"image":null,"articleZh":"文章讨论 5G 是否是一项有前景的技术。5G 被宣传为部署高速网络、连接自动驾驶车辆和大量物联网设备的理想方案，但它给普通消费者带来的增值还不明确。它还带来新的漏洞，包括数据暴露风险。更令人担忧的是，5G 不能解决数据保护和隐私问题，反而会给用户控制带来新困难，并加速网络中立这一互联网基本原则的消失。文章还提到 5G 可能让中介或特定国家建立受控网络，从而威胁一个统一、自由、普遍开放的互联网。","questionZh":"这份文件讨论什么？"},{"num":26,"source":"完整文章秒选PDF","origNum":"35-2","title":"Réseaux 5G","article":"Le texte évoque aussi la crainte d’une surveillance et d’une perte de liberté sur le web.","question":"Le document évoque","options":[{"letter":"A","text":"la généralisation d’une surveillance malveillante sur le web.","zh":"中文辅助：请结合题干和关键词理解。"},{"letter":"B","text":"l’influence grandissante des réseaux sociaux.","zh":"中文辅助：请结合题干和关键词理解。"},{"letter":"C","text":"la remise en cause d’un espace virtuel libre.","zh":"中文辅助：请结合题干和关键词理解。"},{"letter":"D","text":"la réduction de cette technologie à des fins marchandes.","zh":"中文辅助：请结合题干和关键词理解。"}],"answerLetter":"C","answerText":"la remise en cause d’un espace virtuel libre.","answerRaw":"C","note":"网络自由受疑","complete":true,"image":null,"articleZh":"文章还表达了对网络监控和网络自由丧失的担忧。","questionZh":"文件还表达了什么担忧？"},{"num":27,"source":"完整文章秒选PDF","origNum":"37","title":"Information publique","article":"VISITE DU CHATEAU DE FRONTENAC Découvrez l'histoire incroyable de ce luxueux château, icône de la ville de Québec, à travers une visite \nguidée ! DURÉE: 3 heures","question":"On peut lire cette information devant","options":[{"letter":"A","text":"une agence immobilière.","zh":"房地产中介。"},{"letter":"B","text":"une salle de spectacles.","zh":"演出厅。"},{"letter":"C","text":"un bâtiment historique.","zh":"历史建筑。"},{"letter":"D","text":"un bureau de poste.","zh":"邮局。"}],"answerLetter":"C","answerText":"un bâtiment historique.","answerRaw":"C","note":"看地点-选古迹","complete":true,"image":null,"articleZh":"参观 Frontenac 城堡：通过一小时的导览游，发现这座奢华城堡令人难以置信的历史。它是魁北克城的标志性建筑。","questionZ \nTrès riche en magnésium, l’eau minérale Saint-Antonin vous aide à lutter contre la fatigue et le stress.\nPour son prix, vous l’aimerez aussi pour son goût !","question":"Ce document","options":[{"letter":"A","text":"recommande un médicament.","zh":"推荐一种药物。"},{"letter":"B","text":"avertit des dangers du stress.","zh":"警告压力的危险。"},{"letter":"C","text":"fait la promotion d’une boisson.","zh":"推广一种饮料。"},{"letter":"D","text":"annonce un service de santé.","zh":"发布健康服务。"}],"answerLetter":"C","answerText":"fait la promotion d’une boisson.","answerRaw":"C. fait la promotion d’une boisson.","note":"推广饮料","complete":true,"image":null,"articleZh":"圣安托南矿泉水广告：如果你需要能量，Saint-Antonin 的镁元素对你有益。这种矿泉水富含镁，可以帮助对抗疲劳和压力。除了价格，它的味道也会让你喜欢。","questionZh":"这份文件做了什么？"},{"num":35,"source":"屏幕阅读PDF","origNum":"86","title":"Artiste française（Écran 6）","article":"ORLAN est l’une des plus grandes artistes françaises reconnues à l’international. Elle utilise la sculpture, la photographie, la \nperformance, la vidéo ou encore la réalité augmentée. Elle emploie aussi des techniques scientifiques et médicales comme la chirurgie \net les biotechnologies pour réaliser des œuvres variées, reflets d’une expression artistique des plus riches et étonnantes. Mêlant \nchangement et radicalement les données, ce travail met en questionnement l’art, le corps ainsi que le déterminisme naturel, social et \npolitique, et toutes les formes de domination : la suprématie masculine, la religion, la ségrégation culturelle, le racisme...","question":"L’artiste présentée dans cet article","options":[{"letter":"A","text":"s’attaque aux inégalités sociales de façon créative.","zh":"用创造性方式反对社会不平等。"},{"letter":"B","text":"milite contre l’usage des biotechnologies.","zh":"反对生物技术使用。"},{"letter":"C","text":"dénonce le manque d’éthique du monde médical.","zh":"谴责医学界伦理缺失。"},{"letter":"D","text":"défend les artistes victimes de pressions politiques.","zh":"保护遭政治压力的艺术家。"}],"answerLetter":"A","answerText":"s’attaque aux inégalités sociales de façon créative.","answerRaw":"A. s’attaque aux inégalités sociales de façon créative.","note":"创意反不平等","complete":true,"image":null,"articleZh":"文章介绍法国艺术家 ORLAN。她是国际知名的法国艺术家之一，使用雕塑、摄影、行为艺术、视频和增强现实，也使用外科手术、生物技术等科学和医学技术创作多样作品。她的作品反思艺术、身体、自然决定论、社会和政治决定论，以及各种支配形式，如男性至上、宗教、文化隔离和种族主义。","questionZh":"文章中的艺术家怎样？"},{"num":36,"source":"屏幕阅读PDF","origNum":"87","title":"Agir pour le climat（Écran 7）","article":"Agir pour préserver notre climat, pour rendre notre société plus écologique.\nÀ Lyon, vous pourrez rencontrer une trentaine d’associations avec qui, à travers une dizaine de mini-conférences, vous découvrirez \ndes projets qui vous donneront envie de mettre l’écologie au centre de votre mode de vie.\nEnfin, par des démonstrations simples, à découvrir des actions à faire chez soi : compostage, cuisine anti-gaspillage, etc.","question":"Le but de l’événement est de","options":[{"letter":"A","text":"créer de nouvelles associations.","zh":"创建新协会。"},{"letter":"B","text":"découvrir des activités écologiques.","zh":"了解环保活动。"},{"letter":"C","text":"rencontrer des scientifiques.","zh":"见科学家。"},{"letter":"D","text":"ramasser les déchets d’un quartier.","zh":"捡拾一个街区的垃圾。"}],"answerLetter":"B","answerText":"découvrir des activités écologiques.","answerRaw":"B. découvrir des activités écologiques.","note":"发现环保活动","complete":true,"image":null,"articleZh":"这个活动号召保护气候、建设更生态的社会。在里昂，参与者可以见到大约三十个协会，并通过十来场小型讲座了解一些项目，这些项目会让人想把生态放在生活方式的中心。最后，还会通过简单示范展示在家能做的行动，如堆肥、反浪费烹饪等。","questionZh":"这个活动的目的是什么？"},{"num":37,"source":"屏幕阅读PDF","origNum":"88","title":"Attachez-le à la vie（Écran 8）","article":"Attachez-le à la vie.\nVotre enfant, attachez-le correctement dans un siège d’appoint. Ne lui enlevez pas son siège avant qu’il soit assez grand : les \nenfants sont encore blessés ou tués dans un siège trop grand ou trop petit pour être protégés seulement par la ceinture.","question":"Ce message recommande","options":[{"letter":"A","text":"d’acheter un nouveau siège pour bébé.","zh":"买新的婴儿座椅。"},{"letter":"B","text":"de respecter le code de la route.","zh":"遵守交通规则。"},{"letter":"C","text":"de placer l’enfant sur le siège avant.","zh":"把孩子放在前排座位。"},{"letter":"D","text":"de prendre plus de précautions.","zh":"采取更多防护措施。"}],"answerLetter":"D","answerText":"de prendre plus de précautions.","answerRaw":"D. de prendre plus de précautions.","note":"多加防护措施","complete":true,"image":null,"articleZh":"‘把他系在生命上。’这是一条儿童乘车安全提示：你的孩子应正确坐在增高座椅上。不要在孩子还不够高时就拿掉座椅，因为孩子可能因座椅太大或太小、只靠安全带保护而受伤甚至死亡。","questionZh":"这条信息建议什么？"},{"num":38,"source":"屏幕阅读PDF","origNum":"89","title":"Films（Écran 20）","article":"Film 1\nUn homme a quitté les services secrets et vit tranquillement en Jamaïque. Mais sa tranquillité se termine quand un ami lui demande de \nl’aide : il faut sauver un scientifique qui vient d’être kidnappé. L’épreuve commence dans l’urgence.\nFilm 2\nPaul et Virginie viennent d’avoir un petit garçon. Heureux à l’idée de découvrir leur nouvelle vie de jeunes parents, ils \nn’imaginaient pas du tout que leur bébé allait devenir le centre d’une forte lutte entre les grands-parents.\nFilm 3\nC’est une des dernières personnes à récolter le miel de manière traditionnelle, dans les montagnes désertiques de l’Himalaya. Elle \nprélève uniquement le miel nécessaire pour gagner modestement sa vie et préserver la biodiversité.\nFilm 4\nLéa, Marc, Karine et Francis sont deux couples d’amis de longue date. Mais l’harmonie disparaît le jour où Léa leur annonce \nqu’elle a écrit un roman qui deviendra un best-seller. La jalousie commence à apparaître avec ses conséquences.","question":"Quel film propose de l’aventure ?","options":[{"letter":"A","text":"Film 1","zh":"电影1。"},{"letter":"B","text":"Film 2","zh":"电影2。"},{"letter":"C","text":"Film 3","zh":"电影3。"},{"letter":"D","text":"Film 4","zh":"电影4。"}],"answerLetter":"A","answerText":"Film 1","answerRaw":"A. Film 1","note":"Film1 救科学家","complete":true,"image":null,"articleZh":"四部电影简介：电影 1 中，一名已离开情报部门、在牙买加平静生活的男子，被朋友请求帮助拯救一名被绑架的科学家，冒险立刻开始。电影 2 讲新手父母与祖父母之间围绕婴儿产生的争斗。电影 3 讲喜马拉雅山区一位传统采蜜人只采所需蜂蜜、维持生活并保护生物多样性。电影 4 讲两对多年好友因其中一人写出畅销小说而产生嫉妒。","questionZh":"哪部电影提供冒险内容？"},{"num":39,"source":"屏幕阅读PDF","origNum":"90","title":"Événements culturels（Écran 21）","article":"Événement 1\nDans le cadre de ses activités culturelles, la Maison Mohamed V organise du 21 août une exposition collective intitulée « Culte ». Elle \nrend hommage à 50 artistes qui ont marqué la photographie au XXe siècle.\nÉvénement 2\nRendez-vous le 3 mai, pour l’inauguration de la collection Cautiel au Musée Rodin de Paris. Au programme : discours d’ouverture \npar le directeur du musée, exposition des œuvres et présentation d’une sculpture inédite de Camille Claudel.\nÉvénement 3\nDes marques partenaires invitent des clients à découvrir « L’histoire de la chaussure » au Musée des arts et traditions populaires de \nTunis. Une vente privée aura lieu dans la soirée à l’initiative de l’association « Lacets ».\n\nÉvénement 4\nPour fêter son cinquantième anniversaire, l’artiste parisien Corentin Ayo met en lumière ses œuvres de jeunesse à la Seven Brother \nGallery. Le peintre dévoilera ses techniques à travers une exposition des plus modernes, un jeu de couleurs et d’odeurs hautement \nsensoriel pour les curieux.","question":"Quel événement est destiné à une soirée parisienne ?","options":[{"letter":"A","text":"Événement 1","zh":"活动1。"},{"letter":"B","text":"Événement 2","zh":"活动2。"},{"letter":"C","text":"Événement 3","zh":"活动3。"},{"letter":"D","text":"Événement 4","zh":"活动4。"}],"answerLetter":"D","answerText":"Événement 4","answerRaw":"D. Événement 4","note":"事件4 巴黎画展","complete":true,"image":null,"articleZh":"四个文化活动：活动 1 是 Maison Mohamed V 举办的《Culte》集体摄影展，向 20 世纪 50 位重要摄影艺术家致敬。活动 2 是巴黎罗丹博物馆 Cautiel 收藏的开幕活动，包括馆长致辞、作品展和 Camille Claudel 未公开雕塑。活动 3 是突尼斯民俗艺术博物馆的‘鞋子的历史’活动，并有私人销售晚会。活动 4 是巴黎艺术家 Corentin Ayo 为庆祝 50 岁生日，在 Seven Brother Gallery 展出早期作品，并通过现代展览、色彩和气味展示绘画技巧。","questionZh":"哪个活动面向巴黎晚间活动？"},{"num":40,"source":"屏幕阅读PDF","origNum":"91","title":"Offres d’emploi（Écran 22）","article":"Offre 1\nDans le cadre de notre expansion récente, nous recherchons actuellement un expert-comptable, spécialiste de l’immobilier. Nous \nvous offrons la possibilité de mettre votre talent au service d’une entreprise renommée à l’international. Emploi à pourvoir \nimmédiatement.\nOffre 2\nVous aimez le sport ? Dynamique et souriant, vous savez convaincre ? Vous êtes disponible pour des déplacements au niveau \ninternational ? Dans le cadre du développement de notre entreprise, nous recherchons un représentant en vente pour toute la zone \nEurope.\nOffre 3\nNotre groupe dispose d’une offre élargie qui répond à une clientèle variée, avec une vision novatrice de la relation entre tous les \nacteurs du domaine des entreprises, candidats à l’emploi, institutionnels. Nous recherchons pour notre marque spécialisée plusieurs \nconseillers emploi et carrière h/f.\nOffre 4\nNous recherchons, dans le cadre de l’ouverture d’une agence spécialisée dans le secteur de la restauration, un(e) Responsable \nd’agence. Notre entreprise est devenue un groupe référent avec ses solutions innovantes dans le recrutement et le détachement de \ncompétences.","question":"Quelle offre d’emploi propose un poste de commercial ?","options":[{"letter":"A","text":"Offre 1","zh":"选项/报价1。"},{"letter":"B","text":"Offre 2","zh":"选项/报价2。"},{"letter":"C","text":"Offre 3","zh":"选项/报价3。"},{"letter":"D","text":"Offre 4","zh":"选项/报价4。"}],"answerLetter":"B","answerText":"Offre 2","answerRaw":"B. Offre 2","note":"岗位2 销售代表","complete":true,"image":null,"articleZh":"四则招聘：第一则招聘房地产会计专家；第二则招聘欧洲区域销售代表，要求喜欢运动、积极、有说服力并能国际出差；第三则招聘就业和职业顾问；第四则招聘餐饮领域专业机构负责人。","questionZh":"哪则招聘提供商业/销售岗位？"},{"num":41,"source":"屏幕阅读PDF","origNum":"92","title":"Offres de séjour（Écran 23）","article":"Offre 1\nEnvie d’un logement luxueux et connecté pour vos vacances à New York ? Venez trouver votre bonheur au cœur de Manhattan. \nAppartement sans pareil avec vue exceptionnelle. Technologie intelligente de pointe, serrure vocale et portes automatiques : tout le \nmonde y trouvera son compte.\nOffre 2\nLe camping de Bretignolles-sur-Mer vous emmène dans un endroit familial truffé d’activités qui combleront vos journées. Déposez \nvos enfants dans les groupes jeunes et partez vous aérer près du rivage, là où les paysages sont à couper le souffle. Un verre de \nbienvenue vous sera servi dès votre arrivée pour vous plonger dans une ambiance conviviale à laquelle vous ne pourrez pas résister.\nOffre 3\n\nEnvie d’aventures ? Rejoignez des amateurs d’eau vers une destination de vacances enchanteresse. Sorties dans la boue, ateliers \nculinaires et secrets pour vous ! Vous dormirez dans un ancien mas surclassé cinq étoiles, où chaque détail compte.\nOffre 4\nÀ l’Hôtel Baobab, le choix de ne pas proposer le Wi-Fi serait une façon de vous rappeler que vous vous prélassez au beau milieu de \nla nature et que vous êtes priés de lui accorder toute votre attention. Un Eden à la végétation luxuriante, à l’architecture ancestrale, \noù chaque détail a été pensé pour minimiser l’impact sur l’environnement.","question":"Quelle offre permet de passer un séjour éco-responsable ?","options":[{"letter":"A","text":"Offre 1","zh":"选项/报价1。"},{"letter":"B","text":"Offre 2","zh":"选项/报价2。"},{"letter":"C","text":"Offre 3","zh":"选项/报价3。"},{"letter":"D","text":"Offre 4","zh":"选项/报价4。"}],"answerLetter":"D","answerText":"Offre 4","answerRaw":"D. Offre 4","note":"报价4 环保酒店","complete":true,"image":null,"articleZh":"四个度假住宿选择：报价 1 是纽约曼哈顿中心的豪华智能公寓；报价 2 是海边家庭露营地，有儿童活动和欢迎酒；报价 3 是面向喜欢冒险和水上活动的人，住在升级为五星的旧农庄；报价 4 是 Baobab 酒店，不提供 Wi‑Fi，提醒客人关注自然，酒店位于植被茂盛、祖传建筑风格的环境中，并把每个细节都设计成尽量减少环境影响。","questionZh":"哪项报价能提供生态负责的住宿？"},{"num":42,"source":"屏幕阅读PDF","origNum":"93","title":"Graphiques（Écran 24）","article":"Quatre graphiques représentent l’évolution de la population âgée de 15 à 24 ans en Afrique du Nord, en millions. Le commentaire \nindique : « Dans les décennies à venir, les 15-24 ans d’Afrique du Nord verront encore leur nombre augmenter de façon continue. »","question":"Quel graphique correspond au commentaire suivant ?","options":[{"letter":"A","text":"Graphique 1","zh":"图表1。"},{"letter":"B","text":"Graphique 2","zh":"图表2。"},{"letter":"C","text":"Graphique 3","zh":"图表3。"},{"letter":"D","text":"Graphique 4","zh":"图表4。"}],"answerLetter":"B","answerText":"Graphique 2","answerRaw":"B. Graphique 2","note":"图2 持续上升","complete":true,"image":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAQDAwMDAgQDAwMEBAQFBgoGBgUFBgwICQcKDgwPDg4MDQ0PERYTDxAVEQ0NExoTFRcYGRkZDxIbHRsYHRYYGRj/2wBDAQQEBAYFBgsGBgsYEA0QGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBj/wAARCADSAj8DASIAAhEBAxEB/8QAHAAAAgIDAQEAAAAAAAAAAAAAAgMAAQQGBwUI/8QAXRAAAQMCBAEGCAcKCgUKBwAAAQACAwQRBRIhMQYTMkFRYZEHFCIzUnGBoRUjQpKVsdIWNENTVGJ1s8LRCBclOERyc6LBwyQ1Y4KDN0VVhIWUo7Lh8BgmKGV0k/H/xAAZAQADAQEBAAAAAAAAAAAAAAAAAQIDBAX/xAAjEQACAgICAwEBAQEBAAAAAAAAAQIRAxIEIRMxQVEiMhRh/9oADAMBAAIRAxEAPwD6W8O8skfwKI6ysgHxpcKeofEXHyLc3dcebUzu0OK4z/36b7S7L4c2jPghIuby/sLi9O+qnnkEZjGU21CuMbMpsymyS2/1njZ/69P9pNYHHnYjjX/f5vtJOWvaRZ8HzVkRx4g5us0I/wB1VoYbMuOnzajEcaBv04hN9pOFO8amuxk/9oTfaQNgrxr4y3uT2RVp/pQ7k6LspkQP9Kxj6Rm+0mGnJBtU4x9IzfaRthqwPvodyayOr/KW9yKCxDac2sZsZPR/rCf7SIUDTqZ8Y+kpvtLJ5GpJs6rI9TUQpZ7ff7j2ZUUFiIsPaCb1WMa7fyjN9pNGG32qMXP/AGjN9pOZTTflb/Y1M8UqCdK+YD1IoLENwppbrNi/txKb7SNuEM/H4oP+0Z/tJwoZ7/6xn7kXiU//AEjOigsV8EttfxjE/pCf7SJmFQHR02KE/pGb7Sc2jlt/rKf2JjKGRxF8Qqu8KNB7CPgWD08U+kpvtI24HAfwuLfSc32llfB5/L6r5wRCgsNcQqva4I0LoxvgGD8Ziv0nN9pWOH4Ol+LEfpOb7SyxQXItX1B9qyPg5xZbx6fvRoLUwI+GaJri55xU32HwnPp/eTRw5RE74n9JT/aWezDiGG9XOf8AeRtw8W++p/nI0DU88cM0V9PhL1/Cc/2kf3M0np4l7MSm+0vRbh4t99T/ADkYoGhutTP85PUdHnN4Xo3NN34n9JTfaVt4TovTxP6Sn+0vSbh7Px83z05uHt/HT/PS0L2PK+5Skvq7ErfpKb7SIcKYeTzsS+k5vtL2Pg9tgeVnNvzkbaKL05va5TQbHj/cjh50L8S+kpvtK/uOw0a/yn9Jz/aXsiijzA55O9M8Uj9J/eigi2zxG8JYb6WJfSU/2kX3IYYTYvxH6Rn+0vaFLHfd/ei8Vj6396KCzwncGYUdOVxG36Rn+0jj4Lwlg8mTELduJT/aXtCljuOf3pzYIuo96pQsWzPD+47CTpy1f9Iz/aVHgvChvU4h1/6xn+0veNPFY6HvS3QQGFzyBcC1tUaFWeGODsJNiKjEfpGf7S
