约 650 名学生在此学习。它的目标是在造型艺术、思想和文化领域成为重要参考机构。","questionZh":"这份文件是什么？"},{"num":44,"source":"屏幕阅读PDF","origNum":"95","title":"Les Beaux-Arts（Écran 27）","article":"Même document : présentation des Beaux-Arts de Paris, école d’art ancienne et prestigieuse, avec ses missions d’enseignement, \nde conservation et de présentation de collections.","question":"Dans ce document, il est question","options":[{"letter":"A","text":"d’un lieu de rencontre d’artistes.","zh":"艺术家聚会地点。"},{"letter":"B","text":"d’un lieu de formation.","zh":"培训/学习地点。"},{"letter":"C","text":"d’un musée prestigieux.","zh":"著名博物馆。"},{"letter":"D","text":"d’une salle d’exposition.","zh":"展览厅。"}],"answerLetter":"B","answerText":"d’un lieu de formation.","answerRaw":"B. d’un lieu de formation.","note":"培训地点","complete":true,"image":null,"articleZh":"同一文件介绍巴黎美院：这是一所古老而著名的艺术学校，承担教学、保存收藏和展示收藏等使命。","questionZh":"这份文件谈到什么？"},{"num":45,"source":"屏幕阅读PDF","origNum":"96","title":"Le Canadien National（Écran 29）","article":"Afin de notre compagnie de transport, Canadien National, offrir un cadre de travail sans danger demeure une priorité. Nous souhaitons \ndevenir le meilleur chemin de fer de l’Amérique du Nord.\nNous avons décidé de mettre en œuvre quelques mesures préventives sur les voies : retirer les obstacles qui risqueraient d’être \ndangereux, vérifier la stabilité du sol, traiter la terre pour éviter qu’elle ne gèle en hiver.\nNous souhaitons que nos employés retournent chez eux sains et saufs après le travail. Ce principe concerne aussi nos clients : nous \nfaisons tout pour que vos marchandises soient transportées avec soin.","question":"Le Canadien National","options":[{"letter":"A","text":"assure le bon fonctionnement des trains.","zh":"保证火车正常运行。"},{"letter":"B","text":"compte sur la collaboration de ses clients.","zh":"依靠客户合作。"},{"letter":"C","text":"souhaite avoir le monopole du transport public.","zh":"希望垄断公共交通。"},{"letter":"D","text":"fait de la sécurité une valeur fondamentale.","zh":"把安全作为基本价值。"}],"answerLetter":"D","answerText":"fait de la sécurité une valeur fondamentale.","answerRaw":"D. fait de la sécurité une valeur fondamentale.","note":"安全是基本价值","complete":true,"image":null,"articleZh":"加拿大国家铁路公司表示，为运输公司提供安全的工作环境仍是优先事项，目标是成为北美最好的铁路公司。公司决定在线路上采取预防措施：移除可能危险的障碍物，检查土壤稳定性，处理土地避免冬天结冰。公司希望员工下班后都能平安回家；这一原则也适用于客户，公司会认真运输货物。","questionZh":"加拿大国家铁路怎样？"},{"num":46,"source":"屏幕阅读PDF","origNum":"97","title":"Les mesures préventives（Écran 30）","article":"Même document : le Canadien National met en œuvre des mesures préventives sur les voies pour supprimer les obstacles, vérifier le \nsol et éviter le gel.","question":"Les mesures préventives","options":[{"letter":"A","text":"permettent un travail sécuritaire aux équipes.","zh":"让团队安全工作。"},{"letter":"B","text":"aident à anticiper les phénomènes météorologiques.","zh":"帮助预测天气现象。"},{"letter":"C","text":"ne concernent pas les colis des clients.","zh":"不涉及客户包裹。"},{"letter":"D","text":"servent à éviter les accidents entre trains.","zh":"用于避免列车之间事故。"}],"answerLetter":"A","answerText":"permettent un travail sécuritaire aux équipes.","answerRaw":"A. permettent un travail sécuritaire aux équipes.","note":"团队安全工作","complete":true,"image":null,"articleZh":"同一文件说明：加拿大国家铁路在线路上采取预防措施，包括清除障碍、检查土壤并避免结冰，以保障工作安全。","questionZh":"这些预防措施怎样？"},{"num":47,"source":"屏幕阅读PDF","origNum":"98","title":"La psychologue scolaire（Écran 31）","article":"La psychologue scolaire propose de détecter et d’analyser la source des problèmes d’apprentissage ou de comportement de votre \nenfant, afin d’éviter l’éventualité d’un échec scolaire.\nElle peut être amenée à intervenir dans les classes avec les enseignants, pour y conduire certaines activités individuellement ou en \npetits groupes. Des entretiens privés sont également proposés, de même que la réalisation d’une évaluation psychologique.\nToute situation d’intervention appartient au psychologue, mais fait toujours l’objet d’une démarche commune, réalisée avec la \nfamille et l’équipe pédagogique. La psychologue reste à votre disposition pour tout renseignement complémentaire.","question":"La psychologue scolaire propose","options":[{"letter":"A","text":"de responsabiliser les enfants décrocheurs.","zh":"让辍学/失学儿童承担责任。"},{"letter":"B","text":"de soigner des pathologies psychologiques.","zh":"治疗心理疾病。"},{"letter":"C","text":"d’accompagner les élèves en difficulté.","zh":"陪伴/帮助有困难的学生。"},{"letter":"D","text":"d’organiser des réunions pédagogiques.","zh":"组织教学会议。"}],"answerLetter":"C","answerText":"d’accompagner les élèves en difficulté.","answerRaw":"C. d’accompagner les élèves en difficulté.","note":"陪伴困难学生","complete":true,"image":null,"articleZh":"学校心理师提出帮助发现并分析孩子学习或行为问题的来源，以避免可能的学业失败。她可以与教师一起进入班级，进行个人或小组活动；也可提供私人谈话和心理评估。每次干预都属于心理师职责范围，但总是与家庭和教学团队共同进行。学校心理师可提供更多信息。","questionZh":"学校心理师提供什么？"},{"num":48,"source":"屏幕阅读PDF","origNum":"99","title":"Familles et psychologue scolaire（Écran 32）","article":"Même document : toute intervention du psychologue scolaire se construit avec la famille et l’équipe pédagogique.","question":"L’auteur précise que les familles","options":[{"letter":"A","text":"pourront s’informer via l’espace pédagogique.","zh":"能通过教学空间了解信息。"},{"letter":"B","text":"seront amenées à consulter des spécialistes.","zh":"将被要求咨询专家。"},{"letter":"C","text":"feront l’objet d’une expertise psychologique.","zh":"将接受心理评估。"},{"letter":"D","text":"seront associées à toute intervention.","zh":"会参与所有干预。"}],"answerLetter":"D","answerText":"seront associées à toute intervention.","answerRaw":"D. seront associées à toute intervention.","note":"家庭参与干预","complete":true,"image":null,"articleZh":"同一文件强调：心理师的任何干预都与家庭和教学团队共同构建，因此家庭会参与所有干预。","questionZh":"作者说明家庭会怎样？"},{"num":49,"source":"屏幕阅读PDF","origNum":"100","title":"Recours administratif préalable（Écran 36）","article":"Madame Damiens,\nSuite à votre Recours Administratif Préalable concernant l’avis de paiement, nous vous informons que votre demande est acceptée.\nLes titulaires d’une carte d’invalidité bénéficient de 24 h consécutives de stationnement gratuit sur les places payantes sur voirie à \nMontpellier.\nLe stationnement payant de la Ville implique l’enregistrement du véhicule sur l’horodateur ou une application mobile de paiement \npuisque sa durée est limitée. Aussi, après l’émission d’une contravention sans avoir à vous enregistrer à l’horodateur \npréalablement, vous pouvez déclarer votre véhicule en ligne sur www.tam-voyages.com.\nVous avez payé cette contravention ; merci de nous transmettre vos coordonnées bancaires afin que nous puissions vous restituer la \nsomme indûment perçue.","question":"Elle doit envoyer ses identifiants bancaires pour","options":[{"letter":"A","text":"pouvoir payer son amende sans majoration.","zh":"能在不加罚的情况下缴纳罚款。"},{"letter":"B","text":"enregistrer son véhicule sur le site de la Mairie.","zh":"在市政网站登记车辆。"},{"letter":"C","text":"être remboursée du montant de l’amende.","zh":"退还罚款金额。"},{"letter":"D","text":"acheter un forfait pour le stationnement en ville.","zh":"购买市内停车套餐。"}],"answerLetter":"C","answerText":"être remboursée du montant de l’amende.","answerRaw":"C. être remboursée du montant de l’amende.","note":"退还罚款","complete":true,"image":null,"articleZh":"Damiens 女士：关于您对缴费通知提出的预先行政申诉，我们通知您申请已被接受。持有残疾卡的人在 Montpellier 路边收费车位可连续免费停车 24 小时。城市收费停车需要在停车计时器或手机支付应用上登记车辆，因为停车时间有限。因此，在没有预先登记而被开罚单后，您可以在网上申报车辆。您已经支付了这张罚单，请把银行信息发给我们，以便退还误收的金额。","questionZh":"她为什么要发送银行账号信息？"},{"num":50,"source":"屏幕阅读PDF","origNum":"101","title":"Madame Damiens（Écran 37）","article":"Même courrier : la demande de recours administratif préalable de Madame Damiens concernant une contravention de stationnement a \nété acceptée.","question":"Madame Damiens reçoit ce courrier car","options":[{"letter":"A","text":"elle a demandé un abonnement pour le stationnement.","zh":"她申请了停车订阅。"},{"letter":"B","text":"elle a déposé une plainte suite à une contravention.","zh":"她因罚单提出申诉。"},{"letter":"C","text":"elle a refusé de s’acquitter des frais de stationnement.","zh":"她拒绝支付停车费。"},{"letter":"D","text":"elle a effectué une demande de réservation de parking.","zh":"她申请预订停车位。"}],"answerLetter":"B","answerText":"elle a déposé une plainte suite à une contravention.","answerRaw":"B. elle a déposé une plainte suite à une contravention.","note":"罚单后申诉","complete":true,"image":null,"articleZh":"同一信件说明：Damiens 女士针对停车罚单提出的行政申诉已被接受，所以她收到这封信。","questionZh":"Damiens 女士为什么收到这封信？"},{"num":51,"source":"屏幕阅读PDF","origNum":"102","title":"Courrier de Maître Rivet（Écran 39）","article":"Monsieur Lefort,\n\nJe représente les intérêts de Monsieur Dufour François, photographe.\nMonsieur Dufour est titulaire des droits d’auteur sur ses œuvres et pourrait demander réparation contre toutes reproductions faites \nsans son consentement.\nOr, mon client a constaté que vous utilisiez sans autorisation sur votre site Internet ses œuvres originales.\nDans ces circonstances, une action à votre encontre aurait de fortes chances d’aboutir favorablement. Cependant, mon client m’a \ndemandé de rechercher avec vous une solution amiable visant au retrait des images litigieuses de votre site Internet. Faute de réaction \nde votre part sous huitaine, j’ai pour instruction d’engager toute action utile à votre encontre.\nJe vous prie de croire, Monsieur Lefort, en l’assurance de ma considération.\nMaître Rivet","question":"Le client de Maître Rivet","options":[{"letter":"A","text":"exige une réponse par retour de courrier.","zh":"要求立即回信。"},{"letter":"B","text":"réclame la mobilisation d’une commission de contrôle.","zh":"要求启动监督委员会。"},{"letter":"C","text":"demande une compensation pour le préjudice subi.","zh":"要求赔偿遭受的损害。"},{"letter":"D","text":"propose une démarche de conciliation.","zh":"提出和解程序。"}],"answerLetter":"D","answerText":"propose une démarche de conciliation.","answerRaw":"D. propose une démarche de conciliation.","note":"提议和解程序","complete":true,"image":null,"articleZh":"Lefort 先生：Rivet 律师代表摄影师 François Dufour 的利益。Dufour 先生拥有其作品的著作权，可以就未经同意的复制要求赔偿。客户发现您在网站上未经授权使用了他的原创作品。在这种情况下，针对您的行动很可能成功。不过，客户要求我先与您寻找友好解决方案，即从您的网站上撤下争议图片。如果您在八天内没有回应，我将按指示对您采取一切有用行动。","questionZh":"Rivet 律师的客户提出什么？"},{"num":52,"source":"屏幕阅读PDF","origNum":"103","title":"Monsieur Lefort（Écran 40）","article":"Même courrier : Maître Rivet rappelle à Monsieur Lefort qu’il utilise sans autorisation les œuvres protégées de Monsieur Dufour et \nl’invite à retirer les images avant toute action.","question":"Ce courrier a été adressé à Monsieur Lefort pour","options":[{"letter":"A","text":"l’appeler au respect de la législation en vigueur.","zh":"提醒他遵守现行法律。"},{"letter":"B","text":"lui réclamer le règlement d’une infraction.","zh":"要求他支付违规款项。"},{"letter":"C","text":"l’informer d’une action en justice intentée contre lui.","zh":"通知他已被起诉。"},{"letter":"D","text":"lui contester les préjudices d’une sanction judiciaire.","zh":"对司法制裁损害提出异议。"}],"answerLetter":"A","answerText":"l’appeler au respect de la législation en vigueur.","answerRaw":"A. l’appeler au respect de la législation en vigueur.","note":"提醒遵守法律","complete":true,"image":null,"articleZh":"同一律师函说明：Lefort 先生未经授权在网站上使用受保护作品；律师写信要求他遵守现行法律并撤下图片。","questionZh":"这封信寄给 Lefort 先生是为了什么？"},{"num":53,"source":"屏幕阅读PDF","origNum":"104","title":"Installer des ruches dans les grandes villes（Écran 41）","article":"Installer des ruches dans les grandes villes, une bonne idée ?\nC’est une question qui fait débat dans le milieu de l’apiculture urbaine. Il est couramment admis que les villes offrent plusieurs \navantages notables par rapport aux campagnes. D’abord, on ne trouve que très peu de pesticides. Puis il y a une variété d’espèces \nvégétales plus importante qu’en zone rurale. Et finalement, il y fait un peu plus chaud : 1 ou 2 degrés de plus, ce qui permet aux \ncolonies d’abeilles de butiner plus longtemps. On se rend compte que la ville est un environnement qui convient bien aux abeilles.\nLe nombre de ruches dans les villes grandit chaque année et pourtant le nombre d’espaces verts, lui, n’augmente que très peu. \nDes études ont montré que l’effondrement général de la production de miel urbain est en lien direct avec la multiplication rapide du \nnombre de ruches. Cela s’explique par un seuil de densité trop vite atteint menant à une baisse de la production des abeilles, \nnotamment en raison de ressources florales étant arrivées à leurs limites. L’effet positif des villes sur la production de miel tend à \ndécroître au fil des années.","question":"D’après l’article, les abeilles","options":[{"letter":"A","text":"apprécient la biodiversité des villes.","zh":"喜欢城市生物多样性。"},{"letter":"B","text":"se dirigent davantage vers les milieux urbains.","zh":"更多转向城市环境。"},{"letter":"C","text":"représentent un défi écologique pour les villes.","zh":"对城市构成生态挑战。"},{"letter":"D","text":"produisent moins de miel dans les zones agricoles.","zh":"在农业地区产蜜更少。"}],"answerLetter":"A","answerText":"apprécient la biodiversité des villes.","answerRaw":"A. apprécient la biodiversité des villes.","note":"喜欢城市多样性","complete":true,"image":null,"articleZh":"文章讨论在大城市安装蜂箱是否是好主意。城市相较农村有优势：农药很少、植物种类更多、温度略高一两度，使蜂群采蜜时间更长，因此城市环境适合蜜蜂。城市蜂箱数量每年增加，但绿地数量增长很少。研究显示，城市蜂蜜产量普遍下降与蜂箱数量快速增加直接相关，因为密度过快达到上限，花卉资源接近极限，导致蜜蜂产量下降。因此，城市对蜂蜜生产的积极影响会随时间减弱。","questionZh":"根据文章，蜜蜂怎样？"},{"num":54,"source":"屏幕阅读PDF","origNum":"105","title":"Les ruches en ville（Écran 42）","article":"Même article : les villes présentent des avantages pour les abeilles, mais la multiplication des ruches finit par réduire la production de \nmiel urbain.","question":"La mise en place des ruches en ville","options":[{"letter":"A","text":"est inefficace pour protéger l’écosystème.","zh":"对保护生态系统无效。"},{"letter":"B","text":"permet à de nouvelles espèces végétales de proliférer.","zh":"让新的植物物种繁殖。"},{"letter":"C","text":"présente des avantages limités dans le temps.","zh":"好处有时间限制。"},{"letter":"D","text":"a un effet dévastateur sur les campagnes.","zh":"对乡村有毁灭性影响。"}],"answerLetter":"C","answerText":"présente des avantages limités dans le temps.","answerRaw":"C. présente des avantages limités dans le temps.","note":"优势时间有限","complete":true,"image":null,"articleZh":"同一文章指出：城市对蜜蜂有好处，但蜂箱过多会让城市蜂蜜产量下降，因此这种优势有时间限制。","questionZh":"在城市设置蜂箱怎样？"},{"num":55,"source":"屏幕阅读PDF","origNum":"106","title":"La lutte sénégalaise est-elle trop violente ?（Écran 44）","article":"La lutte sénégalaise suscite un engouement dans tout le pays. Le caractère violent et spectaculaire des combats opposant des \nmastodontes n’y est pas étranger. Une certaine hypocrisie sous-tend cette polémique sur la violence de la lutte : ces combats attirent \nle public. Au Sénégal, tout le monde a son lutteur préféré, même le président et les marabouts.\nMais le spectacle serait-il plus important que la protection des lutteurs ? Faire de la lutte, c’est comme faire de la boxe : il faut déjà \napprendre à ne pas prendre de coups. Selon la réglementation du sport, les coups sont interdits sur la nuque, en dessous de la \nceinture et sur les hommes à terre. Le port du protège-dents a également été rendu obligatoire. Toutefois, la puissance des lutteurs \nétant mystifiée et comparée à celle de grands guerriers, il est difficile de faire accepter une idée de protection dans ce sport.\nLa pratique de cette discipline a bien évolué. Certains professionnels regrettent surtout que l’art de la lutte traditionnelle se perde : les \nanciens lutteurs étaient des passionnés et avaient beaucoup plus de technique qu’ils n’en ont aujourd’hui.","question":"D’après l’article,","options":[{"letter":"A","text":"la popularité d’un lutteur est attribuée à son image publique.","zh":"摔跤手受欢迎归因于公众形象。"},{"letter":"B","text":"la lutte véhicule des valeurs de courage depuis longtemps.","zh":"摔跤长期传递勇气价值。"},{"letter":"C","text":"le divertissement du public l’emporte sur la protection des lutteurs.","zh":"公众娱乐胜过对摔跤手的保护。"},{"letter":"D","text":"les lutteurs revendiquent plus de souplesse dans le règlement.","zh":"摔跤手要求规则更灵活。"}],"answerLetter":"C","answerText":"le divertissement du public l’emporte sur la protection des lutteurs.","answerRaw":"C. le divertissement du public l’emporte sur la protection des lutteurs.","note":"娱乐胜过保护","complete":true,"image":null,"articleZh":"文章讨论塞内加尔摔跤是否过于暴力。摔跤在全国引起热情，战斗的暴力和戏剧性正是吸引观众的原因。文章认为，关于暴力的争议有某种虚伪，因为公众正是被这些比赛吸引。问题是表演是否比保护运动员更重要。摔跤像拳击一样，首先要学会不挨打；规则禁止攻击后颈、腰部以下和倒地的人，并要求佩戴护齿。但运动员力量被神秘化、被比作勇士，所以很难让人接受保护观念。这个项目已经发展变化，一些专业人士尤其遗憾传统摔跤技艺正在流失；过去的摔跤手更有激情，也更有技术。","questionZh":"根据文章，哪项说法正确？"},{"num":56,"source":"屏幕阅读PDF","origNum":"107","title":"Les lutteurs（Écran 45）","article":"Même article : les lutteurs sénégalais sont populaires, associés à des figures de puissance et de guerriers, mais les professionnels \nregrettent la perte de technique traditionnelle.","question":"Les lutteurs","options":[{"letter":"A","text":"perfectionnent leur technique au fil des générations.","zh":"代代完善技术。"},{"letter":"B","text":"sont considérés comme des légendes vivantes.","zh":"被视为活传奇。"},{"letter":"C","text":"sont connus pour leurs services au sein de l’armée.","zh":"因军队服役而闻名。"},{"letter":"D","text":"héritent de la même renommée que leurs prédécesseurs.","zh":"继承前辈同样名声。"}],"answerLetter":"B","answerText":"sont considérés comme des légendes vivantes.","answerRaw":"B. sont considérés comme des légendes vivantes.","note":"被视为传奇","complete":true,"image":null,"articleZh":"同一文章说明：塞内加尔摔跤手很受欢迎，被与力量和勇士形象联系起来；专业人士遗憾传统技术流失。","questionZh":"摔跤手怎样？"},{"num":57,"source":"屏幕阅读PDF","origNum":"108","title":"Maltraitance institutionnelle（Écran 48）","article":"Dans sa marche forcée, la numérisation de l’accès aux services publics s’applique à des démarches aussi indispensables qu’une \n\ndemande d’état civil, le règlement d’une amende ou l’obtention d’un permis de séjour. Pourtant, l’obligation de recourir à \nInternet implique un effort particulier pour ceux qui sont les moins en mesure de mobiliser matériel, savoirs informatiques ou assistance \ndes proches.\nDans les mots du rapport qu’elle consacre au rôle croissant du numérique dans la dématérialisation et ses usagers, la défenseure \ndes droits Claire Hédon donne en exemple les permanences de nos délégués territoriaux : arrivent des personnes exaspérées, qui font \npart de leur soulagement à pouvoir, enfin, parler à quelqu’un en os.\nIl est souvent les personnes âgées, les ruraux, les non diplômés, les socialement les cadres, hauts revenus et diplômés du supérieur \nsont bien les moins : smartphone et recourent volontiers à l’administration numérique. Plus une personne affronte une situation de \nprécarité sociale, plus il lui est difficile d’accéder à ses droits, à ses prestations, aux services publics.\nLa situation tend à se dégrader. Mme Hédon rappelle que nul ne peut être mis au motif qu’il ne recourt pas au numérique lors de ses \néchanges avec l’administration. La dématérialisation forcée n’est pas une modernisation : elle représente une forme de \nmaltraitance institutionnelle.","question":"L’accès en ligne aux services administratifs","options":[{"letter":"A","text":"motive les citoyens à développer leurs compétences informatiques.","zh":"激励公民发展电脑技能。"},{"letter":"B","text":"justifie des suppressions de postes dans la fonction publique.","zh":"证明公务部门裁员合理。"},{"letter":"C","text":"est plébiscité par la plus grande partie de la population.","zh":"受到大多数人支持。"},{"letter":"D","text":"complexifie les démarches pour certaines catégories de personnes.","zh":"让某些人群的手续更复杂。"}],"answerLetter":"D","answerText":"complexifie les démarches pour certaines catégories de personnes.","answerRaw":"D. complexifie les démarches pour certaines catégories de personnes.","note":"手续更复杂","complete":true,"image":null,"articleZh":"文章批评公共服务强制数字化。办理出生证明、缴纳罚款或申请居留等必要手续都被转到网上，但强制使用互联网会让最缺设备、电脑知识或亲友帮助的人付出额外努力。权利捍卫者 Claire Hédon 在报告中举例说，地方代表接待处常有愤怒的人到来，他们终于能和真人说话而感到宽慰。老人、农村居民、低学历者和社会弱势群体更难使用数字行政；而高收入、高学历和干部群体更能轻松使用智能手机和数字行政。一个人越处于社会脆弱状态，就越难获得权利、福利和公共服务。情况正在恶化。Hédon 提醒，任何人都不能因为不通过数字方式与行政机关交流而被排除。强制数字化不是现代化，而是一种制度性虐待。","questionZh":"线上行政服务怎样？"},{"num":58,"source":"屏幕阅读PDF","origNum":"109","title":"La défenseure des droits（Écran 49）","article":"Même article : la défenseure des droits critique la dématérialisation forcée des services publics, qui éloigne les personnes fragiles de \nleurs droits.","question":"La défenseure des droits dénonce","options":[{"letter":"A","text":"la fragilisation accrue des personnes en difficulté.","zh":"困难人群更加脆弱。"},{"letter":"B","text":"les dépenses liées à l’achat de matériel pour les particuliers.","zh":"个人购买设备的开支。"},{"letter":"C","text":"la complexité d’usage de la plateforme numérique.","zh":"数字平台使用复杂。"},{"letter":"D","text":"l’insuffisance de l’accueil dans les centres administratifs.","zh":"行政中心接待不足。"}],"answerLetter":"A","answerText":"la fragilisation accrue des personnes en difficulté.","answerRaw":"A. la fragilisation accrue des personnes en difficulté.","note":"困难者更脆弱","complete":true,"image":null,"articleZh":"同一文章中，权利捍卫者批评公共服务强制数字化，因为它让脆弱群体更远离自己的权利。","questionZh":"权利捍卫者谴责什么？"},{"num":59,"source":"屏幕阅读PDF","origNum":"110","title":"Sandra（Question personnelle 1）","article":"Désolée, je ne viens pas aux cours de français et je ne peux pas travailler à la bibliothèque avec toi aujourd’hui. Je suis malade et je \nreste à la maison.\nÀ bientôt,\nSandra","question":"Qu’est-ce que Sandra fait ?","options":[{"letter":"A","text":"Elle étudie son français.","zh":"她学习法语。"},{"letter":"B","text":"Elle invite son ami Rémi.","zh":"她邀请朋友Rémi。"},{"letter":"C","text":"Elle reste chez elle.","zh":"她待在家里。"},{"letter":"D","text":"Elle va à la bibliothèque.","zh":"她去图书馆。"}],"answerLetter":"C","answerText":"Elle reste chez elle.","answerRaw":"C. Elle reste chez elle.","note":"她待在家里","complete":true,"image":null,"articleZh":"Sandra 写信说：抱歉，我今天不去上法语课，也不能和你一起在图书馆学习。我病了，要待在家里。","questionZh":"Sandra 做什么？"},{"num":60,"source":"屏幕阅读PDF","origNum":"111","title":"Lucie（Question personnelle 2）","article":"J’ai une réunion jusqu’à 19h30. Tu peux réserver nos places au cinéma pour un film après 20h ?\nMerci\nLucie","question":"Que veut faire Lucie après 19h30 ?","options":[{"letter":"A","text":"Aller voir un film.","zh":"去看电影。"},{"letter":"B","text":"Dîner avec Fred.","zh":"和Fred吃晚饭。"},{"letter":"C","text":"Passer chez un ami.","zh":"去朋友家。"},{"letter":"D","text":"Rester au travail.","zh":"留在工作地点。"}],"answerLetter":"A","answerText":"Aller voir un film.","answerRaw":"A. Aller voir un film.","note":"去看电影","complete":true,"image":null,"articleZh":"Lucie 写道：我开会到 19 点 30。你能帮我们订 20 点以后电影的座位吗？","questionZh":"Lucie 19:30 后想做什么？"},{"num":61,"source":"屏幕阅读PDF","origNum":"112","title":"Planning（Question personnelle 3）","article":"Samedi\nMarthe : 12h-13h : cours de natation\nDjamel : 11h-13h : révision avec Claire.\nDimanche\nMarthe : 8h-9h : cours avec Claire\nDjamel : 14h-18h : répétition avec groupe","question":"Que fait Marthe ce samedi à 12 heures ?","options":[{"letter":"A","text":"Elle chante.","zh":"她唱歌。"},{"letter":"B","text":"Elle court.","zh":"她跑步。"},{"letter":"C","text":"Elle étudie.","zh":"她学习。"},{"letter":"D","text":"Elle nage.","zh":"她游泳。"}],"answerLetter":"D","answerText":"Elle nage.","answerRaw":"D. Elle nage.","note":"她游泳","complete":true,"image":null,"articleZh":"日程表：周六 Marthe 12 点到 13 点上游泳课；Djamel 11 点到 13 点和 Claire 复习。周日 Marthe 8 点到 9 点和 Claire 上课；Djamel 14 点到 18 点和乐队排练。","questionZh":"Marthe 周六 12 点做什么？"},{"num":62,"source":"屏幕阅读PDF","origNum":"113","title":"Figuration（Question personnelle 4）","article":"Une société de production RECHERCHE pour faire de la FIGURATION dans un film sur le thème parents-enfants, de jeunes mères \nconfrontées à l’éducation de leurs enfants.","question":"Que recherche la société de production ?","options":[{"letter":"A","text":"De jeunes enfants.","zh":"年幼儿童。"},{"letter":"B","text":"Des femmes et des enfants.","zh":"女性和儿童。"},{"letter":"C","text":"De jeunes mamans.","zh":"年轻妈妈。"},{"letter":"D","text":"Des parents avec leurs enfants.","zh":"带孩子的父母。"}],"answerLetter":"C","answerText":"De jeunes mamans.","answerRaw":"C. De jeunes mamans.","note":"年轻妈妈","complete":true,"image":null,"articleZh":"一家制作公司为一部亲子主题电影招募临时演员，寻找面对孩子教育问题的年轻母亲。","questionZh":"制作公司在找什么人？"},{"num":63,"source":"屏幕阅读PDF","origNum":"114","title":"Message à Héloïse（Question personnelle 5）","article":"Héloïse,\nQuand tu viendras chez moi, pense à prendre des vêtements chauds. À la montagne, en hiver, il fait très froid ! Je t’ai envoyé les \nhoraires du bus par sms. Appelle-moi ce soir quand tu rentres du travail. Vivement les vacances !!\nBises !\nSam","question":"Que doit faire Héloïse ?","options":[{"letter":"A","text":"Bien choisir ses vêtements.","zh":"选好衣服。"},{"letter":"B","text":"Chercher les horaires du bus.","zh":"查找公交时间。"},{"letter":"C","text":"Envoyer un courriel à Sam.","zh":"给Sam发邮件。"},{"letter":"D","text":"Trouver une location de vacances.","zh":"找度假租房。"}],"answerLetter":"A","answerText":"Bien choisir ses vêtements.","answerRaw":"A. Bien choisir ses vêtements.","note":"选好衣服","complete":true,"image":null,"articleZh":"Sam 写给 Héloïse：你来我家的时候记得带暖和的衣服。冬天山里很冷。我已经通过短信把公交时刻发给你了。今晚你下班回家后给我打电话。期待假期。","questionZh":"Héloïse 应该做什么？"},{"num":64,"source":"新增截图题","origNum":"新增","title":"Deux langues","article":"Connaître deux langues présente des avantages. La gymnastique mentale du passage d'une langue à une autre est aussi une gymnastique des émotions et du comportement : quand on change de langue, on change de culture.\n\nQuand le bilingue utilise une langue, la deuxième est aussi activée dans le cerveau, comme pour une traduction. Cette activité mentale est bénéfique pour le cerveau : elle aide à lutter contre certaines maladies.","question":"Selon cet article, qu'apporte la pratique de deux langues ?","options":[{"letter":"A","text":"Elle est bonne pour la santé.","zh":"它对健康有益。"},{"letter":"B","text":"Elle facilite la socialisation.","zh":"它促进社交。"},{"letter":"C","text":"Elle développe la mémoire.","zh":"它发展记忆力。"},{"letter":"D","text":"Elle enrichit la personnalité.","zh":"它丰富人格。"}],"answerLetter":"A","answerText":"Elle est bonne pour la santé.","answerRaw":"A","note":"双语有益健康","complete":true,"image":null,"articleZh":"掌握两种语言有好处。人在两种语言之间切换时，不只是进行智力训练，也会改变情感和行为方式；换语言也意味着换一种文化。当双语者使用一种语言时，另一种语言也会在大脑中被激活，就像在进行翻译。这种脑力活动对大脑有益，有助于抵抗某些疾病。","questionZh":"根据文章，使用两种语言带来什么？"},{"num":65,"source":"新增截图题","origNum":"新增","title":"Téléphones portables","article":"Notre entreprise vous propose une formule simple : rendez-vous sur notre site Internet où nous évaluons la valeur de votre téléphone portable. Si l'estimation du prix de votre téléphone vous convient, vous nous l'envoyez par la poste ; en échange, vous recevez la somme correspondante. 50 000 téléphones ont ainsi été repris au prix moyen de 58 euros. Ceux qui fonctionnent bien sont remis sur le marché en France et ailleurs. La preuve qu'une deuxième vie est possible.","question":"Que fait cette entreprise avec les téléphones portables ?","options":[{"letter":"A","text":"Elle compare leurs caractéristiques.","zh":"它比较手机的特征。"},{"letter":"B","text":"Elle les donne à des associations.","zh":"它把手机捐给协会。"},{"letter":"C","text":"Elle les remet aux normes.","zh":"它使手机重新符合标准。"},{"letter":"D","text":"Elle les revend d'occasion.","zh":"它把手机作为二手商品转售。"}],"answerLetter":"D","answerText":"Elle les revend d'occasion.","answerRaw":"D","note":"二手转售手机","complete":true,"image":null,"articleZh":"这家公司提供一种简单方式：用户到网站上评估自己手机的价值。如果价格估算合适，就把手机邮寄过去，公司支付对应金额。已有五万部手机以平均58欧元回收。能正常使用的手机会在法国及其他地方重新进入市场，说明手机可以拥有第二次生命。","questionZh":"这家公司怎样处理手机？"},{"num":66,"source":"新增截图题","origNum":"新增","title":"Jörg Hans","article":"Madame,\nJe suis étudiant en français langue étrangère. Je suis passionné par la lecture et les arts. J'aimerais faire un stage dans votre maison d'édition afin de mieux connaître ce domaine professionnel. J'ai déjà plusieurs expériences comme libraire dans mon pays d'origine, la Norvège. Je suis responsable, dynamique et motivé.\n\nDans l'attente d'une réponse de votre part, veuillez accepter l'expression de mes sincères salutations.\n\nJörg Hans","question":"Que souhaite Jörg Hans ?","options":[{"letter":"A","text":"Obtenir un poste chez un libraire.","zh":"在书店获得一个职位。"},{"letter":"B","text":"Se spécialiser dans l'art et la culture.","zh":"专攻艺术和文化。"},{"letter":"C","text":"S'inscrire pour cours de langue.","zh":"报名语言课程。"},{"letter":"D","text":"Travailler dans une maison d'édition.","zh":"在出版社工作。"}],"answerLetter":"D","answerText":"Travailler dans une maison d'édition.","answerRaw":"D","note":"想进出版社","complete":true,"image":null,"articleZh":"Jörg Hans 是法语外语专业学生，热爱阅读和艺术。他希望在对方出版社实习，以便更好了解这个职业领域。他在挪威曾有多次书店工作经验，并强调自己负责、积极、有动力。","questionZh":"Jörg Hans 想做什么？"},{"num":67,"source":"新增截图题","origNum":"新增","title":"Socrate Éditions","article":"Vous n'avez plus le courage d'ouvrir un magazine, vous ne prenez plus le temps de lire, votre emploi du temps est surchargé, vous passez du temps dans les transports. Alors retrouvez le plaisir de la lecture différemment.\n\nSocrate Éditions transforme la presse écrite en presse audio et garantit la qualité de la lecture grâce à des comédiens. Vous suivez ainsi l'actualité et vous continuez à vous informer. Retrouvez nos offres sur notre site Internet.","question":"Que propose cet éditeur ?","options":[{"letter":"A","text":"Des enregistrements sonores d'articles de journaux.","zh":"报刊文章的音频录音。"},{"letter":"B","text":"Des extraits choisis de romans classiques.","zh":"经典小说精选片段。"},{"letter":"C","text":"Des publications résumées des contenus de sites web.","zh":"网站内容摘要出版物。"},{"letter":"D","text":"Des sélections de répliques de théâtres célèbres.","zh":"著名戏剧台词选集。"}],"answerLetter":"A","answerText":"Des enregistrements sonores d'articles de journaux.","answerRaw":"A","note":"报刊文章音频","complete":true,"image":null,"articleZh":"这家出版社面向没有时间读杂志、日程很满、经常在交通工具上的人，提出用另一种方式重新找回阅读乐趣。Socrate Éditions 把纸质新闻转化为音频新闻，并由演员朗读保证阅读质量，使人们可以继续关注新闻和获取信息。","questionZh":"这家出版社提供什么？"},{"num":68,"source":"新增截图题","origNum":"新增","title":"Choix professionnel / médecin","article":"Un jour, en réfléchissant aux raisons qui m'avaient éloigné d'une carrière universitaire pourtant bien partie afin de me consacrer à mon travail de médecin praticien, j'ai compris que mon choix tenait en partie au fait que l'on rit beaucoup plus au contact des êtres humains plongés dans la vie qu'à celui des chercheurs. Comme un animal qui migre vers le sud en hiver, j'avais suivi le soleil de cette vibration qui fabrique du bonheur, du lien, de la santé. Je ne l'ai jamais regretté.","question":"Qu'est-ce qui a guidé l'auteur dans ses choix professionnels ?","options":[{"letter":"A","text":"L'attirance pour les études.","zh":"对研究/学业的吸引。"},{"letter":"B","text":"L'appel des pays chauds.","zh":"温暖国家的召唤。"},{"letter":"C","text":"Le besoin d'interaction sociale.","zh":"对社会互动的需要。"},{"letter":"D","text":"Le désir de reconnaissance.","zh":"获得认可的愿望。"}],"answerLetter":"C","answerText":"Le besoin d'interaction sociale.","answerRaw":"C","note":"职业选择-需接触人","complete":true,"image":null,"articleZh":"作者回想自己为什么放弃本来顺利的大学职业道路，转而专注于临床医生工作。他意识到，自己的选择部分来自与真实生活中的人接触所带来的快乐、联系和健康感，这比与研究人员接触更吸引他。他像冬天南迁的动物一样，追随这种能够制造幸福和联系的“阳光”，并且从未后悔。","questionZh":"是什么引导了作者的职业选择？"},{"num":69,"source":"新增截图题","origNum":"新增","title":"Avis sur un film","article":"Difficile d'affirmer qu'on attendait beaucoup de ce film. En effet, avec le réalisateur du très moyen Maison bleue aux commandes, Franck Christian et Articus dans les rôles principaux, cette comédie partait avec plusieurs handicaps du côté du capital sympathie. Des handicaps qui allaient demander un bon paquet de qualités pour nous convaincre qu'Imperturbable n'était pas juste un énième bouche-trou pour prime time télévisuel tel qu'on continue à en voir toutes les semaines. Résultat : ô miracle, les qualités d'un bon film sont là ! Et même plus encore !","question":"Que pense cette personne de ce film ?","options":[{"letter":"A","text":"Elle le trouve juste bon pour la télévision.","zh":"她认为这电影只适合电视播出。"},{"letter":"B","text":"Elle trouve certaines scènes très amusantes.","zh":"她觉得某些场景很有趣。"},{"letter":"C","text":"Elle trouve l'ensemble très réussi.","zh":"她认为整体非常成功。"},{"letter":"D","text":"Elle trouve les acteurs très peu crédibles.","zh":"她认为演员很不可信。"}],"answerLetter":"C","answerText":"Elle trouve l'ensemble très réussi.","answerRaw":"C","note":"电影整体成功","complete":true,"image":null,"articleZh":"评论者一开始认为这部电影并不令人期待，因为导演之前作品一般，演员配置也不占优势，看起来像又一部电视黄金时段的填充片。但结果出乎意料，影片具备好电影的品质，而且还不止如此。整体评价是积极的。","questionZh":"这个人怎么看这部电影？"},{"num":70,"source":"新增截图题","origNum":"新增","title":"Code à l’école","article":"L'éducation nationale française vient d'inscrire aux programmes scolaires une initiation à la programmation informatique, appelée « code ». Le but n'est pas de faire de tous les enfants des informaticiens mais il est clair que se limiter à être uniquement un utilisateur passif constituera par la suite un handicap professionnel. Le chantier est immense car il faut introduire cette nouvelle matière sans compter sur suffisamment de professeurs formés pour cela. En effet, la vitesse avec laquelle les technologies numériques ont changé a été bien supérieure à celle de l'évolution de la formation des équipes pédagogiques.","question":"Qu'apprend-on sur l'enseignement du « code » à l'école ?","options":[{"letter":"A","text":"Les enfants ont des difficultés de concentration dans ce domaine.","zh":"孩子们在这个领域难以集中注意力。"},{"letter":"B","text":"Les équipements informatiques des écoles sont devenus obsolètes.","zh":"学校的计算机设备已经过时。"},{"letter":"C","text":"Les établissements doivent se doter d'une connexion illimitée.","zh":"学校必须配备无限网络连接。"},{"letter":"D","text":"Les professeurs avec des compétences nécessaires sont rares.","zh":"具备必要能力的教师很少。"}],"answerLetter":"D","answerText":"Les professeurs avec des compétences nécessaires sont rares.","answerRaw":"D","note":"缺少编程教师","complete":true,"image":null,"articleZh":"法国国民教育体系把计算机编程入门，也就是“代码”，纳入学校课程。目标不是把所有孩子培养成程序员，而是避免他们日后只会被动使用技术而在职业上处于不利位置。问题在于工程量很大，因为要引入这门新学科，却没有足够受过相应培训的教师；数字技术发展速度远快于教师培训的变化速度。","questionZh":"关于学校里的“代码”教学，文章说明了什么？"},{"num":71,"source":"新增截图题","origNum":"新增","title":"Communication numérique","article":"En écrivant à la main, chacun trouve son moyen de tracer, son rythme et choisit son moment et ses mots. Le monde de la communication par texto, lui, est celui d'une communication homogène. Avec la numérisation des échanges, on ne connaît plus l'attente d'une lettre ou d'une carte postale. Rendez-vous avec un ami : un SMS pour qu'on arrive dans cinq minutes, un autre dès qu'on est arrivé, un autre si on est en retard. Bienvenue dans un monde sans attente où tous les vides doivent être comblés.","question":"Qu'apprend-on sur la communication numérique ?","options":[{"letter":"A","text":"Elle appauvrit le lexique courant.","zh":"它使日常词汇贫乏。"},{"letter":"B","text":"Elle modifie le rapport au temps.","zh":"它改变人们与时间的关系。"},{"letter":"C","text":"Elle provoque la fin du courrier postal.","zh":"它导致邮政信件终结。"},{"letter":"D","text":"Elle transforme le geste graphique.","zh":"它改变书写动作。"}],"answerLetter":"B","answerText":"Elle modifie le rapport au temps.","answerRaw":"B","note":"数字改变时间感","complete":true,"image":null,"articleZh":"手写时，每个人都有自己的书写方式、节奏，并选择写作的时刻和词语。短信交流则是一种更统一的交流方式。随着交流数字化，人们不再体验等待信件或明信片的时间。与朋友见面时，五分钟后到发一条短信，到了再发一条，迟到也发一条。文章强调我们进入了一个没有等待、所有空白都要被填满的世界。","questionZh":"关于数字交流，文章说明了什么？"},{"num":72,"source":"新增截图题","origNum":"新增","title":"Produits bio","article":"Selon les résultats d'un sondage, 7 Français sur 10 déclarent acheter régulièrement des produits bio. Avec, par ordre de préférence, les fruits et légumes, le lait et les produits laitiers, les œufs, l'épicerie puis la viande. Pour les deux tiers des personnes interrogées, la santé est l'argument prioritaire, devant les considérations écologiques.\n\nCe bond de la vente des produits bio doit beaucoup à l'intérêt des grandes surfaces pour ce marché qui rapporte, mais aussi au développement des enseignes spécialisées.\n\nCet appétit des Français a de quoi rassurer tous ceux qui pouvaient s'inquiéter des débouchés de la filière bio, suite aux nombreuses reconversions agricoles.","question":"D'après ce texte, pourquoi les Français consomment-ils des produits Bio ?","options":[{"letter":"A","text":"Pour éviter de tomber malades.","zh":"为了避免生病。"},{"letter":"B","text":"Pour profiter de tarifs avantageux.","zh":"为了享受优惠价格。"},{"letter":"C","text":"Pour protéger l'environnement.","zh":"为了保护环境。"},{"letter":"D","text":"Pour soutenir les paysans locaux.","zh":"为了支持当地农民。"}],"answerLetter":"A","answerText":"Pour éviter de tomber malades.","answerRaw":"A","note":"买有机为健康","complete":true,"image":null,"articleZh":"一项调查显示，十分之七的法国人表示会定期购买有机产品，最常买的是水果蔬菜，其次是牛奶及乳制品、鸡蛋、杂货和肉类。对三分之二受访者来说，健康是最优先的理由，排在生态考虑之前。有机产品销售增长也得益于大型超市对这一盈利市场的兴趣，以及专业商店的发展。","questionZh":"根据文章，法国人为什么消费有机产品？"},{"num":73,"source":"新增截图题","origNum":"新增","title":"Émission radio jazz/blues","article":"Je ne suis pas journaliste, mais quand on aime quelque chose, on veut le faire découvrir aux autres. Mon émission consacrée au jazz et au blues existe depuis sept ans ! C'est avant tout une façon d'amener les gens sur son terrain, sur les choses qu'on aime, et de leur faire comprendre pourquoi on les aime, leur donner envie d'en savoir plus. « Et voilà j'ai trouvé la radio comme vecteur et j'aime ça, mais je ne suis qu'un simple musicien-animateur. »","question":"Pour quelle raison cet homme fait-il de la radio ?","options":[{"letter":"A","text":"C'est son mode de communication favori.","zh":"这是他最喜欢的交流方式。"},{"letter":"B","text":"Il a entamé une formation de journaliste.","zh":"他开始了记者培训。"},{"letter":"C","text":"Il peut partager sa passion avec un public.","zh":"他可以和公众分享自己的热情。"},{"letter":"D","text":"Pour répondre aux attentes de son public.","zh":"为了回应听众期待。"}],"answerLetter":"C","answerText":"Il peut partager sa passion avec un public.","answerRaw":"C","note":"电台分享热爱","complete":true,"image":null,"articleZh":"这个人说自己不是记者，但当人喜欢某件事时，就想让别人发现它。他主持爵士和蓝调节目已经七年，这首先是一种把人们带入自己热爱的领域、让他们理解为什么自己喜欢这些音乐，并激发他们进一步了解的方式。他找到了电台作为传播媒介。","questionZh":"这个男人为什么做广播节目？"},{"num":74,"source":"新增截图题","origNum":"新增","title":"Liseuses à Paris","article":"Les Français aiment lire mais restent encore très attachés au papier. C'est pourquoi, afin de faire connaître les nouveaux supports de lecture, 1100 liseuses sont disponibles dans les bibliothèques de Paris, et des tablettes sont aussi proposées en libre accès. Elles sont réparties dans l'ensemble des bibliothèques de prêt de la ville : de 2 à 50 selon la fréquentation de l'établissement.","question":"Qu'apprend-on dans ce texte ?","options":[{"letter":"A","text":"La mairie de Paris va essayer de s'opposer aux livres électroniques.","zh":"巴黎市政府将试图反对电子书。"},{"letter":"B","text":"Les bibliothèques risquent de fermer à cause des livres électroniques.","zh":"图书馆可能因电子书而关闭。"},{"letter":"C","text":"Les Français préfèrent les livres électroniques aux livres traditionnels.","zh":"法国人更喜欢电子书而不是传统书。"},{"letter":"D","text":"Les Parisiens peuvent accéder facilement à des livres électroniques.","zh":"巴黎人可以方便地接触电子书。"}],"answerLetter":"D","answerText":"Les Parisiens peuvent accéder facilement à des livres électroniques.","answerRaw":"D","note":"巴黎可借电子书","complete":true,"image":null,"articleZh":"法国人喜欢阅读，但仍然非常依恋纸质书。为了让人们了解新的阅读载体，巴黎各图书馆提供了1100台电子阅读器，也提供平板电脑供自由使用。这些设备分布在全市的借阅图书馆中，每家根据到访人数配备2到50台不等。","questionZh":"这段文字告诉我们什么？"},{"num":75,"source":"新增截图题","origNum":"新增","title":"Maison de l’adoption","article":"Pousser la porte de la Maison de l'adoption, c'est déjà franchir une étape. On se retrouve au milieu d'autres candidats à l'adoption. Et là, on comprend qu'au-delà de notre propre désir d'enfant, l'intérêt de l'enfant prime. « Moi, en tant que représentante de la protection de l'enfance, dit la directrice, je ne suis pas là pour vous trouver un enfant mais pour trouver des parents à tous les enfants orphelins ou abandonnés ».","question":"Quel est l'objectif de cet établissement ?","options":[{"letter":"A","text":"Aider les couples en désir d'enfant.","zh":"帮助想要孩子的夫妻。"},{"letter":"B","text":"Défendre les droits des enfants.","zh":"维护儿童权利。"},{"letter":"C","text":"Donner une famille aux enfants.","zh":"给孩子一个家庭。"},{"letter":"D","text":"Fournir un hébergement aux enfants.","zh":"为孩子提供住宿。"}],"answerLetter":"C","answerText":"Donner une famille aux enfants.","answerRaw":"C","note":"给孩子找家庭","complete":true,"image":null,"articleZh":"走进收养之家本身就是迈出一步。在那里，人们会遇到其他收养申请者，也会明白，孩子的利益高于成年人想要孩子的愿望。主任作为儿童保护代表强调，她不是来为申请者找孩子，而是为所有孤儿或被遗弃的孩子寻找父母。","questionZh":"这个机构的目标是什么？"},{"num":76,"source":"新增截图题","origNum":"新增","title":"Grammaires de langues rares","article":"Historien de formation, gros consommateur de littératures et de bandes dessinées depuis l'adolescence, j'ai traversé une drôle de crise vers l'âge de quarante ans. Durant plus de cinq ans, je me suis mis à lire des livres de grammaire de langues étrangères et j'ai cessé de lire autre chose. Aujourd'hui la crise est un peu passée mais je continue à consommer beaucoup plus de grammaires de langues rares et lointaines que de romans.","question":"Que nous apprend l'auteur de ce texte ?","options":[{"letter":"A","text":"Il a appris plusieurs langues avec des manuels.","zh":"他通过教材学习了多门语言。"},{"letter":"B","text":"Il a enseigné les langues anciennes au lycée.","zh":"他在高中教授古代语言。"},{"letter":"C","text":"Il est passionné d'ouvrages sur les langues.","zh":"他痴迷关于语言的书籍。"},{"letter":"D","text":"Il va publier des articles dans une revue sur les langues.","zh":"他将在语言杂志发表文章。"}],"answerLetter":"C","answerText":"Il est passionné d'ouvrages sur les langues.","answerRaw":"C","note":"痴迷语言书","complete":true,"image":null,"articleZh":"作者受过历史学训练，青少年时期起就大量阅读文学和漫画。四十岁左右，他经历了一场奇怪的“危机”：五年多时间里，他开始阅读外语语法书，并停止阅读其他东西。如今这种状态有所缓和，但他仍然读大量稀有遥远语言的语法书，远多于小说。","questionZh":"作者告诉我们什么？"},{"num":77,"source":"新增截图题","origNum":"新增","title":"Message à Madame Bertrand","article":"Madame Bertrand,\n\nJe vous écris suite à votre message électronique du 13 avril dernier au sujet de l'offre d'emploi. Votre formation universitaire et votre expérience nous semblent particulièrement intéressantes.\n\nM. Martin, attaché culturel de l'ambassade de France, accepte de vous recevoir pour un entretien au consulat de New York pour discuter avec vous des possibilités d'emploi.\n\nJe suis à votre disposition pour envisager ensemble quelques dates.\n\nLaëtitia Xavel (Secrétariat du service culturel)","question":"Quel est le but de ce message ?","options":[{"letter":"A","text":"Annoncer la signature d'un accord de coopération.","zh":"宣布签署合作协议。"},{"letter":"B","text":"Communiquer une offre de stage de fin d'études.","zh":"传达毕业实习机会。"},{"letter":"C","text":"Faire part de la réponse d'un responsable.","zh":"转达一位负责人的回复。"},{"letter":"D","text":"S'informer du profil d'un poste disponible.","zh":"了解一个空缺职位的情况。"}],"answerLetter":"C","answerText":"Faire part de la réponse d'un responsable.","answerRaw":"C","note":"转达负责人回复","complete":true,"image":null,"articleZh":"这封信回复 Bertrand 女士关于招聘信息的邮件。信中说明她的大学背景和经验很有吸引力，法国大使馆文化专员 Martin 先生同意在纽约领事馆接待她面试，讨论就业可能性。发信人表示可以一起商量日期。","questionZh":"这封信的目的是什么？"},{"num":78,"source":"新增截图题","origNum":"新增","title":"Smartphone / adolescents","article":"Le smartphone participe à l'entretien d'un lien pathologique de plus en plus répandu, le désir de mainmise des parents sur les adolescents. La crise d'adolescence confronte les parents au désir d'autonomie de l'adolescent, et les oblige à faire le deuil de leur position de parent. Cela suppose qu'ils lâchent prise et fassent confiance à leur enfant. Mais de plus en plus de parents souhaitent que leur ado reste à la maison. Le smartphone, qui permet de rester en lien avec ses copains, arrange donc les parents.","question":"Quel constat fait l'auteur à propos des smartphones ?","options":[{"letter":"A","text":"Ils éloignent les jeunes du monde des adultes.","zh":"它们使年轻人远离成人世界。"},{"letter":"B","text":"Ils entraînent des comportements de type addictif.","zh":"它们导致成瘾型行为。"},{"letter":"C","text":"Ils ont tendance à couper les adolescents du réel.","zh":"它们倾向于让青少年脱离现实。"},{"letter":"D","text":"Ils peuvent être utilisés comme outils de contrôle.","zh":"它们可以被用作控制工具。"}],"answerLetter":"D","answerText":"Ils peuvent être utilisés comme outils de contrôle.","answerRaw":"D","note":"手机成控制工具","complete":true,"image":null,"articleZh":"作者认为，智能手机参与维持一种越来越常见的病态关系：父母想控制青少年。青春期本应促使父母接受孩子的自主愿望，放手并信任孩子。但越来越多父母希望孩子待在家里。智能手机让孩子即使在家也能与朋友联系，因此反而满足了父母控制和留住孩子的愿望。","questionZh":"作者对智能手机作出了什么判断？"},{"num":79,"source":"新增截图题","origNum":"新增","title":"Internet au travail","article":"Selon une étude, les salariés passent chaque jour en moyenne une heure et demie à surfer au bureau et consacrent un peu plus d'une demi-heure à un usage professionnel, contre 53 minutes à des fins personnelles. L'étude chiffre cette « chute de productivité » à 12,4 %.\n\nConcrètement, l'utilisation personnelle d'Internet au travail coûterait 26 jours par an à l'entreprise soit près d'un mois de travail !\n\nEn comparant les catégories de sites les plus consultés entre 2010 et 2011, on remarque que les sites de jeux en ligne gagnent 5 %, tandis que la vidéo progresse, elle, de 13 %.","question":"Qu'apprend-on sur les salariés qui utilisent Internet ?","options":[{"letter":"A","text":"Ils téléchargent des jeux sur leur poste.","zh":"他们在工作电脑上下载游戏。"},{"letter":"B","text":"Ils trouvent difficilement des informations.","zh":"他们很难找到信息。"},{"letter":"C","text":"Leur rendement au travail diminue.","zh":"他们的工作效率下降。"},{"letter":"D","text":"Leurs échanges perdent en efficacité.","zh":"他们的交流效率降低。"}],"answerLetter":"C","answerText":"Leur rendement au travail diminue.","answerRaw":"C","note":"上网降低效率","complete":true,"image":null,"articleZh":"一项研究显示，员工每天平均在办公室上网一小时半，其中稍多于半小时用于工作，53分钟用于个人目的。研究把这种生产率下降估算为12.4%。具体来说，工作中私人使用互联网每年会让企业损失26天，接近一个月工作时间；在线游戏和视频访问也在增长。","questionZh":"关于使用互联网的员工，文章说明了什么？"},{"num":80,"source":"新增截图题","origNum":"新增","title":"Enfants et Internet","article":"Plus de 95 % des enfants français disent avoir reçu les consignes parentales de base destinées à encadrer leur navigation sur Internet : ne pas se rendre seul à un rendez-vous avec un inconnu, ne pas répondre aux messages de gens qu'ils ne connaissent pas, ne pas dévoiler d'informations privées, comme son nom, son adresse, celle de son école, etc. Mais, dans la réalité, plus d'un enfant sur deux a le sentiment de pouvoir faire ce qu'il veut sur Internet sans que ses parents le sachent.","question":"D'après ce texte, comment la plupart des enfants se comportent-ils avec Internet ?","options":[{"letter":"A","text":"Ils l'utilisent plus que les adultes.","zh":"他们使用互联网比成年人更多。"},{"letter":"B","text":"Ils manquent de formation pratique.","zh":"他们缺乏实际培训。"},{"letter":"C","text":"Ils s'en servent avec prudence.","zh":"他们谨慎使用互联网。"},{"letter":"D","text":"Ils se connectent en toute liberté.","zh":"他们完全自由地上网。"}],"answerLetter":"D","answerText":"Ils se connectent en toute liberté.","answerRaw":"D","note":"孩子自由上网","complete":true,"image":null,"articleZh":"超过95%的法国儿童说，他们收到过父母关于上网安全的基本规则：不要独自去见陌生人，不要回复不认识的人的消息，不要透露姓名、地址、学校等私人信息。但实际上，超过一半的孩子觉得自己可以在网上做想做的事，而父母并不知道。","questionZh":"根据文章，大多数孩子如何使用互联网？"},{"num":81,"source":"新增截图题","origNum":"新增","title":"La colocation","article":"La colocation est à la mode ! C'est, en effet, le meilleur moyen pour disposer d'un grand appartement avec un budget limité. Mais la vie à plusieurs n'est pas toujours facile... Le problème numéro un est de trouver un logement adapté et un propriétaire acceptant de le louer à plusieurs étudiants : la plupart préfèrent louer à des familles. Si vous connaissez déjà les personnes avec lesquelles vous souhaitez partager un appartement, il vous suffit de trouver un logement qui convienne à tous. Mais peut-être n'avez-vous pas encore trouvé votre perle rare ? Deux solutions : vous trouvez un logement puis les coloc' qui iront avec, ou inversement, vous trouvez les coloc' qui ont déjà un appartement et cherchent une nouvelle tête.","question":"Pourquoi la colocation est-elle à la mode ?","options":[{"letter":"A","text":"Parce qu’elle permet de vivre à plusieurs sans dépenser beaucoup d’argent.","zh":"因为它可以多人一起住而不花很多钱。"},{"letter":"B","text":"Parce qu’elle permet de louer un grand appartement sans dépenser beaucoup d’argent.","zh":"因为它可以用不高的预算租大公寓。"},{"letter":"C","text":"Parce qu’elle permet de vivre avec une famille.","zh":"因为它可以和一个家庭住在一起。"},{"letter":"D","text":"Parce qu’elle permet de trouver un logement adapté aux étudiants.","zh":"因为它可以找到适合学生的住房。"}],"answerLetter":"B","answerText":"Parce qu’elle permet de louer un grand appartement sans dépenser beaucoup d’argent.","answerRaw":"B","note":"合租省钱住大房","complete":true,"image":null,"articleZh":"合租很流行，因为它是在预算有限的情况下拥有大公寓的最好办法。不过多人生活并不总是容易。最大问题是找到合适的住房和愿意把房子租给多个学生的房东，因为很多房东更愿意租给家庭。如果已经认识想一起住的人，只需找到适合所有人的住房；也可以先找房再找室友，或加入已有公寓、正在找新室友的人。","questionZh":"为什么合租流行？"},{"num":82,"source":"新增截图题","origNum":"新增","title":"Casinos et Internet","article":"Les casinos misent sur Internet.\nEn difficulté, ils réclament l'ouverture des jeux d'argent en ligne.\n\nPour Dominique Desseigne, président du groupe Barrière, l'un des plus grands casinotiers français, les difficultés actuelles rendraient urgente l'ouverture à la concurrence des jeux d'argent en ligne. Internet pourrait représenter un relais de croissance à condition que les casinotiers français n'arrivent pas « exsangues » sur ce marché lors de son ouverture en France prévue courant 2009.\n\nLe Monde, 21/11/2008","question":"D’après cet article, Internet représente, pour les casinos français :","options":[{"letter":"A","text":"une concurrence déloyale.","zh":"一种不公平竞争。"},{"letter":"B","text":"une possibilité d’augmenter leur chiffre d’affaires.","zh":"增加营业额的可能性。"},{"letter":"C","text":"un investissement coûteux sans résultat garanti.","zh":"一项成本高且结果无保证的投资。"},{"letter":"D","text":"un moyen de diversifier les services proposés.","zh":"一种丰富服务内容的方式。"}],"answerLetter":"B","answerText":"une possibilité d’augmenter leur chiffre d’affaires.","answerRaw":"B","note":"赌场增营业额","complete":true,"image":null,"articleZh":"文章说，法国赌场遇到困难，因此要求开放线上赌博。Barrière 集团总裁认为，当前困境使开放线上博彩竞争变得紧迫；互联网可能成为新的增长来源，前提是法国赌场业者不要在市场开放时已经过度虚弱。","questionZh":"根据文章，互联网对法国赌场意味着什么？"},{"num":83,"source":"新增截图题","origNum":"新增","title":"Woodkid nouvel album","article":"Le deuxième album de Woodkid arrive enfin.\n\nC'est peu dire qu'on attendait de pied ferme la nouvelle proposition de l'homme à tout faire Woodkid, à la fois chanteur, auteur, compositeur, réalisateur de clip et directeur artistique. Depuis plusieurs années, on le voyait évoluer au loin, comme s'il se préservait du succès rencontré à la sortie de son premier album, The Golden Age (2013). Avec S16, il ne risque pas de soulever le même engouement, et c'est sans doute le but recherché. Se rapportant au numéro et symbole chimique du soufre, le titre annonce d'emblée que le disque ne sera pas forcément facile d'accès.\nLes Inrockuptibles, 08/10/2020","question":"D'après cet article, le nouvel album de Woodkid :","options":[{"letter":"A","text":"était très attendu.","zh":"非常受期待。"},{"letter":"B","text":"est sorti peu de temps après le premier album.","zh":"在第一张专辑后不久发行。"},{"letter":"C","text":"devrait rencontrer autant de succès que le premier album.","zh":"应该会和第一张一样成功。"},{"letter":"D","text":"s'adresse à tous les publics.","zh":"面向所有听众。"}],"answerLetter":"A","answerText":"était très attendu.","answerRaw":"A","note":"新专辑被期待","complete":true,"image":null,"articleZh":"Woodkid 的第二张专辑终于到来。文章说，人们一直急切等待这位集歌手、作者、作曲家、MV导演和艺术总监于一身的创作者的新作品。他第一张专辑《The Golden Age》在2013年获得成功，此后他似乎一直保持距离。新专辑 S16 不一定容易进入，也未必会引发同样热潮。","questionZh":"根据文章，Woodkid 的新专辑怎么样？"},{"num":84,"source":"新增截图题","origNum":"新增","title":"Expériences passées","article":"Ils n'ont tiré aucune leçon de leurs expériences passées.","question":"Sélectionner directement :","options":[{"letter":"A","text":"Ils auraient dû chercher d'autres expériences.","zh":"他们本应该寻找其他经历。"},{"letter":"B","text":"Leurs expériences se sont révélées très lointaines.","zh":"他们的经历显得非常遥远。"},{"letter":"C","text":"Ils n'ont pas pu savourer pleinement leurs expériences.","zh":"他们没能充分品味自己的经历。"},{"letter":"D","text":"Leurs expériences ne leur ont pas été bénéfiques du tout.","zh":"他们的经历完全没有给他们带来好处。"}],"answerLetter":"D","answerText":"Leurs expériences ne leur ont pas été bénéfiques du tout.","answerRaw":"D","note":"经历毫无益处","complete":true,"image":null,"articleZh":"句子意思是：他们没有从过去经历中吸取任何教训。也就是说，这些经历没有对他们产生任何有益作用。","questionZh":"选择意思最接近的句子。"},{"num":85,"source":"新增截图题","origNum":"新增","title":"Service consulaire","article":"Heures d'ouverture du service consulaire :\n\nLe service consulaire est ouvert au public les lundis, mercredis et jeudis de 8h30 à 14h et les mardis et vendredis de 14h30 à 18h.","question":"Quand le service est-il fermé au public ?","options":[{"letter":"A","text":"le lundi matin","zh":"周一上午"},{"letter":"B","text":"le mardi matin","zh":"周二上午"},{"letter":"C","text":"le mercredi matin","zh":"周三上午"},{"letter":"D","text":"le jeudi matin","zh":"周四上午"}],"answerLetter":"B","answerText":"le mardi matin","answerRaw":"B","note":"周二上午关闭","complete":true,"image":null,"articleZh":"领事服务开放时间：周一、周三、周四8点30到14点；周二和周五14点30到18点。因此周二上午不开放。","questionZh":"该服务什么时候不对公众开放？"},{"num":86,"source":"新增截图题","origNum":"新增","title":"Restaurant d’entreprise","article":"La Table « votre restaurant d'entreprise »\n\nOUVERT DU LUNDI AU VENDREDI.\nSERVICE DE 12H À 14H.\nFERMETURE : SAMEDI/DIMANCHE","question":"Que peut-on faire dans ce lieu ?","options":[{"letter":"A","text":"boire un thé ou un café l'après-midi","zh":"下午喝茶或咖啡"},{"letter":"B","text":"inviter des enfants pour le goûter","zh":"请孩子们吃下午点心"},{"letter":"C","text":"manger avec des collègues à midi","zh":"中午和同事吃饭"},{"letter":"D","text":"partager un repas entre amis le soir","zh":"晚上和朋友一起吃饭"}],"answerLetter":"C","answerText":"manger avec des collègues à midi","answerRaw":"C","note":"中午同事吃饭","complete":true,"image":null,"articleZh":"这是企业餐厅，周一到周五开放，供餐时间为12点到14点，周六周日关闭。因此可以在中午和同事一起吃饭。","questionZh":"在这个地方可以做什么？"},{"num":87,"source":"新增截图题","origNum":"新增","title":"Sophie Leloux lettre","article":"Madame, suite à votre courrier du 17 juin dernier, je vous envoie le catalogue de nos produits.\n\nTrès cordialement,\nSophie Leloux\nService clientèle","question":"Pourquoi est-ce que Sophie Leloux écrit cette lettre ?","options":[{"letter":"A","text":"Elle cherche une vendeuse.","zh":"她在找女销售员。"},{"letter":"B","text":"Elle demande un renseignement.","zh":"她询问信息。"},{"letter":"C","text":"Elle informe une cliente.","zh":"她通知一位客户。"},{"letter":"D","text":"Elle prend un rendez-vous.","zh":"她预约见面。"}],"answerLetter":"C","answerText":"Elle informe une cliente.","answerRaw":"C","note":"通知客户目录","complete":true,"image":null,"articleZh":"Sophie Leloux 回复一位女士6月17日的来信，并寄去产品目录。她来自客户服务部，因此这封信是在向客户提供信息。","questionZh":"Sophie Leloux 为什么写这封信？"},{"num":88,"source":"新增截图题","origNum":"新增","title":"Karim","article":"Karim,\n\npense à appeler ta sœur pour avoir de ses nouvelles.","question":"Que doit faire Karim ?","options":[{"letter":"A","text":"aller chez sa sœur","zh":"去姐姐/妹妹家"},{"letter":"B","text":"inviter sa sœur","zh":"邀请姐姐/妹妹"},{"letter":"C","text":"jouer avec sa sœur","zh":"和姐姐/妹妹玩"},{"letter":"D","text":"téléphoner à sa sœur","zh":"给姐姐/妹妹打电话"}],"answerLetter":"D","answerText":"téléphoner à sa sœur","answerRaw":"D","note":"打电话给姐姐","complete":true,"image":null,"articleZh":"短信让 Karim 记得给他的姐妹打电话，问问近况。","questionZh":"Karim 应该做什么？"},{"num":89,"source":"新增截图题","origNum":"新增","title":"Antoine","article":"Antoine, s'il te plaît, viens dans mon bureau après la réunion. Merci.\nLudovic","question":"Que doit faire Antoine ?","options":[{"letter":"A","text":"apporter un document","zh":"带一份文件"},{"letter":"B","text":"organiser un entretien","zh":"组织一次面谈"},{"letter":"C","text":"rencontrer un collègue","zh":"见一位同事"},{"letter":"D","text":"téléphoner à Ludovic","zh":"给 Ludovic 打电话"}],"answerLetter":"C","answerText":"rencontrer un collègue","answerRaw":"C","note":"会后见同事","complete":true,"image":null,"articleZh":"Ludovic 请 Antoine 会后到自己的办公室来。因此 Antoine 要去见 Ludovic，也就是见一位同事。","questionZh":"Antoine 应该做什么？"},{"num":90,"source":"新增截图题","origNum":"新增","title":"Fête annuelle école","article":"Chers parents,\n\nLa fête annuelle de notre école se déroulera cette année le samedi 12 juin. Pour que cette journée soit réussie, nous avons besoin d'adultes pour animer et surveiller les enfants. Faites-nous part de vos disponibilités.\nLa directrice","question":"Que demande la directrice de l'école ?","options":[{"letter":"A","text":"De la nourriture","zh":"食物"},{"letter":"B","text":"De l'argent","zh":"钱"},{"letter":"C","text":"Des idées","zh":"想法"},{"letter":"D","text":"Des volontaires","zh":"志愿者"}],"answerLetter":"D","answerText":"Des volontaires","answerRaw":"D","note":"学校要志愿者","complete":true,"image":null,"articleZh":"校长写信给家长，说明学校年度庆祝活动将在6月12日举行。为了让活动顺利，需要成年人来组织活动并看护孩子，因此请家长告知自己是否有空。","questionZh":"学校校长要求什么？"},{"num":91,"source":"新增截图题","origNum":"新增","title":"Soirée musicale irlandaise","article":"L'Association des Bretons vous offre une « Soirée musicale irlandaise », vendredi 10 novembre à 20h30. À la fin du spectacle, une vente de boissons sera organisée et vous pourrez goûter des spécialités d'Irlande.","question":"Qu'est-ce que propose cette association ?","options":[{"letter":"A","text":"un concert gratuit","zh":"一场免费音乐会"},{"letter":"B","text":"un concours de chant","zh":"一场歌唱比赛"},{"letter":"C","text":"un cours de cuisine","zh":"一节烹饪课"},{"letter":"D","text":"un voyage à l'étranger","zh":"一次国外旅行"}],"answerLetter":"A","answerText":"un concert gratuit","answerRaw":"A","note":"爱尔兰音乐会","complete":true,"image":null,"articleZh":"布列塔尼人协会提供一场“爱尔兰音乐晚会”，时间是11月10日星期五20点30分。演出结束后会出售饮料，还可以品尝爱尔兰特色食品。","questionZh":"这个协会提供什么？"},{"num":92,"source":"新增截图题","origNum":"新增","title":"Réunion parents-professeurs","article":"Chers collègues,\n\nNous vous informons que la réunion parents-professeurs des classes de seconde prévue pour ce samedi est reportée au samedi prochain à midi. Votre présence est obligatoire.\nLa direction du lycée","question":"À qui est adressé ce message ?","options":[{"letter":"A","text":"aux élèves","zh":"给学生"},{"letter":"B","text":"aux étudiants","zh":"给大学生"},{"letter":"C","text":"aux parents","zh":"给家长"},{"letter":"D","text":"aux professeurs","zh":"给老师"}],"answerLetter":"D","answerText":"aux professeurs","answerRaw":"D","note":"通知老师开会","complete":true,"image":null,"articleZh":"信息开头写着“亲爱的同事们”，内容通知高一/高二相关班级的家长教师会延期到下周六中午，并说明出席是强制性的。发信方是高中管理层，因此对象是教师。","questionZh":"这条信息发给谁？"},{"num":93,"source":"新增截图题","origNum":"新增","title":"Train de nuit","article":"Un voyage à prix raisonnable en train de nuit, en couchettes, 6 places. De centre-ville à centre-ville, vous arrivez plus tôt, vos fins de semaine durent plus longtemps. Boissons chaudes et gâteaux vous sont offerts au réveil.","question":"Le présent message propose :","options":[{"letter":"A","text":"une restauration simple et efficace","zh":"简单高效的餐饮服务"},{"letter":"B","text":"un long week-end à bas prix","zh":"低价长周末"},{"letter":"C","text":"un court séjour en centre-ville","zh":"市中心短期停留"},{"letter":"D","text":"un voyage en train couchettes","zh":"卧铺火车旅行"}],"answerLetter":"D","answerText":"un voyage en train couchettes","answerRaw":"D","note":"卧铺夜车旅行","complete":true,"image":null,"articleZh":"广告介绍一种价格合理的夜间卧铺火车旅行，有六人卧铺，从市中心到市中心，可以更早到达，让周末更长，醒来时还提供热饮和蛋糕。","questionZh":"这条信息提供什么？"},{"num":94,"source":"新增截图题","origNum":"新增","title":"Infirmière en consultation","article":"Je suis en consultation. Revenez dans quelques minutes.","question":"Que faire pour rencontrer l'infirmière ?","options":[{"letter":"A","text":"Frapper et entrer","zh":"敲门并进去"},{"letter":"B","text":"Prendre rendez-vous","zh":"预约"},{"letter":"C","text":"Revenir plus tard","zh":"稍后再来"},{"letter":"D","text":"Téléphoner","zh":"打电话"}],"answerLetter":"C","answerText":"Revenir plus tard","answerRaw":"C","note":"稍后再来","complete":true,"image":null,"articleZh":"护士正在接诊，告示要求几分钟后再回来。","questionZh":"要见护士应该怎么做？"},{"num":95,"source":"新增截图题","origNum":"新增","title":"Ascenseurs métro","article":"Du 10 avril au 15 septembre, les ascenseurs de votre station de métro sont en réparation. Pour faciliter vos déplacements, les installations changent. Pendant les travaux, prenez l'escalier à droite des guichets.","question":"Qu'est-ce qui est fermé du 10 avril au 15 septembre ?","options":[{"letter":"A","text":"L'escalier","zh":"楼梯"},{"letter":"B","text":"La station de métro","zh":"地铁站"},{"letter":"C","text":"Les ascenseurs.","zh":"电梯"},{"letter":"D","text":"Les guichets","zh":"售票窗口"}],"answerLetter":"C","answerText":"Les ascenseurs.","answerRaw":"C","note":"电梯维修关闭","complete":true,"image":null,"articleZh":"4月10日至9月15日，地铁站的电梯维修。为了方便通行，设施安排有所调整。施工期间，请走售票窗口右侧的楼梯。因此关闭的是电梯。","questionZh":"4月10日至9月15日什么关闭？"},{"num":96,"source":"新增截图题","origNum":"新增","title":"Formations universitaires","article":"Formation 1 : Ce nouveau cursus proposé par notre université se donne pour objectif de dispenser une formation initiale de base dans les différents champs disciplinaires du droit afin de permettre à l'étudiant de construire un projet professionnel débouchant sur le choix d'une spécialisation en Master.\n\nFormation 2 : Cette formation a pour but de fournir aux étudiants des connaissances solides en mathématiques pures et appliquées tout en gardant un contact étroit avec les disciplines voisines (informatique et physique). La formation vise aussi à assurer une connaissance du monde professionnel et socio-économique.\n\nFormation 3 : S'engager dans une LAS permet de se constituer un dossier solide afin de postuler en médecine ou dans d'autres filières médicales. Chaque étudiant peut postuler deux fois pendant sa licence. Des capacités d'accueil par filière médicale sont réservées à chaque type de LAS, selon les parcours et le niveau.\n\nFormation 4 : Ce parcours d'études propose à tous les bacheliers des enseignements de littérature française, de littérature comparée et de francophonie, de linguistique et stylistique françaises, de langue et littérature latines et grecques. L'objectif est de former des spécialistes de l'écrit, de l'analyse des textes et des documents.","question":"Quelle formation peut permettre de devenir avocat ?","options":[{"letter":"A","text":"Formation 1","zh":"课程1"},{"letter":"B","text":"Formation 2","zh":"课程2"},{"letter":"C","text":"Formation 3","zh":"课程3"},{"letter":"D","text":"Formation 4","zh":"课程4"}],"answerLetter":"A","answerText":"Formation 1","answerRaw":"A","note":"法律课程当律师","complete":true,"image":null,"articleZh":"四个课程中，课程1提供法律不同学科领域的基础初始培训，并帮助学生建立职业计划，之后在硕士阶段选择专业方向。因此它最可能通向律师职业。课程2是数学，课程3是医学相关，课程4是文学语言方向。","questionZh":"哪一个课程可以让人以后成为律师？"},{"num":97,"source":"新增截图题","origNum":"新增","title":"Récits de vie","article":"Récit 1 : Mandela Kuet, qui croit fermement au pouvoir du perfectionnement personnel, a mis sur pied un organisme à l'intention des jeunes à risque qui veulent éviter de rejoindre des gangs. De plus, il s'est associé à un militant autochtone pour tisser des liens entre les communautés des nouveaux arrivants et autochtones de Winnipeg.\n\nRécit 2 : Le violoniste renommé Moshe Hammer a fondé The Hammer Band, un organisme de bienfaisance à but non lucratif de Toronto qui offre des cours de violon gratuits aux enfants vivant dans des communautés défavorisées. Son objectif ? Aider les enfants à mener une vie positive grâce au pouvoir de la musique.\n\nRécit 3 : Feng Jiang, professeur à l'Université de la Colombie-Britannique et originaire de Chine, s'est donné pour mission de remplacer les plastiques par des matériaux biodégradables, et son travail avec la Première Nation des Wet'suwet'en pourrait contribuer à la prospérité économique des Premières Nations de la province. Ce projet permettra de créer des emplois tout en œuvrant pour la planète.\n\nRécit 4 : Moins d'une semaine après son arrivée au Canada, Dilruba Hussaini, âgée de 23 ans et originaire d'Afghanistan, a commencé à travailler dans l'un des nombreux établissements de soins palliatifs de la province de Terre-Neuve-et-Labrador, qui est souvent à la recherche d'employés. Soulagement pour le centre médical, opportunité pour la jeune femme. Tout le monde y gagne.","question":"Quel récit de vie parle de lutte contre la violence ?","options":[{"letter":"A","text":"Récit 1","zh":"故事1"},{"letter":"B","text":"Récit 2","zh":"故事2"},{"letter":"C","text":"Récit 3","zh":"故事3"},{"letter":"D","text":"Récit 4","zh":"故事4"}],"answerLetter":"A","answerText":"Récit 1","answerRaw":"A","note":"故事1避开帮派","complete":true,"image":null,"articleZh":"故事1说 Mandela Kuet 建立机构，帮助处于风险中的年轻人避免加入帮派，并促进社区之间的联系。避免加入帮派对应反暴力。故事2是音乐公益，故事3是环保材料和就业，故事4是护理机构就业。","questionZh":"哪一个人生故事谈到反暴力？"},{"num":98,"source":"新增截图题","origNum":"新增","title":"Extraits religieux","article":"Extrait 1 : Le palais épiscopal était un vaste et bel hôtel bâti en pierre au commencement du siècle [...] par monseigneur Henri Puget [...]. Ce palais était un vrai logis seigneurial. Tout y avait grand air, les appartements de la évêques, les salons, les chambres, la cour d'honneur, fort large, avec promenoirs à arcades, selon l'ancienne mode florentine, les jardins plantés de magnifiques arbres.\n\nExtrait 2 : Une heure environ avant le coucher du soleil, un homme qui voyageait à pied entrait dans la petite ville de Digne. Les rares habitants qui se trouvaient en ce moment à leurs fenêtres ou sur le seuil de leurs maisons regardaient ce voyageur avec une sorte d'inquiétude. Il était difficile de rencontrer un passant d'un aspect plus misérable.\n\nExtrait 3 : Il y a bien tôt un an que Fantine, Dahlia, Zéphine et Favourite nous demandent de leur faire une surprise. Nous la leur avons promise solennellement. Elles nous en parlent toujours, à moi surtout. [...] Nos belles me disent sans cesse : Tholomyès, quand accoucheras-tu de ta surprise ?! [...] Le moment me semble venu.\n\nExtrait 4 : Il prenait ses repas toujours seul, avec un livre ouvert devant lui où il vivait. Il avait une petite bibliothèque bien faite. Il aimait les livres ; les livres sont des amis froids et sûrs. [...] Depuis qu'il était à Montreuil-sur-mer, on remarquait que d'année en année son langage devenait plus poli, plus choisi et plus doux.","question":"Quel extrait fait référence à des éléments religieux ?","options":[{"letter":"A","text":"Extrait 1","zh":"片段1"},{"letter":"B","text":"Extrait 2","zh":"片段2"},{"letter":"C","text":"Extrait 3","zh":"片段3"},{"letter":"D","text":"Extrait 4","zh":"片段4"}],"answerLetter":"A","answerText":"Extrait 1","answerRaw":"A","note":"主教宫-宗教","complete":true,"image":null,"articleZh":"片段1出现 palais épiscopal（主教宫）、monseigneur（主教/阁下）、évêques（主教们）等宗教相关词语，所以它指向宗教元素。其他片段分别写旅行者、惊喜和爱书的人。","questionZh":"哪一个片段涉及宗教元素？"},{"num":99,"source":"屏幕阅读PDF","origNum":"115","title":"Voitures（Question personnelle 6）","article":"Unisaton assèle des mieux des tests plusieurs pas le salon de cette année.\n1- La VZ10 : un aspirateur sur quatre roues.\n2- La Tala Aria : pas chère mais pas belle non plus.\n3- La cabriolet Augustin : plus large que haute.","question":"Quel est le problème de ces voitures ?","options":[{"letter":"A","text":"Leur couleur.","zh":"颜色。"},{"letter":"B","text":"Leur forme.","zh":"外形。"},{"letter":"C","text":"Leur prix.","zh":"价格。"},{"letter":"D","text":"Leur taille.","zh":"尺寸。"}],"answerLetter":"B","answerText":"Leur forme.","answerRaw":"B. Leur forme.","note":"车的形状","complete":true,"image":null,"articleZh":"材料列出几款车的问题：VZ10 像四个轮子上的吸尘器；Tala Aria 不贵，但也不好看；Augustin 敞篷车比它的高度还宽。题目问这些车的问题是什么。","questionZh":"这些车的问题是什么？"},{"num":100,"source":"完整文章秒选PDF","origNum":"58","title":"Graphique en courbe","article":"Question de graphique : associer une courbe au commentaire donné.","question":"Quel graphique correspond au commentaire suivant ?","options":[{"letter":"A","text":"Graphique 1.","zh":"中文辅助：请结合题干和关键词理解。"},{"letter":"B","text":"Graphique 2.","zh":"中文辅助：请结合题干和关键词理解。"},{"letter":"C","text":"Graphique 3.","zh":"中文辅助：请结合题干和关键词理解。"},{"letter":"D","text":"Graphique 4.","zh":"中文辅助：请结合题干和关键词理解。"}],"answerLetter":"","answerText":"à vérifier","answerRaw":"à vérifier","note":"曲线题-看图","complete":false,"image":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAQDAwMDAgQDAwMEBAQFBgoGBgUFBgwICQcKDgwPDg4MDQ0PERYTDxAVEQ0NExoTFRcYGRkZDxIbHRsYHRY , impressionnant de precision et de rigueur, il ne met pas \nsuffisamment l'accent sur ce qui aurait dû en être le coeur atomique: la question morale, sur notre incapacité quasi universelle et systématique à mettre \nnos actions en adéquation avec nos idéaux.\nCritique 2\nContemporain,brillant, intelligent,sautillant d'une époque à l'autre, faisant des parallèles entre le passé et le présent, cette remarquable histoire est écrite \npar une jeune autrice dont c'est le premier roman. Après un récit passionnant et quelques passages à vide (rien de surprenant dans une brique de 600 \npages), le final est tout en douceur. Les protagonistes fleurissent. Et nous","question":"","options":[],"answerLetter":"C","answerText":"Critique 4","answerRaw":"Critique 4","note":"节奏结构-选4","complete":false,"image":null,"articleZh":"四段小说评论，考匹配评论内容和评价特点。","questionZh":"题干残缺或缺失；按背诵卡查看答案线索。"},{"num":104,"source":"完整文章秒选PDF","origNum":"3","title":"Annonces culturelles","article":"3. 434 Annonce\nAnnonce |\nLa troisième édition du festival itinérant « Marocains rigolos », se poursuit à Tanger, Casablanca, et Rabat. Venez découvrir une sélection d'artistes \npassionnés, ancrés dans la tradition de l'humour maghrébin !\nAnnonce 2\nLe grand théâtre de Bruxelles propose une découverte de « Marchons ensemble », un opéra moderne. Vous serez transportés dans les origines grecques \navec ce ballet mêlant chants contemporains et danses classiques. 46 SEA ARI GE (Grand Thâtre de Bruxelles) $2! 7Marchons Ensemble”) #5, 2X fit \nESC. Ae BEAT LB AA. RET SR TH Ah à\nAnnonce 3\nChaque année, Alger a le plaisir d'accueillir la troupe du Cirque des étoiles. Retrouvez les jongleurs, les trapézistes et d'autres numéros extraordinaires, le \n17 Mars prochain. Réservez sans plus attendre, les places sont limitées !\nAnnonce 4\nComme chaque année, la ville de Bordeaux organise un festival autour du piano. En ouverture, l'artiste Kita Yarimoto y jouera « Do Ré Mi », son chef-\nd'oeuvre absolu. A écouter sans modérat -up américaine dont la technologie de reconnaissance faciale est aussi appréciée des polices que controversée. « Les plaintes ont été déposées \nauprès des autorités de protection des données en France, en Grèce, en Autriche, en Italie et au Royaume-Uni », détaille PI. Ces plaintes concernent \nnotamment la\nvente à des services de police de la technologie de reconnaissance et l'autrichienne noyb - dénoncent l'utilisation par Clearview Al d'un « dispositif \nautomatisé de récupération d'images », qui parcourt internet et extrait toutes les images de visages humains détectées. A","questionZh":"题干残缺或缺失；按背诵卡查看答案线索。"},{"num":112,"source":"完整文章秒选PDF","origNum":"27","title":"Sport de combat","article":"Texte sur la polémique autour des coups dans un sport de combat et la réglementation sportive.","question":"","options":[],"answerLetter":"","answerText":"","answerRaw":"","note":"格斗争议","complete":false,"image":null,"articleZh":"原文残缺，仅翻译可见部分：Texte sur la polémique autour des coups dans un sport de combat et la réglementation sportive.","questionZh":"题干残缺或缺失；按背诵卡查看答案线索。"}];

let rIndex=0, rAnswered=false, showCn=false;
const readingStatus = new Map();
function esc(x){ return String(x ?? '').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function optLetter(o){ return Array.isArray(o) ? o[0] : (o.letter || ''); }
function optText(o){ return Array.isArray(o) ? o[1] : (o.text || ''); }
function optZh(o){ return Array.isArray(o) ? o[2] : (o.zh || ''); }
function renderReadingNav(){
  const nav = $('#readingNav');
  if(!nav) return;
  nav.innerHTML = READING.map((item,i)=>{
    const status = readingStatus.get(i);
    return `<button class="qnavBtn ${i===rIndex?'active':''} ${status==='correct'?'done':''} ${status==='wrong'?'bad':''}" data-i="${i}" title="${esc(item.title||'')}" >${item.num || i+1}</button>`;
  }).join('');
  $$('#readingNav .qnavBtn').forEach(b=>b.onclick=()=>{ rIndex=Number(b.dataset.i); renderReading(); });
}
function renderReading(){
  const item = READING[rIndex]; rAnswered=false;
  const article = item.article || '';
  const articleZh = item.articleZh || '';
  const question = item.question || '';
  const questionZh = item.questionZh || '';
  const title = item.title || `Question ${item.num || rIndex+1}`;
  const img = item.image ? `<img src="${item.image}" style="max-width:100%;border:1px solid var(--line);border-radius:12px;margin-bottom:18px;background:#fff" alt="题目图片">` : '';
  const articleBlock = article ? `<div>${esc(article)}</div>` : `<div class="notice">本题主要依据图片或题干作答。</div>`;
  const opts = (item.options||[]).map(o=>{
    const L=esc(optLetter(o)), T=esc(optText(o)), Z=esc(optZh(o));
    return `<div class="opt" data-letter="${L}"><b>${L}.</b> ${T}${Z?`<div class="translationBox ${showCn?'show':''}" style="margin-top:8px">${Z}</div>`:''}</div>`;
  }).join('');
  $('#readingApp').innerHTML = `<div class="readingCard"><div class="readingHead"><div><b>${esc(title)}</b></div><span class="badge">阅读 / QCM</span></div><div class="readingBody"><article class="article">${img}${articleBlock}<div class="readingActions" style="margin-top:16px;margin-bottom:12px"><button class="smallBtn" id="rToggleCn">${showCn?'隐藏中文对照':'中文对照翻译'}</button></div>${articleZh?`<div id="rCn" class="translationBox ${showCn?'show':''}">${esc(articleZh)}</div>`:''}</article><aside class="qa"><h2 style="margin-top:0">${esc(question)}</h2>${questionZh?`<div id="qCn" class="translationBox ${showCn?'show':''}">${esc(questionZh)}</div>`:''}<div id="rOpts">${opts}</div><div id="rFb" class="feedback"></div><div class="readingActions"><button class="smallBtn" id="rPrev">上一题</button><button class="smallBtn" id="rNext">下一题</button></div></aside></div></div>`;
  const cnBtn = $('#rToggleCn');
  if(cnBtn) cnBtn.onclick = ()=>{ showCn=!showCn; renderReading(); };
  $$('#rOpts .opt').forEach(opt=>opt.onclick=()=>checkReading(opt));
  $('#rPrev').onclick=()=>{rIndex=(rIndex-1+READING.length)%READING.length;renderReading();};
  $('#rNext').onclick=()=>{rIndex=(rIndex+1)%READING.length;renderReading();};
  renderReadingNav();
}
function checkReading(opt){
  if(rAnswered) return; rAnswered=true;
  const item=READING[rIndex]; const chosen=opt.dataset.letter;
  const ans = item.answerLetter || item.answerRaw || '';
  const isCorrect = chosen===ans;
  readingStatus.set(rIndex, isCorrect ? 'correct' : 'wrong');
  renderReadingNav();
  $$('#rOpts .opt').forEach(o=>{ if(o.dataset.letter===ans)o.classList.add('correct'); });
  const fb = $('#rFb');
  const answerText = item.answerText ? `｜${esc(item.answerText)}` : '';
  const note = item.note ? `<br>${esc(item.note)}` : '';
  if(isCorrect){ fb.className='feedback ok'; fb.innerHTML=`<b>正确。</b><br>答案：${esc(ans)}${answerText}${note}`; }
  else{ opt.classList.add('wrong'); fb.className='feedback bad'; fb.innerHTML=`<b>错误。正确答案：${esc(ans)}${answerText}</b>${note}`; addWrong({module:'阅读', title:item.title || `Question ${rIndex+1}`, detail:`题目：${esc(item.question||'')}<br>你的答案：${esc(chosen)}；正确答案：${esc(ans)}${answerText}${note}`}); }
}
renderReading();
const appLoading = document.getElementById('appLoading');
if(appLoading){ setTimeout(()=>{ appLoading.style.display='none'; }, 450); }
})();
</script>
